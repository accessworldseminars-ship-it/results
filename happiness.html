// Helper functions
function calcScore(answers) {
  let total = 0, ws = 0;
  QUESTIONS.forEach(q => {
    const v = answers[q.id];
    if (v === undefined) return;
    const n = q.reversed ? 5 - v : v;
    total += n * q.weight;
    ws += 5 * q.weight;
  });
  return ws > 0 ? (total / ws) * 5 : 0;
}

function getTier(score) {
  return TIERS.find(t => score >= t.min && score < t.max) || TIERS[TIERS.length-1];
}

function getFocusSorted(answers) {
  return QUESTIONS.map(q => {
    const v = answers[q.id] ?? 0;
    const eff = q.reversed ? 5 - v : v;
    return { ...q, rawVal: v, eff };
  }).sort((a, b) => a.eff - b.eff);
}

// 🔥 FIXED: Send to Zapier using FormData (bypasses CORS)

async function sendToZapier(name, phone, email, scoreNum, tierLabel, answersData) {
  // Format answers for SMS
  let answersText = "";
  QUESTIONS.forEach(q => {
    const val = answersData[q.id] || 0;
    answersText += `${q.category}: ${val}/5\n`;
  });
  
  // Create FormData (this bypasses CORS restrictions)
  const formData = new FormData();
  formData.append('name', name);
  formData.append('phone', phone);
  formData.append('email', email);
  formData.append('score', scoreNum.toFixed(1));
  formData.append('tier', tierLabel);
  formData.append('answers_text', answersText);
  formData.append('timestamp', new Date().toISOString());
  
  console.log("📤 Sending to Zapier via FormData");
  
  try {
    const response = await fetch(ZAPIER_WEBHOOK, {
      method: "POST",
      body: formData,
      mode: "no-cors"  // Bypasses CORS
    });
    console.log("✅ Request sent to Zapier");
    return true;
  } catch (error) {
    console.error("❌ Zapier error:", error);
    return false;
  }
}

function renderQuiz() {
  const q = QUESTIONS[currentQIdx];
  const progress = ((currentQIdx) / QUESTIONS.length) * 100;
  
  const html = `
    <div class="dark-bg">
      <div class="noise"></div>
      <div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>
      <div style="display: flex; justify-content: space-between; width: 100%; max-width: 560px; padding: 14px 20px 0; z-index: 1;">
        <span style="font-size: 9px; letter-spacing: 4px; color: #C9A84C; text-transform: uppercase;">${q.category}</span>
        <span style="font-size: 12px; color: #ffffff33; font-family: 'Cormorant Garamond', serif;">${currentQIdx + 1}<span style="opacity: 0.35;"> / ${QUESTIONS.length}</span></span>
      </div>
      <div class="quiz-card" style="opacity: ${animOut ? 0 : 1}; transform: ${animOut ? 'translateY(14px)' : 'translateY(0)'};">
        <div class="quiz-icon">${q.icon}</div>
        <div class="quiz-question">${q.question}</div>
        ${q.note ? `<div class="quiz-note">${q.note}</div>` : ''}
        <div class="scale-grid">
          ${[0,1,2,3,4,5].map(v => `
            <button class="scale-btn ${selectedAnswer === v ? 'selected' : ''}" onclick="selectAnswer(${v})">
              <span class="scale-num">${v}</span>
              <span class="scale-label">${q.labels[v]}</span>
            </button>
          `).join('')}
        </div>
      </div>
      <button class="btn" style="margin-top: 20px; opacity: ${selectedAnswer !== null ? 1 : 0.3};" onclick="nextQuestion()" ${selectedAnswer === null ? 'disabled' : ''}>
        ${currentQIdx < QUESTIONS.length - 1 ? "Next →" : "See My Results →"}
      </button>
    </div>
  `;
  document.getElementById('root').innerHTML = html;
}

function selectAnswer(val) {
  selectedAnswer = val;
  renderQuiz();
}

function nextQuestion() {
  if (selectedAnswer === null) return;
  answers[QUESTIONS[currentQIdx].id] = selectedAnswer;
  
  if (currentQIdx < QUESTIONS.length - 1) {
    currentQIdx++;
    selectedAnswer = null;
    renderQuiz();
  } else {
    const s = calcScore(answers);
    score = s;
    currentTier = getTier(s);
    currentPhase = "capture";
    render();
  }
}

function renderCapture() {

  const html = `
    <div class="dark-bg">
      <div class="noise"></div>

        <div class="divider"></div>
        <div style="width: 100%; background: #ffffff06; border: 1px solid #C9A84C22; border-radius: 4px; padding: 24px 20px; margin-bottom: 18px; text-align: center;">
          <div style="font-size: 9px; letter-spacing: 4px; color: #C9A84C; text-transform: uppercase; margin-bottom: 10px;">Your Assessment Is Complete</div>
          <svg viewBox="0 0 160 160" width="160" height="160" style="display: block; margin: 0 auto 10px;">
            <circle cx="80" cy="80" r="64" fill="none" stroke="#ffffff08" stroke-width="12"/>
            <circle cx="80" cy="80" r="64" fill="none" stroke="${bc}" stroke-width="12" stroke-linecap="round" stroke-dasharray="${2 * Math.PI * 64}" stroke-dashoffset="${2 * Math.PI * 64 * (1 - sp / 100)}" transform="rotate(-90 80 80)"/>
            <text x="80" y="74" text-anchor="middle" fill="#fff" font-family="Cormorant Garamond, serif" font-size="38" font-weight="300">${score.toFixed(1)}</text>
            <text x="80" y="96" text-anchor="middle" fill="#C9A84C" font-family="Montserrat, sans-serif" font-size="8" letter-spacing="3">OUT OF 5.0</text>
          </svg>
          <div style="display: inline-block; padding: 6px 18px; border: 1px solid ${bc}; color: ${bc}; font-size: 9px; letter-spacing: 4px; margin-bottom: 12px;">${currentTier?.label}</div>
          <div style="font-size: 12px; color: #ffffff66; line-height: 1.8; max-width: 420px; margin: 0 auto;">Your full personalised NSR report includes complete analysis, top 3 intervention points, foundation strengths, and daily practices.</div>
        </div>
        <div style="width: 100%; background: #ffffff05; border: 1px solid #ffffff0d; border-radius: 4px; padding: 22px 20px; text-align: left;">
          <div style="font-family: 'Cormorant Garamond', serif; font-size: 22px; color: #fff; margin-bottom: 4px; font-weight: 400;">Unlock Your Full Report</div>
          <div style="font-size: 12px; color: #ffffff44; margin-bottom: 16px;">Enter your details to view your complete personalised assessment.</div>
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="capture-name" placeholder="Your full name" value="${userName}">
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="capture-phone" placeholder="+61 4xx xxx xxx" value="${userPhone}">
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="capture-email" placeholder="your@email.com" value="${userEmail}">
          </div>
          ${errorMsg ? `<div class="error">${errorMsg}</div>` : ''}
          <button class="btn" style="width: 100%; margin-top: 6px;" onclick="submitCapture()">View My Full Report →</button>
          <div class="fine-print" style="text-align: center; margin-top: 10px;">Your details are private and never shared.</div>
        </div>
      </div>
    </div>
  `;
  document.getElementById('root').innerHTML = html;
}

async function submitCapture() {
  const name = document.getElementById('capture-name')?.value.trim() || "";
  const phone = document.getElementById('capture-phone')?.value.trim() || "";
  const email = document.getElementById('capture-email')?.value.trim() || "";
  
  if (!name) { errorMsg = "Please enter your full name"; render(); return; }
  if (!phone) { errorMsg = "Please enter your phone number"; render(); return; }
  if (!email) { errorMsg = "Please enter your email address"; render(); return; }
  if (!email.includes('@')) { errorMsg = "Please enter a valid email address"; render(); return; }
  
  errorMsg = "";
  userName = name;
  userPhone = phone;
  userEmail = email;
  
  // Send to Zapier (CORS fixed!)
  await sendToZapier(name, phone, email, score, currentTier.label, answers);
  
  currentPhase = "results";
  render();
}

          <div style="font-size:8px;letter-spacing:3px;color:#1A2744;text-transform:uppercase;margin-bottom:6px;">The Process</div>
          <p style="font-size:12px;color:#444;line-height:1.8;margin:0;">${content.process}</p>
        </div>
        <div style="background:#1A2744;border-radius:2px;padding:14px 18px;">
          <div style="font-size:8px;letter-spacing:3px;color:#C9A84C;text-transform:uppercase;margin-bottom:6px;">Your Daily Practice</div>

  };
  
  const resultsHtml = `

        <div class="results-header">
          <div class="results-logo">ACCESSWORLD</div>
          <div class="results-tag">Assessment Overview</div>
        </div>
        <div class="results-title">Hello, ${fn}.</div>
        <div class="results-eyebrow">Your Nervous System Report · ${new Date().toLocaleDateString('en-AU', { day: 'numeric', month: 'long', year: 'numeric' })}</div>
        <div class="intro-quote"><p>${currentTier.p1intro}</p></div>
        <div class="tier-note"><strong>Note from Joshua:</strong> ${currentTier.tier_note}</div>
        <div class="score-band">
          <div>
            <svg viewBox="0 0 120 120" width="100" height="100">
              <circle cx="60" cy="60" r="48" fill="none" stroke="#e9e5db" stroke-width="10"/>

              <text x="60" y="55" text-anchor="middle" fill="#1A2744" font-family="Cormorant Garamond, serif" font-size="28" font-weight="300">${score.toFixed(1)}</text>

          <div class="results-logo">ACCESSWORLD</div>

        <div style="background:#f8f5ef;padding:20px 24px;border-radius:2px;margin-bottom:28px;">

        </div>
        <div class="cta-dark">
          <div style="font-size:9px;letter-spacing:4px;color:#C9A84C;text-transform:uppercase;margin-bottom:10px;">For More Information</div>
          <p style="font-family:'Cormorant Garamond',serif;font-size:20px;color:#fff;font-weight:300;margin-bottom:14px;">Two programs. One destination: the fullest version of you.</p>
          <div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px;">

              <div style="font-size:8px;letter-spacing:3px;color:#C9A84C;text-transform:uppercase;">Personal Transformation</div>
              <div style="font-family:'Cormorant Garamond',serif;font-size:16px;color:#fff;">Unlock Your Incredible Self</div>
              <div style="font-size:10px;color:#C9A84C;">https://www.accessworldseminars.org/the-perfect-squeeze-page--6c808</div>
            </div>
            <div style="flex:1;min-width:200px;border:1px solid #C9A84C44;padding:14px 16px;border-radius:2px;">
              <div style="font-size:8px;letter-spacing:3px;color:#C9A84C;text-transform:uppercase;">Professional Certification</div>

function resetAssessment() {
  currentPhase = "landing";
  currentQIdx = 0;
  answers = {};
  selectedAnswer = null;
  score = 0;
  currentTier = null;
  userName = "";
  userPhone = "";
  userEmail = "";
  errorMsg = "";
  render();
}

// Expose functions globally
window.startQuiz = startQuiz;
window.selectAnswer = selectAnswer;
window.nextQuestion = nextQuestion;
window.submitCapture = submitCapture;
window.resetAssessment = resetAssessment;

// Initialize
render();
</script>
