      { id: 7, category: "Mental Health", icon: "◎", question: "How much did feelings of anxiety or depression affect my day?", labels: ["Overwhelmed me", "Strong impact", "Noticeable", "Mild", "Very little", "Not at all"], weight: 1.3, reversed: true,

        p1intro: "Your nervous system is running enough unconscious resistance to keep thriving just out of reach.",
        tier_note: "Priority: Emotional Clearing and Identity work." },
      { min: 2.5, max: 3.5, label: "Fine / Neutral", arcColor: "#C9A84C",

      { min: 3.5, max: 4.5, label: "Happiness", arcColor: "#27AE60",

        tier_note: "Priority: Depth over breadth — refinement and deepening." },
      { min: 4.5, max: 5.01, label: "Elevated Happiness", arcColor: "#C9A84C",

        p1intro: "Your nervous system is well-regulated, your identity intentional, your emotional access rich.",
        tier_note: "Priority: Legacy and leadership — helping others find what you have found." }
    ];
    
    // ----- Helper Functions -----
    function calcScore(answers) {
      let total = 0, ws = 0;
      QUESTIONS.forEach(q => {
        const v = answers[q.id];
        if (v === undefined) return;
        const n = q.reversed ? 5 - v : v;
        total += n * q.weight;
        ws += 5 * q.weight;
      });
      return ws > 0 ? (total / ws) * 5 : 0;
    }
    
    function getTier(score) {
      return TIERS.find(t => score >= t.min && score < t.max) || TIERS[TIERS.length-1];
    }
    
    function getFocusSorted(answers) {
      return QUESTIONS.map(q => {
        const v = answers[q.id] ?? 0;
        const eff = q.reversed ? 5 - v : v;
        return { ...q, rawVal: v, eff };
      }).sort((a, b) => a.eff - b.eff);
    }
    
    // ----- Main App Component -----
    const App = () => {
      const [phase, setPhase] = React.useState("landing");
      const [qIdx, setQIdx] = React.useState(0);
      const [answers, setAnswers] = React.useState({});
      const [selected, setSelected] = React.useState(null);
      const [animOut, setAnimOut] = React.useState(false);
      const [score, setScore] = React.useState(0);
      const [tier, setTier] = React.useState(null);
      const [name, setName] = React.useState("");
      const [phone, setPhone] = React.useState("");
      const [email, setEmail] = React.useState("");
      const [err, setErr] = React.useState("");
      
      const q = QUESTIONS[qIdx];
      const prog = ((qIdx) / QUESTIONS.length) * 100;
      const sp = (score / 5) * 100;
      const fn = name.split(" ")[0] || "there";
      
      const nextQuestion = () => {
        if (selected === null) return;
        const newAnswers = { ...answers, [q.id]: selected };
        setAnswers(newAnswers);
        setAnimOut(true);
        setTimeout(() => {
          if (qIdx < QUESTIONS.length - 1) {
            setQIdx(qIdx + 1);
            setSelected(null);
            setAnimOut(false);
          } else {
            const s = calcScore(newAnswers);
            setScore(s);
            setTier(getTier(s));
            setPhase("capture");
            setAnimOut(false);
          }
        }, 280);
      };
      
      const captureAndContinue = () => {
        if (!name.trim()) { setErr("Please enter your full name."); return; }
        if (!phone.trim()) { setErr("Please enter your phone number."); return; }
        if (!email.includes("@")) { setErr("Please enter a valid email address."); return; }
        setErr("");
        
        if (ZAPIER_WEBHOOK) {
          fetch(ZAPIER_WEBHOOK, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, phone, email, score: score.toFixed(2), tier: tier?.label, answers, timestamp: new Date().toISOString() })
          }).catch(e => console.error(e));
        }
        
        setPhase("results");
      };
      
      const resetApp = () => {
        setPhase("landing");
        setQIdx(0);
        setAnswers({});
        setSelected(null);
        setScore(0);
        setTier(null);
        setName("");
        setPhone("");
        setEmail("");
        setErr("");
      };
      
      const handlePrint = () => window.print();
      
      const Bar = ({ p, c = "#C9A84C" }) => (
        <div style={{ height: 5, background: "#e9e5db", borderRadius: 3, marginTop: 7 }}>
          <div style={{ width: `${p}%`, height: "100%", background: c, borderRadius: 3 }} />
        </div>
      );
      
      // ----- LANDING PAGE -----
      if (phase === "landing") {
        return (
          <div style={styles.dark}>
            <div style={styles.noise} />
            <div style={styles.col}>
              <div style={styles.logoStack}>
                <span style={styles.logo}>ACCESSWORLD</span>
                <span style={styles.logosub}>SEMINARS · JOSHUA ROY</span>
              </div>
              <div style={styles.gline} />

            </div>
          </div>
        );

      // ----- QUIZ PAGE -----
      if (phase === "quiz" && q) {
        return (
          <div style={styles.dark}>

                </div>
                <div style={{ marginBottom: 12 }}>
                  <label style={{ fontSize: 8, letterSpacing: 3, color: "#C9A84C", textTransform: "uppercase", display: "block", marginBottom: 5 }}>Phone Number</label>

      // ----- RESULTS PAGE (Full 3-Page Report) -----
      if (phase === "results" && tier) {

          return (

                <p style={{ fontSize: 12, color: "#444", lineHeight: 1.8 }}>{content.process}</p>
              </div>
              <div style={{ background: "#1A2744", borderRadius: 2, padding: "14px 18px" }}>
                <div style={{ fontSize: 8, letterSpacing: 3, color: "#C9A84C", textTransform: "uppercase", marginBottom: 6 }}>Your Daily Practice</div>
                <p style={{ fontSize: 12, color: "#ffffffcc", lineHeight: 1.8 }}>{content.practice}</p>
