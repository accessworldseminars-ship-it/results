<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AccessWorld · Happiness Assessment</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(160deg, #080d18 0%, #1A2744 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
      background: rgba(255,255,255,0.05);
      border-radius: 24px;
      padding: 40px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(201,169,76,0.3);
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 42px;
      color: #fff;
      text-align: center;
      margin-bottom: 10px;
    }
    .sub {
      text-align: center;
      color: #C9A84C;
      font-size: 12px;
      letter-spacing: 2px;
      margin-bottom: 30px;
    }
    .question {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      border-left: 3px solid #C9A84C;
    }
    .question-text {
      color: #fff;
      font-size: 16px;
      margin-bottom: 12px;
      line-height: 1.5;
    }
    .scale {
      display: flex;
      gap: 8px;
      justify-content: space-between;
    }
    .scale-btn {
      flex: 1;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 10px 5px;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
      font-family: inherit;
    }
    .scale-btn:hover {
      background: rgba(201,169,76,0.3);
      border-color: #C9A84C;
    }
    .scale-btn.selected {
      background: #C9A84C;
      border-color: #C9A84C;
    }
    .scale-btn .num {
      font-size: 18px;
      font-weight: bold;
      color: #fff;
      display: block;
    }
    .scale-btn .label {
      font-size: 9px;
      color: rgba(255,255,255,0.6);
    }
    .progress {
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      margin: 20px 0;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #C9A84C;
      width: 0%;
      transition: width 0.3s;
    }
    .btn {
      background: #C9A84C;
      border: none;
      padding: 14px 28px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: bold;
      color: #1A2744;
      cursor: pointer;
      width: 100%;
      margin-top: 20px;
      transition: opacity 0.2s;
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      color: #C9A84C;
      font-size: 11px;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 12px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
    }
    .error {
      color: #ff6b6b;
      font-size: 12px;
      margin-top: 8px;
    }
    .hidden {
      display: none;
    }
    .result-card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .result-score {
      font-size: 48px;
      font-weight: bold;
      text-align: center;
      color: #1A2744;
    }
    .result-tier {
      text-align: center;
      font-size: 20px;
      margin: 10px 0;
    }
  </style>
</head>
<body>
<div class="container">
  <div id="quiz-section">
    <h1>How happy are you — <span style="color:#C9A84C">really?</span></h1>
    <div class="sub">8 questions · 3 minutes</div>
    <div class="progress"><div class="progress-fill" id="progressFill"></div></div>
    <div id="questions-container"></div>
    <button class="btn" id="nextBtn" disabled>Next →</button>
  </div>

  <div id="contact-section" class="hidden">
    <h1>Your results are <span style="color:#C9A84C">ready</span></h1>
    <div class="sub">Enter your details to view your report</div>
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="Your full name">
    </div>
    <div class="form-group">
      <label>Phone Number</label>
      <input type="tel" id="phone" placeholder="+61 4xx xxx xxx">
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="your@email.com">
    </div>
    <div id="contact-error" class="error"></div>
    <button class="btn" id="submitBtn">View My Full Report →</button>
  </div>

  <div id="results-section" class="hidden">
    <div id="results-content"></div>
    <button class="btn" id="retakeBtn" style="background:#333; color:#fff;">Take Again</button>
  </div>
</div>

<script>
// ============================================================
// HAPPINESS ASSESSMENT - WORKING ZAPIER WEBHOOK
// ============================================================

// YOUR ZAPIER WEBHOOK URL
const ZAPIER_WEBHOOK = "https://hooks.zapier.com/hooks/catch/3779260/unt9eik/";

// QUESTIONS
const QUESTIONS = [
  { id: 1, text: "How positive and peaceful was my state of mind today?" },
  { id: 2, text: "How much love and joy did I experience today?" },
  { id: 3, text: "How much did I use words that uplift and inspire today?" },
  { id: 4, text: "How much meaningful progress did I make toward my goals today?" },
  { id: 5, text: "How much did I act from my chosen identity today (not my old story)?" },
  { id: 6, text: "How well did I honour my body with movement, nourishment, and rest?" },
  { id: 7, text: "How free did I feel from anxiety and depression today?" },
  { id: 8, text: "How much did I consciously CREATE my life today (vs just reacting)?" }
];

const LABELS = ["Not at all", "Rarely", "Sometimes", "Often", "Mostly", "Completely"];

// State
let answers = {};
let currentQuestion = 0;
let score = 0;
let tier = { label: "" };

// Render questions
function renderQuestions() {
  const container = document.getElementById('questions-container');
  container.innerHTML = '';
  
  QUESTIONS.forEach((q, idx) => {
    const div = document.createElement('div');
    div.className = 'question';
    div.innerHTML = `
      <div class="question-text">${q.text}</div>
      <div class="scale" data-qid="${q.id}">
        ${[0,1,2,3,4,5].map(v => `
          <button class="scale-btn" data-val="${v}" onclick="selectAnswer(${q.id}, ${v})">
            <span class="num">${v}</span>
            <span class="label">${LABELS[v]}</span>
          </button>
        `).join('')}
      </div>
    `;
    container.appendChild(div);
    
    // Highlight existing answer if any
    if (answers[q.id] !== undefined) {
      const btns = div.querySelectorAll('.scale-btn');
      btns[answers[q.id]].classList.add('selected');
    }
  });
  
  updateProgress();
}

function selectAnswer(qid, val) {
  answers[qid] = val;
  
  // Update UI highlight
  const scaleDiv = document.querySelector(`.scale[data-qid="${qid}"]`);
  if (scaleDiv) {
    scaleDiv.querySelectorAll('.scale-btn').forEach(btn => btn.classList.remove('selected'));
    scaleDiv.querySelectorAll('.scale-btn')[val].classList.add('selected');
  }
  
  updateProgress();
}

function updateProgress() {
  const answered = Object.keys(answers).length;
  const total = QUESTIONS.length;
  const percent = (answered / total) * 100;
  document.getElementById('progressFill').style.width = `${percent}%`;
  document.getElementById('nextBtn').disabled = answered !== total;
}

function calculateScore() {
  let total = 0;
  QUESTIONS.forEach(q => {
    total += answers[q.id] || 0;
  });
  return (total / QUESTIONS.length).toFixed(1);
}

function getTier(scoreNum) {
  if (scoreNum <= 1.8) return { label: "Absence of Happiness", color: "#C0392B" };
  if (scoreNum <= 2.6) return { label: "Unhappiness", color: "#E67E22" };
  if (scoreNum <= 3.4) return { label: "Fine / Neutral", color: "#C9A84C" };
  if (scoreNum <= 4.2) return { label: "Happiness", color: "#27AE60" };
  return { label: "Elevated Happiness", color: "#C9A84C" };
}

// SEND TO ZAPIER - THIS IS WHAT YOU NEED
async function sendToZapier(name, phone, email, scoreNum, tierLabel, answersData) {
  // Format answers for SMS
  let answersText = "";
  QUESTIONS.forEach(q => {
    const val = answersData[q.id] || 0;
    answersText += `${q.text.substring(0, 40)}...: ${val}/5\n`;
  });
  
  const payload = {
    name: name,
    phone: phone,
    email: email,
    score: scoreNum,
    tier: tierLabel,
    answers_text: answersText,
    timestamp: new Date().toISOString()
  };
  
  console.log("Sending to Zapier:", payload);
  
  try {
    const response = await fetch(ZAPIER_WEBHOOK, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    console.log("Zapier response:", response.status);
    return response.ok;
  } catch (error) {
    console.error("Zapier error:", error);
    return false;
  }
}

// Show results and send to Zapier
async function showResults() {
  const name = document.getElementById('name').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const email = document.getElementById('email').value.trim();
  const errorDiv = document.getElementById('contact-error');
  
  if (!name) { errorDiv.textContent = "Please enter your name"; return; }
  if (!phone) { errorDiv.textContent = "Please enter your phone number"; return; }
  if (!email) { errorDiv.textContent = "Please enter your email"; return; }
  if (!email.includes('@')) { errorDiv.textContent = "Enter a valid email"; return; }
  
  errorDiv.textContent = "";
  
  // Calculate score
  const scoreNum = parseFloat(calculateScore());
  const tierData = getTier(scoreNum);
  
  // SEND TO ZAPIER
  const sent = await sendToZapier(name, phone, email, scoreNum, tierData.label, answers);
  
  if (sent) {
    console.log("✅ Data sent to Zapier successfully");
  } else {
    console.log("⚠️ Failed to send to Zapier, but continuing");
  }
  
  // Display results
  const resultsDiv = document.getElementById('results-content');
  resultsDiv.innerHTML = `
    <div class="result-card" style="text-align:center; background:${tierData.color}20;">
      <div class="result-score">${scoreNum}/5</div>
      <div class="result-tier" style="color:${tierData.color}; font-size:24px;">${tierData.label}</div>
      <p style="margin-top:16px; color:#333;">Thank you ${name}! Your results have been sent to your phone.</p>
    </div>
    <div class="result-card">
      <h3>Your Answers</h3>
      ${QUESTIONS.map((q, i) => `
        <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #eee;">
          <span style="flex:1;">${q.text.substring(0, 50)}...</span>
          <span style="font-weight:bold;">${answers[q.id] || 0}/5</span>
        </div>
      `).join('')}
    </div>
  `;
  
  document.getElementById('contact-section').classList.add('hidden');
  document.getElementById('results-section').classList.remove('hidden');
}

function next() {
  document.getElementById('quiz-section').classList.add('hidden');
  document.getElementById('contact-section').classList.remove('hidden');
}

function retake() {
  answers = {};
  currentQuestion = 0;
  renderQuestions();
  document.getElementById('quiz-section').classList.remove('hidden');
  document.getElementById('results-section').classList.add('hidden');
  document.getElementById('contact-section').classList.add('hidden');
  document.getElementById('name').value = '';
  document.getElementById('phone').value = '';
  document.getElementById('email').value = '';
}

// Initialize
renderQuestions();
document.getElementById('nextBtn').onclick = next;
document.getElementById('submitBtn').onclick = showResults;
document.getElementById('retakeBtn').onclick = retake;
</script>
</body>
</html>
