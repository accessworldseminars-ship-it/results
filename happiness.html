      const ZAPIER_WEBHOOK = ""; // Leave empty to skip, or add your URL: "https://hooks.zapier.com/..."
      
      // ----- QUESTIONS DATA -----
      const QUESTIONS = [
        { id: 1, category: "Mindset", icon: "✦", question: "Did I live in a beautiful state of mind and emotion today?", labels: ["Not at all", "Rarely", "Sometimes", "Often", "Frequently", "Absolutely yes"], weight: 1.2, reversed: false,
          module: "NSR — Nervous System Reprogramming", webinar: "The NSR Nervous System Programming Webinar",
          low: { title: "Your Nervous System Is Running an Old Program", analysis: "When your emotional state feels heavy, flat, or persistently reactive, it is rarely about what is happening around you — it is about the program your nervous system has been running, often since childhood. Unresolved emotional imprints create a default baseline that constantly pulls you back toward familiar states, even painful ones. Your nervous system has learned to treat these states as 'safe' simply because they are familiar.\n\nThis is the core insight of Nervous System Reprogramming (NSR): your current emotional baseline is not fixed — it is a learned pattern. And what was learned can be unlearned. Through processes such as The Gift (emotional clearing and timeline therapy) and The Grey Room (reframing and releasing past trauma), you can systematically dissolve the trapped emotional charge that keeps you operating below your natural level of joy and peace.", process: "The Gift process — an emotional clearing and timeline therapy — is specifically designed for this. It overrides negative emotional imprints with joy, helping you release trapped emotions from the past so that your baseline state begins to rise naturally. Many people report feeling as though a weight has been lifted after their first session.", practice: "Each morning before checking your phone, take three slow diaphragmatic breaths. On each exhale, state aloud: 'I choose to feel [word] today.' This is not positive thinking — it is nervous system priming. Repetition with emotional engagement begins wiring a new neural baseline within 21 days." },
          high: { title: "A Well-Regulated State — Your Platform for Everything", analysis: "You are managing your emotional state at a level that reflects real inner work. In NSR methodology, a consistently positive emotional baseline is not the end of the journey — it is the launchpad. Your nervous system is in a regulated state, which means you have the neurological capacity to go deeper: into expanded joy, into peak creative states, and into profound service to others.", process: "The Space Odyssey process — a spatial relocation strategy — can now be used to eliminate any remaining residual emotional charge from past memories, so that you can recall events without being pulled back into old feeling states.", practice: "Peak State Stacking: Identify three peak moments from your life when you felt most alive and joyful. Revisit each one in vivid sensory detail for 90 seconds. Notice where the feeling lives in your body. Practise triggering this state deliberately before high-stakes conversations, presentations, or coaching sessions." } },
        { id: 2, category: "Love & Joy", icon: "❤", question: "Did I live into an experience of love and joy today?", labels: ["Not at all", "Barely", "A little", "Noticeably", "Strongly", "Completely"], weight: 1.2, reversed: false,
          module: "Emotional Clearing & Freedom", webinar: "The Emotional Clearing Webinar + Ultimate Freedom Webinar",
          low: { title: "The Channel to Love and Joy Is Blocked — But It Can Be Cleared", analysis: "Love and joy are not emotions that arrive when life cooperates — they are frequencies your nervous system either allows or suppresses based on deep-seated beliefs about whether you are safe, worthy, and enough. When this dimension scores low, it consistently points to one of three root causes: unprocessed grief or loss, chronic patterns of self-rejection, or the unconscious belief that joy must be earned before it can be felt.\n\nThe Emotional Clearing work in the AccessWorld curriculum addresses all three directly. The six reasons behind self-sabotage — explored in the Ultimate Freedom program — almost always include a hidden block to positive emotional experience. Until those blocks are named and cleared, joy will feel like a visitor rather than a resident.", process: "The Grey Room process is the most direct intervention for this dimension. By revisiting memories that once triggered rejection, hurt, sadness, fear, anger, guilt, or shame — and transforming those emotional responses — you create genuine spaciousness inside. Participants consistently report renewed energy and freedom after this process, often experiencing joy spontaneously where numbness existed before.", practice: "The Joy Inventory: Each evening, write three specific moments from the day where you felt even a flicker of warmth, connection, or aliveness — however brief. This is not gratitude journalling. It is nervous system retraining: you are teaching your reticular activating system to scan for positive experience rather than threat. Do this for 30 consecutive days." },
          high: { title: "You Have Access to Joy — Now Amplify and Share It", analysis: "Living in regular contact with love and joy signals that your nervous system has learned that positive emotional experience is safe to sustain — a more significant achievement than most people realise. The NSR principle here is expansion: your task is to move from accessing joy to living FROM joy as your default operating frequency.", process: "The Womb of Eternity process — a timeline therapy that reimprints the inner voice of authority — can deepen this further by replacing any residual inner critical voice with one of genuine kindness and self-compassion, making your access to joy even more stable and unconditional.", practice: "Joy Contagion: Once daily, give one person your full, undivided presence for two minutes — no agenda, no phone, no half-attention. Notice the neurological effect in both of you. Sustained, generous presence is one of the most powerful state-transmission tools available. It deepens your own joy while elevating those around you." } },
        { id: 3, category: "Language", icon: "◈", question: "Did I use words that uplift and help others — and focus on uplifting words around me?", labels: ["Not at all", "Rarely", "Sometimes", "Mostly", "Consistently", "Always"], weight: 1.0, reversed: false,
          module: "NLP Foundations", webinar: "The NLP Foundation Principles Webinar",
          low: { title: "Your Language Is Literally Programming Your Nervous System", analysis: "In NLP, language is understood not as a description of your inner world but as an instruction to it. Every word you use — especially in self-talk — sends a direct signal to your nervous system about what is possible, what is safe, and who you are. Chronic use of closed, limiting language ('I can't', 'I always', 'It's impossible', 'I'm just...') literally hardwires neural pathways that filter out evidence of possibility and amplify evidence of limitation.\n\nThe NLP Foundation Principles program begins with exactly this: a deep audit of your habitual language patterns, both spoken and internal. Through state elicitation, anchoring, and reframing techniques, you learn to catch the language that closes doors — and replace it with language that opens neural pathways toward new results.", process: "The NLP process of Anchoring Positive Emotional States is particularly relevant here. When you anchor positive states to specific language patterns — 'I am capable of...', 'What if I could...', 'I am learning to...' — you begin creating an automatic positive neurological response to possibility-language. This is not willpower. It is conditioning.", practice: "The Language Swap: This week, identify one phrase you use regularly that closes possibility. Common examples: 'I can't afford it', 'I'm terrible at that', 'That's just how I am'. Replace it with a question that opens possibility: 'How could I...?', 'What if I were capable of...?', 'What would need to be true for this to work?' Questions bypass the critical faculty of the conscious mind and go directly to the unconscious for answers." },
          high: { title: "Your Language Is Creating Your World — Keep Elevating It", analysis: "Consistent use of uplifting, possibility-rich language is one of the clearest external markers of a well-calibrated nervous system. NLP research confirms what your score reflects: people who habitually use empowering linguistic patterns experience higher wellbeing, more resilient responses to setbacks, and measurably greater positive influence on those around them.", process: "The Communication from the Heart webinar offers the next level of language mastery for you — moving from positive self-language into the five levels of communication and the art of becoming the most impactful communicator in any room.", practice: "Language Leadership: Begin consciously noticing when people around you use closed, limiting language. Rather than correcting them, model an alternative by asking an opening question. 'What if...' and 'How might you...' are two of the most powerful coaching openers available. You are already practicing this skill — formalise it." } },
        { id: 4, category: "Progress", icon: "▲", question: "Did I make meaningful progress towards my goals today?", labels: ["None at all", "Tiny step", "Some progress", "Good progress", "Strong progress", "Absolutely yes"], weight: 1.1, reversed: false,
          module: "Values, Motivation & Unconscious Resistance", webinar: "The Ultimate Freedom Webinar + Stepping Into Wealth Webinar",
          low: { title: "Stalled Progress Has a Root Cause — and It Is Not Laziness", analysis: "When progress consistently stalls despite genuine effort and clear intention, the block is almost never a strategy problem. It is an unconscious resistance problem. Part of your nervous system — operating below conscious awareness — has formed a belief that arriving at your goal is in some way unsafe: it might mean more responsibility, loss of belonging, exposure to judgment, or the terrifying possibility of still not being enough even after achieving it.\n\nThe Ultimate Freedom program addresses the six specific reasons behind self-sabotage, along with the three-step solution to each. The Stepping Into Wealth program adds the dimension of financial and achievement identity — exploring how your internal 'thermostat' for success has been set, often in early childhood, and how to raise it deliberately through NLP and identity reprogramming tools.", process: "The Gift process is powerfully effective for unlocking stalled progress. When the emotional charge is released from past experiences of failure, disappointment, or criticism, the unconscious resistance that has been protecting you from risking again begins to dissolve. People describe experiencing sudden motivation and energy after clearing these emotional blocks — often toward the very goals they had been avoiding.", practice: "The Payoff Question: Ask yourself with genuine curiosity — 'What am I getting from NOT making progress on this goal?' Write down the honest answer without judgment. The answer is always something: comfort, certainty, protection from failure, belonging, safety. Naming the hidden payoff is the essential first step to releasing it. You cannot dissolve what you cannot see." },
          high: { title: "Momentum Is Working — Now Align It With Your Deepest Why", analysis: "Consistent daily progress signals strong values alignment and a nervous system that is not running significant unconscious resistance in this area. This is worth recognising — most people experience chronic friction between what they say they want and what they unconsciously do. You have broken through that barrier in an important way.", process: "The Design Your Identity webinar is your natural next step. When progress is flowing, the power move is to anchor the identity of 'someone who consistently achieves' into your nervous system at a deep level — so that progress becomes an expression of who you are rather than something you have to motivate yourself toward.", practice: "The 90-Day Vision: Write a vivid, present-tense description of where you will be in 90 days if your current momentum continues. Read it aloud each morning. This activates the unconscious mind as a co-creator of your results rather than a passive observer." } },
        { id: 5, category: "Identity", icon: "◉", question: "Did I act from my new, chosen identity today — not my old story?", labels: ["Not once", "Rarely", "A few times", "Often", "Strongly", "Completely"], weight: 1.1, reversed: false,
          module: "Beliefs & Identity Redesign", webinar: "The Design Your Identity Webinar",
          low: { title: "Your Old Identity Is Still Running the Show", analysis: "Identity is not who you consciously think you are. It is the collection of 'I am' statements your nervous system has accepted as true — most of them formed before the age of ten, in response to experiences you had little power to interpret accurately at the time. These beliefs operate automatically, filtering every experience to confirm themselves and generating behaviour that is consistent with their content.\n\nWhen you act from your old story, you are not being weak or undisciplined. You are being neurologically consistent with your deepest programming. The Design Your Identity program addresses this directly: by discovering which 'I am' statements are quietly running your life, and using incantations, anchoring, and timeline work to install new, chosen identity statements that align with who you are becoming.", process: "The Womb of Eternity process is the most powerful intervention available for identity work. By reimprinting the voice of authority in your inner world — replacing the critical, diminishing inner voice with one of genuine self-belief and possibility — you create the neurological space for a new identity to take root and grow. This is not about affirmations that feel hollow. This is about changing the source code.", practice: "Identity Declaration: Write and complete this sentence: 'I am no longer the person who ___. I am now the person who ___.' Be specific and emotionally engaged. Read it aloud each morning for 21 consecutive days. The combination of repetition and emotional activation is the mechanism by which new neural grooves are formed — the old story loses its grip not through suppression but through replacement." },
          high: { title: "You Are Living From Your Chosen Identity — Now Deepen the Roots", analysis: "Acting consistently from a chosen, intentional identity is the master skill of personal transformation — and you are practising it. In the AccessWorld curriculum, this level of identity alignment is where coaching capacity naturally begins to emerge. When you have done the work to live from your chosen self, you develop a natural ability to recognise the identity patterns in others and know how to help them shift.", process: "The NLP Foundation Principles program offers the next layer for you: learning how to use state elicitation, anchoring, and reframing to help others access and install new identity states — the same tools you have been applying to yourself.", practice: "Identity Expansion: Each week, deliberately act as the next version of yourself — the person you are becoming, not just the person you have become. Stretch into one behaviour, one conversation, or one decision that this expanded self would make. Growth at the identity level always precedes growth in results." } },
        { id: 6, category: "Wellbeing", icon: "⬡", question: "Did I honour my body and my health today — movement, nourishment, rest?", labels: ["Ignored it", "Barely", "Somewhat", "Mostly", "Well", "Absolutely yes"], weight: 1.0, reversed: false,
          module: "Health Mind Repatterning", webinar: "The Ultimate Health Webinar",
          low: { title: "Your Body Is the Instrument — Not the Vehicle", analysis: "Your body is not simply a vehicle for transporting your head. It is the biological instrument through which you experience every emotion, every thought, every relationship, and every moment of your life. When physical care is low — through poor sleep, minimal movement, or nutrition that undermines neurological function — you are creating a chemical environment in your brain that makes happiness, clarity, and sustained energy biologically harder to access.\n\nThe Ultimate Health webinar addresses this through the lens of mindset as much as physiology: it includes the NLP Swish Pattern applied to food choices and health behaviours, helping you to change the way you think and feel about health habits at a neurological level. The result is that healthy choices begin to feel natural rather than forced — because the nervous system has been reprogrammed to support them.", process: "The Swish Pattern — a core NLP technique taught in the AccessWorld Health program — is specifically designed to replace automatic, unhealthy behavioural responses with new, energising ones. Rather than using willpower (which depletes), it rewires the unconscious trigger itself so that the new behaviour becomes the path of least resistance.", practice: "The Minimum Viable Dose: This week, commit to three non-negotiables — 10 minutes of movement, one genuinely nourishing meal, and a consistent sleep/wake time. These are not goals. They are identity markers. Each time you honour them, you send a message to your nervous system: 'I am someone who cares for this body.' Stack these wins daily." },
          high: { title: "You Are Honouring the Instrument — Keep It Non-Negotiable", analysis: "Physical self-care at a consistent level creates a neurological foundation that amplifies everything else in your life. You are generating the biochemical conditions — through movement, nourishment, and rest — that support a regulated nervous system, elevated mood, sharp cognition, and sustained energy.", process: "The Ultimate Health program's advanced content on using the mind-body connection for healing offers powerful tools for anyone at your level who wants to move from good health to exceptional vitality — including psychosomatic neuromodulation techniques for communicating directly with the unconscious mind about physical wellbeing.", practice: "Body Check-In: Once daily, pause for 60 seconds and ask your body: 'What do you need right now?' Not your mind — your body. The answer will come as a sensation, an impulse, or a quiet knowing. Honouring it deepens the mind-body connection that underpins long-term health." } },
        { id: 7, category: "Mental Health", icon: "◎", question: "How much did feelings of anxiety or depression affect my day?", labels: ["Overwhelmed me", "Strong impact", "Noticeable", "Mild", "Very little", "Not at all"], weight: 1.3, reversed: true,
          note: "0 = overwhelmed by anxiety/depression · 5 = completely free", module: "Emotional Clearing & NSR", webinar: "The NSR Webinar + The Emotional Clearing Webinar + Eliminate Physical and Emotional Pain Webinar",
          low: { title: "Anxiety and Depression Are Neurological Patterns — Not Life Sentences", analysis: "When anxiety or depression significantly impacts your daily life, it deserves your full and compassionate attention first — before any other area of growth. These are not character flaws or signs of weakness. They are the nervous system's learned response to perceived threat, often rooted in experiences from the past that have left a residual emotional charge in the body and mind.\n\nThe NSR methodology offers a specific and powerful pathway through this. The four core processes — The Gift, The Grey Room, The Womb of Eternity, and Space Odyssey — each address different dimensions of the anxiety and depression cycle. The Gift and Grey Room work directly on the emotional imprints driving the pattern. The Womb of Eternity addresses the inner critical voice that feeds depressive thinking. Space Odyssey neutralises the emotional charge of specific memories so that they no longer trigger the anxiety response.\n\nImportant: if you are experiencing severe mental health symptoms, please also seek support from a qualified mental health professional alongside this work. These tools are powerful complements to professional care, not replacements for it.", process: "The Eliminate Physical and Emotional Pain program includes a step-by-step process for communicating directly with the unconscious mind using psychosomatic neuromodulation — bypassing the conscious mind to address the source of emotional pain at the level where it actually lives. The three prerequisites to pain elimination taught in this program give you a clear framework for understanding your own experience.", practice: "The NSR Breath Reset: When anxiety activates, it hijacks your prefrontal cortex — the thinking brain — and hands control to the amygdala — the threat brain. The fastest circuit-breaker is physiological: breathe in for 4 counts, hold for 4, out for 8. The extended exhale activates the parasympathetic nervous system directly. Do this for 3 cycles before responding to anything that feels threatening." },
          high: { title: "Emotional Freedom Is Your Operating Platform — Protect and Expand It", analysis: "Operating largely free from anxiety and depression dominating your daily experience creates the neurological space for everything else to flourish. This is not a small thing. Many people spend years working toward the level of inner freedom you are currently experiencing. The NSR principle at this level is sustainability: ensuring the practices that maintain your freedom are embedded deeply enough that they hold even under high-pressure conditions.", process: "The Space Odyssey process is ideal for maintaining and deepening this freedom — it can be used proactively to neutralise any emerging emotional residue before it builds into a pattern, keeping your nervous system clear and responsive.", practice: "Freedom Maintenance: Identify the two or three practices that most reliably maintain your emotional equilibrium — whether that is breathwork, movement, journalling, connection, or prayer. Treat these as non-negotiable infrastructure. The moment they feel optional is the moment the nervous system begins to drift back toward default patterns." } },
        { id: 8, category: "Agency", icon: "→", question: "Did I consciously CREATE my life today — or did I react to whatever happened?", labels: ["Pure reaction", "Mostly reactive", "Mixed", "Mostly creating", "Strongly creating", "Fully intentional"], weight: 1.3, reversed: false,
          module: "Conscious Creation & Identity Leadership", webinar: "The Design Your Identity Webinar + The NLP Foundation Principles Webinar",
          low: { title: "Reactive Living Is Exhausting — And It Is a Nervous System Pattern", analysis: "Reactive living — being constantly at the mercy of external events, other people's moods, and circumstances you did not choose — is not a personality type. It is a nervous system pattern. When the threat-detection system (amygdala) is chronically activated by unresolved emotional charge, it hijacks executive function and keeps you in a perpetual state of response rather than creation. You are not failing to be intentional. Your nervous system is simply prioritising survival over vision.\n\nThe shift from reaction to creation is the central theme of the NLP Foundation Principles program. Through state management tools, unconscious reprogramming, and the anchoring of positive emotional states to chosen behaviours, you begin to develop the neurological capacity to pause between stimulus and response — and in that pause, to choose who you want to be.", process: "The complete step-by-step process for anchoring positive emotional states into the nervous system — taught in the NLP Foundation Principles program — is the most direct tool for building this capacity. When you can deliberately generate a resourceful state on demand, you are no longer at the mercy of whatever emotional weather is passing through.", practice: "The Creator's Pause: Before your day begins — before the first message, the first demand, the first external input — take 3 minutes to answer this question in writing: 'Who am I choosing to be today, and what is one thing only that person would do?' This practice is not motivational. It is neurological. You are programming your reticular activating system to filter the day through the lens of your chosen identity." },
          high: { title: "You Are the Author — Now Lead Others to Write Their Own Story", analysis: "Acting as the conscious creator of your life — responding intentionally rather than reacting automatically — is the apex skill of personal development. It reflects a well-regulated nervous system, a chosen identity that is stronger than circumstance, and a values framework that guides decision-making even under pressure. You are living proof that this is possible.", process: "The Become a World-Class Coach training is a natural next expression of this capacity. When you have learned to author your own life, you develop an instinctive ability to see the patterns in others' stories and to ask the questions that open the door to their own conscious creation. This is not a career pivot — it is an expansion of the work you are already doing on yourself.", practice: "Leadership by Example: Identify one person in your life who is stuck in reactive patterns. Without advice or instruction, simply model conscious creation in their presence — show up with intention, respond rather than react, and choose your state deliberately. Your nervous system speaks to theirs. Watch what shifts." } }
      ];
      
      // ----- TIERS (Happiness Levels) -----
      const TIERS = [
        { min: 0, max: 1.5, label: "Absence of Happiness", arcColor: "#C0392B", message: "Right now life feels heavy — and that is real. This is not a judgment. It is a starting point. The fact that you answered these questions honestly shows a courage that most people never access.", p1intro: "What this assessment has revealed is that your nervous system is currently carrying a significant load — emotionally, mentally, and energetically. This is not a life sentence. It is a description of a learned neurological pattern that can be changed. The tools, processes, and community of AccessWorld Seminars have been specifically designed for exactly this starting point.", tier_note: "Priority focus: Nervous System Regulation before all else. Until the nervous system is brought into a more regulated state, progress in other areas will remain inconsistent. This is not a limitation — it is a sequence." },
        { min: 1.5, max: 2.5, label: "Unhappiness", arcColor: "#E67E22", message: "You are getting through each day — and that takes more strength than most people acknowledge. But surviving and thriving are not the same thing, and you already sense that something more is possible.", p1intro: "Your assessment shows a person who is fundamentally capable and resilient, but whose nervous system is running enough unconscious resistance to keep thriving just out of reach. The gap between where you are and where you want to be is not a talent gap — it is an emotional clearing gap. The right tools, applied consistently, close that gap faster than you might imagine.", tier_note: "Priority focus: Emotional Clearing and Identity work. These two dimensions, addressed together, produce the most rapid and lasting shift for people at this level." },
        { min: 2.5, max: 3.5, label: "Fine / Neutral", arcColor: "#C9A84C", message: "You are genuinely growing — and more is going right than you probably give yourself credit for. The work now is precision: identifying the specific leverage points that will create disproportionate improvement.", p1intro: "Your assessment reflects a person in active, genuine growth — with real momentum and real capacity. The NSR lens on your results shows that some areas of your nervous system are well-regulated and resourceful, while others still carry patterned responses that are limiting your full expression. Targeted work in these areas will accelerate your trajectory significantly.", tier_note: "Priority focus: The two or three dimensions scoring lowest. At your level, broad-spectrum work is less important than precision. Find the specific emotional or identity blocks and clear them directly." },
        { min: 3.5, max: 4.5, label: "Happiness", arcColor: "#27AE60", message: "You are living with real intention and generating real results. Your nervous system is largely regulated, your identity is largely chosen, and life is responding to how you show up. You are close to extraordinary.", p1intro: "This assessment reflects a person operating at a genuinely elevated level across most dimensions of daily living. From an NSR perspective, your nervous system is largely regulated, your emotional access is strong, and your capacity for conscious creation is well-developed. The work at this level is refinement and deepening — and often, the turning of your gifts outward in service of others.", tier_note: "Priority focus: Depth over breadth. The final shifts that separate thriving from truly flourishing are almost always found in the dimensions that still feel effortful — and in the expansion of your gifts into genuine leadership and service." },
        { min: 4.5, max: 5.01, label: "Elevated Happiness", arcColor: "#C9A84C", message: "You are living at a remarkable level of conscious, joyful engagement with your life. This is rare. It is the result of real work, real choices, and real courage. Your next mission: help others find what you have found.", p1intro: "This assessment reflects a person operating at the highest level of the happiness scale — not through luck or circumstance, but through the kind of consistent inner work and conscious living that most people aspire to but few sustain. From an NSR perspective, your nervous system is well-regulated, your identity is intentional, and your emotional access is rich. The question at this level is not how to improve yourself — it is how to multiply your impact.", tier_note: "Priority focus: Legacy and leadership. The most meaningful growth at this level comes through coaching, mentoring, and helping others access what you have built. The Become a World-Class Coach program was created for exactly this." }
      ];
      
      // ----- Helper Functions -----
      function calcScore(answers) {
        let total = 0, ws = 0;
        QUESTIONS.forEach(q => {
          const v = answers[q.id];
          if (v === undefined) return;
          const n = q.reversed ? 5 - v : v;
          total += n * q.weight;
          ws += 5 * q.weight;
        });
        return ws > 0 ? (total / ws) * 5 : 0;
      }
      
      function getTier(score) {
        return TIERS.find(t => score >= t.min && score < t.max) || TIERS[TIERS.length-1];
      }
      
      function getFocusSorted(answers) {
        return QUESTIONS.map(q => {
          const v = answers[q.id] ?? 0;
          const eff = q.reversed ? 5 - v : v;
          return { ...q, rawVal: v, eff };
        }).sort((a, b) => a.eff - b.eff);
      }
      
      // ----- React App -----
      const { useState } = React;
      
      function App() {
        const [phase, setPhase] = useState("landing");
        const [qIdx, setQIdx] = useState(0);
        const [answers, setAnswers] = useState({});
        const [selected, setSelected] = useState(null);
        const [animOut, setAnimOut] = useState(false);
        const [score, setScore] = useState(0);
        const [tier, setTier] = useState(null);
        const [name, setName] = useState("");
        const [phone, setPhone] = useState("");
        const [email, setEmail] = useState("");
        const [err, setErr] = useState("");
        
        const q = QUESTIONS[qIdx];
        const prog = (qIdx / QUESTIONS.length) * 100;
        const bc = tier ? tier.arcColor : "#C9A84C";
        const sp = (score / 5) * 100;
        const fn = name.split(" ")[0] || "there";
        
        function nextQuestion() {
          if (selected === null) return;
          const newAnswers = { ...answers, [q.id]: selected };
          setAnswers(newAnswers);
          setAnimOut(true);
          setTimeout(() => {
            if (qIdx < QUESTIONS.length - 1) {
              setQIdx(qIdx + 1);
              setSelected(null);
              setAnimOut(false);
            } else {
              const s = calcScore(newAnswers);
              setScore(s);
              setTier(getTier(s));
              setPhase("capture");
              setAnimOut(false);
            }
          }, 280);
        }
        
        async function captureAndContinue() {
          if (!name.trim()) { setErr("Please enter your full name."); return; }
          if (!phone.trim()) { setErr("Please enter your phone number."); return; }
          if (!email.includes("@")) { setErr("Please enter a valid email address."); return; }
          setErr("");
          
          // Send to Zapier if webhook is configured
          if (ZAPIER_WEBHOOK) {
            try {
              await fetch(ZAPIER_WEBHOOK, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  name, phone, email,
                  score: score.toFixed(2),
                  tier: tier.label,
                  answers: answers,
                  timestamp: new Date().toISOString()
                })
              });
            } catch(e) { console.error("Zapier error:", e); }
          }
          
          setPhase("results");
        }
        
        function resetApp() {
          setPhase("landing");
          setQIdx(0);
          setAnswers({});
          setSelected(null);
          setScore(0);
          setTier(null);
          setName("");
