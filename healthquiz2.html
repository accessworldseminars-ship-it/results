<!DOCTYPE html>
<html>
<head>
    <title>Telegram Test - Simple</title>
</head>
<body>
    <h1>Telegram Test</h1>
    <button id="testBtn">Send Test Message to Telegram</button>
    <p id="result"></p>

    <script>
        // ⚠️ ONLY CHANGE THESE 2 LINES ⚠️
        const BOT_TOKEN = "8155100717:AAHrhehNUzIY2ArY2FUtEvSbFzkzRDciWmk";
        const CHAT_ID = "5970521104";
        // ⚠️ NOTHING ELSE BELOW THIS LINE ⚠️

        async function sendMessage() {
            const resultDiv = document.getElementById("result");
            
            if (BOT_TOKEN === "YOUR_BOT_TOKEN_HERE") {
                resultDiv.innerHTML = "❌ Please put your bot token in the BOT_TOKEN variable (line 10)";
                return;
            }
            
            if (CHAT_ID === "YOUR_CHAT_ID_HERE") {
                resultDiv.innerHTML = "❌ Please put your chat ID in the CHAT_ID variable (line 11)";
                return;
            }
            
            resultDiv.innerHTML = "⏳ Sending...";
            
            const message = "✅ Test from HTML! Time: " + new Date().toLocaleTimeString();
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(message)}`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.ok) {
                    resultDiv.innerHTML = "✅ SUCCESS! Check your Telegram now.";
                } else {
                    resultDiv.innerHTML = "❌ Error: " + data.description;
                }
            } catch (err) {
                resultDiv.innerHTML = "❌ Fetch failed: " + err.message;
            }
        }
        
        document.getElementById("testBtn").onclick = sendMessage;
    </script>
</body>
</html>
