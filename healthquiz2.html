<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AccessWorld · Cellular Vitality Quiz</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 10% 20%, #0a0f1c, #03060c);
      font-family: 'Montserrat', sans-serif;
      color: #eef2ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
    }

    /* GIANT WATERMARK LOGO IN BACKGROUND */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('https://i.ibb.co/ynXdYpmL/worldjjpgsf.png');
      background-repeat: no-repeat;
      background-position: center center;
      background-size: 50%;
      opacity: 0.07;
      pointer-events: none;
      z-index: 0;
    }

    .quiz-container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 750px;
      margin: 0 auto;
    }

    /* CARD STYLES – each question / teaching page is a distinct card */
    .card {
      background: rgba(10, 18, 28, 0.85);
      backdrop-filter: blur(12px);
      border-radius: 2.5rem;
      padding: 2.2rem 2rem;
      box-shadow: 0 30px 45px -20px rgba(0,0,0,0.6), 0 0 0 1px rgba(201, 168, 76, 0.2);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      animation: fadeSlideUp 0.4s ease-out;
    }

    /* HOVER POP EFFECT */
    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 40px 55px -20px black, 0 0 0 1px rgba(201, 168, 76, 0.5);
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(20px);}
      to { opacity: 1; transform: translateY(0);}
    }

    h1, h2, h3 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    .gold {
      color: #C9A84C;
    }

    .btn {
      background: transparent;
      border: 1.5px solid #C9A84C;
      color: #C9A84C;
      padding: 0.8rem 2rem;
      border-radius: 60px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Montserrat', sans-serif;
      font-size: 1rem;
      margin-top: 1rem;
    }

    .btn-primary {
      background: #C9A84C;
      color: #0a0f1c;
      border: none;
      font-weight: 700;
    }

    .btn-primary:hover {
      background: #b6902e;
      transform: translateY(-3px);
    }

    .btn:hover {
      background: #C9A84C;
      color: #0a0f1c;
      transform: translateY(-2px);
    }

    /* scale for answers */
    .scale-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin: 2rem 0 1rem;
      justify-content: center;
    }
    .scale-opt {
      background: rgba(255,255,245,0.05);
      border-radius: 80px;
      padding: 0.6rem 1rem;
      min-width: 65px;
      text-align: center;
      cursor: pointer;
      border: 1px solid rgba(201, 168, 76, 0.3);
      transition: 0.1s;
      font-weight: 500;
    }
    .scale-opt.selected {
      background: #C9A84C;
      color: #0a0f1c;
      border-color: #C9A84C;
      font-weight: 700;
    }

    .progress-ring {
      margin-bottom: 1.5rem;
      text-align: center;
    }
    .progress-steps {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .step-dot {
      width: 10px;
      height: 10px;
      background: #2a3a55;
      border-radius: 10px;
      transition: all 0.2s;
    }
    .step-dot.active {
      background: #C9A84C;
      width: 24px;
    }

    input {
      width: 100%;
      padding: 1rem;
      background: #0e1624;
      border: 1px solid #2c3b55;
      border-radius: 2rem;
      color: white;
      margin-bottom: 1rem;
      font-size: 1rem;
    }

    .teaching-img {
      max-width: 100%;
      border-radius: 1.5rem;
      margin: 1rem 0;
      box-shadow: 0 10px 20px -5px black;
    }

    .report-section {
      background: rgba(8, 14, 22, 0.9);
      border-radius: 2rem;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      border-left: 4px solid #C9A84C;
    }

    footer {
      text-align: center;
      font-size: 0.75rem;
      margin-top: 2rem;
      opacity: 0.7;
    }

    @media (max-width: 600px) {
      .card { padding: 1.5rem; }
      .scale-opt { min-width: 52px; font-size: 0.8rem; }
    }
  </style>
</head>
<body>
<div class="quiz-container" id="app"></div>

<script>
  // ------------------- TELEGRAM CONFIG (Only 2 lines to edit) -----------------
  const TELEGRAM_BOT_TOKEN = "YOUR_BOT_TOKEN_HERE";   // <-- REPLACE WITH YOUR TOKEN
  const TELEGRAM_CHAT_ID = "YOUR_CHAT_ID_HERE";       // <-- REPLACE WITH YOUR CHAT ID
  // ---------------------------------------------------------------------------

  // ---------- 11 HEALTH QUESTIONS ----------
  const QUESTIONS = [
    { id: 0, text: "I breathe using my belly (diaphragm) with shoulders relaxed, not shallow chest breathing.", category: "Breathwork" },
    { id: 1, text: "I can hold my breath after exhale for at least 30 seconds comfortably.", category: "Lung Capacity" },
    { id: 2, text: "I eat fresh fruits/vegetables daily and avoid hybridized wheat (white bread/pasta).", category: "Diet" },
    { id: 3, text: "I consume healing foods: coriander/cilantro, celery juice, zucchini/squash weekly.", category: "Food as Medicine" },
    { id: 4, text: "My energy is stable throughout the day (no afternoon crash or sugar cravings).", category: "Energy" },
    { id: 5, text: "I move my body daily to stimulate lymphatic flow (bouncing, walking, rebounder).", category: "Mobility & Lymph" },
    { id: 6, text: "I avoid processed sugar & excess dairy to reduce brain fog and metal toxicity.", category: "Mindset & Clarity" },
    { id: 7, text: "I feel I'm proactively alkalizing my body (reduce acid, increase alkaline foods).", category: "Alkaline Balance" },
    { id: 8, text: "I can get up from the floor without using my hands.", category: "Mobility" },
    { id: 9, text: "I incorporate posture exercises or stretching at least once each week.", category: "Posture & Flexibility" },
    { id: 10, text: "I prioritise my health even when life gets busy or I have a lot on my plate.", category: "Mindset" }
  ];

  // -------- TEACHING PAGES (separate screens after Q3, Q6, Q9) ----------
  const TEACHING_SCREENS = {
    3: { title: "AI + Nervous System", 
         quote: "Your brain is a pharmaceutical factory. You are not a passive victim of fleeting chemistry.",
         image: "https://i.ibb.co/4Zd4RVbR/Gemini-Generated-Image-o877d1o877d1o877.png",
         headline: "AccessWorld seminars has more impact thanks to AI integration." },
    6: { title: "Feel good for no good reason",
         quote: "Feelings are not fate. They are habits.",
         image: "https://i.ibb.co/r2T9kL99/Gemini-Generated-Image-tea7prtea7prtea7.png",
         headline: "AccessWorld seminars helps individuals feel good for no good reason." },
    9: { title: "Mindset Coaching Works",
         quote: "Calm is the container that holds everything else together.",
         image: "https://i.ibb.co/97mZvc6/Screenshot-2026-01-29-105636.png",
         headline: "AccessWorld seminars Mindset Coaching works – Make more money and improve your life" }
  };

  // ---------- GLOBAL STATE ----------
  let step = "intro";          // intro, preSegments, quiz, teaching, contact, report
  let currentQuestionIdx = 0;
  let answers = new Array(QUESTIONS.length).fill(null);
  
  // pre-quiz data (first part)
  let userSegment = "";
  let userGoal = "";
  let userHealthFocus = "";
  let userLearnPref = "";
  
  // contact info
  let userName = "", userEmail = "", userPhone = "";
  
  // computed report data
  let finalScore = 0;
  let categoryAvgs = {};
  let tierLabel = "";
  let notificationSent = false;

  // Helper: fetch tier
  function getTierData(avg) {
    if (avg < 1.8) return { label: "Acidic Overload", msg: "Your terrain is highly acidic. Immediate lifestyle shift needed." };
    if (avg < 2.6) return { label: "Compensation Mode", msg: "Cells lack oxygen & alkaline minerals." };
    if (avg < 3.5) return { label: "Transitioning Vitality", msg: "Your body is ready to heal with breath & whole foods." };
    if (avg < 4.3) return { label: "Alkaline Momentum", msg: "Keep expanding lung capacity & green juices." };
    return { label: "Cellular Mastery", msg: "Exceptional! Alkaline & oxygen-rich environment." };
  }

  async function sendTelegramNotification() {
    if (!TELEGRAM_BOT_TOKEN || TELEGRAM_BOT_TOKEN === "YOUR_BOT_TOKEN_HERE") return false;
    if (!TELEGRAM_CHAT_ID || TELEGRAM_CHAT_ID === "YOUR_CHAT_ID_HERE") return false;
    const total = answers.reduce((a,b)=>a+b,0);
    const avg = total / QUESTIONS.length;
    const tier = getTierData(avg).label;
    const message = `🔥 NEW COACHING LEAD (Quiz)\n\nName: ${userName}\nEmail: ${userEmail}\nPhone: ${userPhone}\nSegment: ${userSegment}\nGoal: ${userGoal}\nHealth focus: ${userHealthFocus}\nLearning: ${userLearnPref}\nScore: ${avg.toFixed(1)}/5 (${tier})\n⏰ ${new Date().toLocaleString()}`;
    try {
      const res = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: message, parse_mode: "Markdown" })
      });
      return res.ok;
    } catch(e) { return false; }
  }

  function computeCategoryAverages() {
    const sums = {}, counts = {};
    QUESTIONS.forEach(q => {
      const val = answers[q.id] ?? 0;
      sums[q.category] = (sums[q.category] || 0) + val;
      counts[q.category] = (counts[q.category] || 0) + 1;
    });
    const avgs = {};
    for (let c in sums) avgs[c] = sums[c] / counts[c];
    return avgs;
  }

  // Helper to render progress dots (just visual)
  function renderProgressDots(current, total) {
    let html = `<div class="progress-steps">`;
    for (let i = 0; i < total; i++) {
      html += `<div class="step-dot ${i === current ? 'active' : ''}"></div>`;
    }
    html += `</div>`;
    return html;
  }

  const root = document.getElementById("app");

  // ---------- RENDER ENGINE ----------
  function render() {
    if (step === "intro") renderIntro();
    else if (step === "preSegments") renderPreSegments();
    else if (step === "quiz") renderQuizStep();
    else if (step === "teaching") renderTeachingStep();
    else if (step === "contact") renderContactStep();
    else if (step === "report") renderComprehensiveReport();
  }

  // ------------- INTRO (simple, spacious) -------------
  function renderIntro() {
    root.innerHTML = `
      <div class="card" style="text-align:center;">
        <div class="tag-3min" style="font-family: monospace; letter-spacing:2px;">⚡ 3 MINUTE QUIZ</div>
        <h1 style="font-size:2.8rem;">Cellular Vitality<br>Audit</h1>
        <p style="margin:1rem 0 0.5rem;">Based on AccessWorld Seminars · Breathwork · Alkaline Principle</p>
        <div style="margin:1.5rem 0;">
          <p class="gold">“Your nervous system is your most powerful asset. It can be reprogrammed by experience.”</p>
        </div>
        <button class="btn btn-primary" id="startBtn">🌿 Start My Health Audit →</button>
        <footer style="margin-top:2rem;">We have helped hundreds gain confidence, health & happiness</footer>
      </div>
    `;
    document.getElementById("startBtn")?.addEventListener("click", () => {
      step = "preSegments";
      render();
    });
  }

  // ---------- PRE-QUIZ: segment / goal / focus / learning style (one by one but compact) ----------
  function renderPreSegments() {
    root.innerHTML = `
      <div class="card">
        <h2 style="margin-bottom:1.5rem;">Before we dive deep<span class="gold">.</span></h2>
        <div id="preStepContainer"></div>
        <div style="text-align:center; margin-top:1rem;"><button class="btn" id="preResetBtn">Back</button></div>
      </div>
    `;
    let preStep = 0;
    const steps = [
      { question: "Which best describes you?", options: ["The Burned Out & Bottomed Out","The Yo-Yo Warrior","The Peak Performer","The Health Mystery Solver","The Life-Transition Seeker"], key: "segment" },
      { question: "What are you wanting to improve?", options: ["Improve energy","Improve sleep","Improve mental clarity"], key: "goal", extraMsg: "energy" },
      { question: "Select your main health focus", options: ["Eat better","Muscle tone","Breathing","Posture","Exercise"], key: "focus" },
      { question: "Preferred way to learn", options: ["Watch or attend Seminars","1 on 1 coaching","Group discussion","Reading"], key: "learn" }
    ];
    function renderPreStep() {
      const s = steps[preStep];
      let extraHtml = "";
      if (s.key === "goal" && userGoal === "Improve energy") extraHtml = `<p class="gold" style="margin-top:0.5rem;">✨ Great choice! Energy is the most important benefit when you focus on health.</p>`;
      const container = document.getElementById("preStepContainer");
      if (!container) return;
      container.innerHTML = `
        <h3>${s.question}</h3>
        <div style="display:flex; flex-direction:column; gap:0.8rem; margin: 1.5rem 0;">
          ${s.options.map(opt => `<button class="btn option-btn" data-val="${opt}">${opt}</button>`).join('')}
        </div>
        ${extraHtml}
        <div style="display:flex; justify-content:space-between; margin-top:0.5rem;">
          <button class="btn" id="prePrevBtn" ${preStep===0 ? 'disabled style="opacity:0.4;"' : ""}>← Prev</button>
          <button class="btn btn-primary" id="preNextBtn" ${(steps[preStep].key==="segment" && !userSegment) || (steps[preStep].key==="goal" && !userGoal) || (steps[preStep].key==="focus" && !userHealthFocus) || (steps[preStep].key==="learn" && !userLearnPref) ? 'disabled' : ""}>${preStep===steps.length-1 ? "Start Quiz →" : "Next"}</button>
        </div>
      `;
      document.querySelectorAll(".option-btn").forEach(btn => {
        btn.addEventListener("click", (e) => {
          const val = e.target.dataset.val;
          if (s.key === "segment") userSegment = val;
          if (s.key === "goal") userGoal = val;
          if (s.key === "focus") userHealthFocus = val;
          if (s.key === "learn") userLearnPref = val;
          renderPreStep();
        });
      });
      document.getElementById("prePrevBtn")?.addEventListener("click", () => { if(preStep>0) { preStep--; renderPreStep(); } });
      document.getElementById("preNextBtn")?.addEventListener("click", () => {
        if (s.key === "segment" && !userSegment) return;
        if (s.key === "goal" && !userGoal) return;
        if (s.key === "focus" && !userHealthFocus) return;
        if (s.key === "learn" && !userLearnPref) return;
        if (preStep === steps.length-1) {
          step = "quiz";
          currentQuestionIdx = 0;
          render();
        } else {
          preStep++;
          renderPreStep();
        }
      });
    }
    renderPreStep();
    document.getElementById("preResetBtn")?.addEventListener("click", () => { step = "intro"; render(); });
  }

  // ------------- QUIZ QUESTION (one at a time, hover pop) -------------
  function renderQuizStep() {
    const q = QUESTIONS[currentQuestionIdx];
    const selected = answers[q.id];
    const totalQ = QUESTIONS.length;
    const progressPercent = (currentQuestionIdx / totalQ) * 100;
    root.innerHTML = `
      <div class="card">
        <div class="progress-ring">${renderProgressDots(currentQuestionIdx, totalQ)}</div>
        <div style="width:100%; background:#2a3650; height:4px; border-radius:10px; margin-bottom:1.8rem;"><div style="width:${progressPercent}%; background:#C9A84C; height:4px; border-radius:10px;"></div></div>
        <h2 style="font-size:1.8rem; margin-bottom:1rem;">${q.text}</h2>
        <div class="scale-group" id="scaleGroup"></div>
        <div style="display:flex; justify-content:space-between; margin-top:2rem;">
          <button class="btn" id="quizPrevBtn" ${currentQuestionIdx===0 ? 'disabled style="opacity:0.4;"' : ""}>← Previous</button>
          <button class="btn btn-primary" id="quizNextBtn">${currentQuestionIdx === totalQ-1 ? "Complete →" : "Next"}</button>
        </div>
      </div>
    `;
    const scaleGroup = document.getElementById("scaleGroup");
    for (let i=0;i<=5;i++) {
      const optDiv = document.createElement("div");
      optDiv.className = `scale-opt ${selected === i ? 'selected' : ''}`;
      optDiv.innerHTML = `<div style="font-weight:800;">${i}</div><div style="font-size:0.7rem;">${i === 0 ? "Never" : i===1?"Rarely":i===2?"Sometimes":i===3?"Often":i===4?"Mostly":"Always"}</div>`;
      optDiv.addEventListener("click", () => {
        answers[q.id] = i;
        renderQuizStep();
      });
      scaleGroup.appendChild(optDiv);
    }
    document.getElementById("quizPrevBtn")?.addEventListener("click", () => {
      if(currentQuestionIdx > 0) {
        currentQuestionIdx--;
        render();
      }
    });
    document.getElementById("quizNextBtn")?.addEventListener("click", () => {
      if (answers[q.id] === null || answers[q.id] === undefined) { alert("Please select a rating (0-5)."); return; }
      const isLast = (currentQuestionIdx === totalQ-1);
      if (isLast) {
        // compute final before report
        const sum = answers.reduce((a,b)=>a+b,0);
        finalScore = sum / totalQ;
        categoryAvgs = computeCategoryAverages();
        const tierObj = getTierData(finalScore);
        tierLabel = tierObj.label;
        step = "contact";
        render();
      } else {
        // after answering, check if need to inject teaching screen
        const nextIdx = currentQuestionIdx + 1;
        if (TEACHING_SCREENS[nextIdx]) {
          // store that we need to show teaching before next question
          window.nextAfterTeaching = nextIdx;
          step = "teaching";
          render();
        } else {
          currentQuestionIdx++;
          render();
        }
      }
    });
  }

  // ---------- TEACHING PAGE (separate screen, spacious, infographic) ----------
  function renderTeachingStep() {
    const nextQ = window.nextAfterTeaching;
    const teach = TEACHING_SCREENS[nextQ];
    if (!teach) {
      step = "quiz";
      render();
      return;
    }
    root.innerHTML = `
      <div class="card" style="text-align:center;">
        <h2 class="gold">✨ ${teach.headline}</h2>
        <img src="${teach.image}" class="teaching-img" alt="insight" style="max-width:280px; margin:1rem auto;">
        <div class="report-section" style="background: rgba(0,0,0,0.4);">
          <p class="gold" style="font-size:1.2rem;">“${teach.quote}”</p>
          <p style="margin-top:1rem;">Coaching transforms knowledge into embodied experience.</p>
        </div>
        <button class="btn btn-primary" id="continueTeachingBtn">Continue to next question →</button>
      </div>
    `;
    document.getElementById("continueTeachingBtn")?.addEventListener("click", () => {
      currentQuestionIdx = nextQ;
      step = "quiz";
      render();
    });
  }

  // ---------- CONTACT (name, email, phone) ----------
  function renderContactStep() {
    root.innerHTML = `
      <div class="card">
        <h2>Your Comprehensive Report Awaits</h2>
        <p style="margin:0.5rem 0 1.5rem;">Enter your details to unlock your personalised Cellular Vitality report and get invited to a free session.</p>
        <input type="text" id="contactName" placeholder="Full name" value="${userName}">
        <input type="email" id="contactEmail" placeholder="Email address (required)" value="${userEmail}">
        <input type="tel" id="contactPhone" placeholder="Phone with area code" value="${userPhone}">
        <div style="display:flex; gap:1rem; justify-content:center;">
          <button class="btn" id="backToQuizBtn">← Back</button>
          <button class="btn btn-primary" id="generateReportBtn">📊 Generate My Full Report →</button>
        </div>
      </div>
    `;
    document.getElementById("backToQuizBtn")?.addEventListener("click", () => { step = "quiz"; render(); });
    document.getElementById("generateReportBtn")?.addEventListener("click", async () => {
      const name = document.getElementById("contactName").value.trim();
      const email = document.getElementById("contactEmail").value.trim();
      const phone = document.getElementById("contactPhone").value.trim();
      if (!name || !email) { alert("Please provide name and email to receive your report."); return; }
      userName = name; userEmail = email; userPhone = phone;
      notificationSent = await sendTelegramNotification();
      step = "report";
      render();
    });
  }

  // ---------- COMPREHENSIVE REPORT (full detailed + CTA + footer) ----------
  function renderComprehensiveReport() {
    const avg = finalScore;
    const tierObj = getTierData(avg);
    const sortedCats = Object.entries(categoryAvgs).sort((a,b)=> a[1]-b[1]);
    const lowest = sortedCats.slice(0,3);
    const highest = sortedCats.slice(-2).reverse();
    const answersDetailHtml = QUESTIONS.map((q, idx) => `<div style="margin-bottom:0.6rem;"><span>${q.text.substring(0,70)}...</span> <strong class="gold">${answers[idx]}/5</strong><div style="background:#2a3650; height:4px; border-radius:4px; margin-top:4px;"><div style="width:${(answers[idx]/5)*100}%; background:#C9A84C; height:4px; border-radius:4px;"></div></div></div>`).join('');
    
    root.innerHTML = `
      <div class="card" style="max-width: 900px;">
        <div style="text-align:center;">
          <h1>Your Cellular Vitality Report</h1>
          <div style="font-size:3rem; font-weight:bold; color:#C9A84C;">${avg.toFixed(1)}<span style="font-size:1.2rem;">/5</span></div>
          <div class="progress-bar-bg" style="background:#2a3650; width:80%; margin:0.5rem auto; border-radius:20px;"><div style="width:${(avg/5)*100}%; background:#C9A84C; height:8px; border-radius:20px;"></div></div>
          <h2 class="gold">${tierObj.label}</h2>
          <p>${tierObj.msg}</p>
        </div>
        
        <div class="report-section">
          <h3>📊 Score & Oxygen Blueprint</h3>
          <p><strong>Oxygen status:</strong> ${answers[0] > 3 ? "Diaphragmatic breathing active." : "Shallow chest breathing → switch to belly breaths."}</p>
          <p><strong>Alkaline terrain:</strong> ${answers[7] > 3 ? "Cancer-resistant environment building." : "Acidic overload — add greens + lemon water."}</p>
          <p><strong>Lymphatic flow:</strong> ${answers[5] > 3 ? "Movement clearing toxins." : "Sedentary lymph = stagnation. Start rebounding."}</p>
        </div>

        <div class="report-section">
          <h3>🌱 Priority Healing Areas (lowest scores)</h3>
          ${lowest.map(([cat, sc]) => `<div><strong>${cat}</strong> · ${sc.toFixed(1)}/5<br>✨ Coaching insight: Small daily habit — ${cat.includes("Breath") ? "2 min breath holds" : cat.includes("Diet") ? "celery juice + cilantro" : cat.includes("Mobility") ? "5 min bouncing" : "posture stretches"}</div>`).join('<hr style="opacity:0.2;">')}
        </div>

        <div class="report-section">
          <h3>🏆 Your Strengths</h3>
          ${highest.map(([cat, sc]) => `<div><strong>${cat}</strong> · ${sc.toFixed(1)}/5 — use this as leverage.</div>`).join('')}
        </div>

        <div class="report-section">
          <h3>🧘 Breathwork Protocol (Wim Hof / Pre-oxygenation)</h3>
          <p>${answers[0] < 3 ? "Start belly breathing: 4s inhale, 6s exhale, 10 min daily." : "Advanced: 30 power breaths + 60s retention. Cold exposure amplifies."}</p>
