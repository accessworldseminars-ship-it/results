            let s = 0, c = 0; 
            for (let i = 0; i < answers.length; i++) {

                    c++; 
                } 
            }

            app.appendChild(buildProgressArea());

            app.appendChild(buildContactScreen());
            app.appendChild(buildResultsScreen());
            
            introScreen = document.getElementById('introScreen');
            progressArea = document.getElementById('progressArea');
            questionScreen = document.getElementById('questionScreen');
            contactScreen = document.getElementById('contactScreen');
            resultsScreen = document.getElementById('resultsScreen');
            
            const startBtn = document.getElementById('startQuizBtn');
            const nextBtn = document.getElementById('nextQBtn');
            const prevBtn = document.getElementById('prevQBtn');
            const submitBtn = document.getElementById('submitLeadBtn');
            const printBtn = document.getElementById('printPdfBtn');
            const retakeBtn = document.getElementById('retakeAllBtn');
            
            if (startBtn) startBtn.addEventListener('click', startQuiz);
            if (nextBtn) nextBtn.addEventListener('click', nextQuestion);
            if (prevBtn) prevBtn.addEventListener('click', prevQuestion);
            if (submitBtn) submitBtn.addEventListener('click', submitContact);
            if (printBtn) printBtn.addEventListener('click', function() { window.print(); });
            if (retakeBtn) retakeBtn.addEventListener('click', retakeFull);
            
            document.querySelectorAll('.tab-btn').forEach(function(btn) {
                btn.addEventListener('click', function() {

                    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });

                    document.querySelectorAll('.tab-content').forEach(function(tc, i) {
                        if (i == tab) tc.classList.add('active');
                        else tc.classList.remove('active');

        }
        
        function renderQuestion() {
            const q = QUESTIONS[currentQ];
            const qCat = document.getElementById('qCat');
            const qText = document.getElementById('qText');
            const scaleContainer = document.getElementById('scaleBtns');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            const prevBtn = document.getElementById('prevQBtn');
            const nextBtn = document.getElementById('nextQBtn');
            
            if (qCat) qCat.innerHTML = '⚡ ' + q.category + ' · Question ' + (currentQ+1) + ' of ' + QUESTIONS.length;
            if (qText) qText.innerHTML = q.text;
            
            if (scaleContainer) {
                scaleContainer.innerHTML = '';
                var labels = ['Not at all', 'Slightly', 'Somewhat', 'Mostly', 'Very much', 'Completely'];
                for (var i = 0; i <= 5; i++) {
                    var btn = document.createElement('div');
                    btn.className = 'scale-btn';
                    if (answers[currentQ] === i) btn.className += ' selected';
                    btn.innerHTML = '<span>' + i + '</span><span>' + labels[i] + '</span>';
                    btn.addEventListener('click', (function(score) {
                        return function() { 
                            answers[currentQ] = score; 
                            renderQuestion(); 
                        };
                    })(i));
                    scaleContainer.appendChild(btn);
                }
            }
            
            if (progressFill) progressFill.style.width = ((currentQ + 1) / QUESTIONS.length) * 100 + '%';
            if (progressText) progressText.innerHTML = 'Question ' + (currentQ + 1) + ' of ' + QUESTIONS.length;
            if (prevBtn) prevBtn.disabled = (currentQ === 0);
            
            var hasAns = answers[currentQ] !== null;
            if (nextBtn) {
                nextBtn.style.opacity = hasAns ? '1' : '0.6';
                nextBtn.style.cursor = hasAns ? 'pointer' : 'not-allowed';
            }
        }
        
        function nextQuestion() {
            if (answers[currentQ] === null) {
                alert('Please select an answer before continuing.');
                return;
            }
            if (currentQ < QUESTIONS.length - 1) {
                currentQ++;
                renderQuestion();
            } else {
                showContact();
            }
        }
        
        function prevQuestion() {
            if (currentQ > 0) {
                currentQ--;
                renderQuestion();
            }
        }
        
        function startQuiz() {
            for (var i = 0; i < answers.length; i++) answers[i] = null;
            currentQ = 0;
            if (introScreen) introScreen.classList.add('hidden');
            if (progressArea) progressArea.classList.remove('hidden');
            if (questionScreen) questionScreen.classList.remove('hidden');
            if (contactScreen) contactScreen.classList.add('hidden');
            if (resultsScreen) resultsScreen.classList.add('hidden');
            renderQuestion();
        }

            if (questionScreen) questionScreen.classList.add('hidden');
            if (progressArea) progressArea.classList.add('hidden');

                    '<p>Your score of <strong>' + score.toFixed(1) + '/5</strong> places you in the <strong>' + tier.label + '</strong> category.</p>' +
                    '<div class="quote-block">"What we\'re ultimately doing with NLP is changing people\'s maps—shifting the way they interpret the past, the present, and what\'s possible." — Joshua Roy</div>' +
                    '<p>This assessment measured your openness to NLP tools, your awareness of internal blocks, and your willingness to practice experiential techniques.</p>' +
                    '<div class="teaching-section"><h4>Quick Insight</h4><p>People who get the fastest results with NLP share one quality: they\'re willing to try before they fully understand. Empty your cup. Experience first, analyze second.</p></div></div>';
            }
            
            var page2 = document.getElementById('tab1');
            if (page2) {
                var page2Html = '<div><h3 class="gold">🔻 Your Growth Opportunities</h3>';
                if (lowIndices.length === 0) {
                    page2Html += '<p>✨ Excellent awareness of NLP principles! Your next step is mastering advanced techniques like anchoring, reframing, and the Swish Pattern.</p>';
                } else {
                    for (var j = 0; j < Math.min(4, lowIndices.length); j++) {
                        var idx = lowIndices[j];
                        var q = QUESTIONS[idx];
                        var practiceText = '';
                        if (q.category === "Smart Person Syndrome") practiceText = "Identify one area where you've been 'too smart' to try. Commit to experiencing it once before judging.";
                        else if (q.category === "State Elicitation") practiceText = "Set a timer for 2 minutes daily. Practice the full script—recall, re-enter, amplify, anchor.";
                        else if (q.category === "Openness") practiceText = "Choose one NLP tool you've been skeptical about. Try it for 7 days before evaluating.";
                        else practiceText = "Pick one NLP tool and use it 5 times this week. Track what changes.";
                        
                        page2Html += '<div style="margin-bottom:20px;"><h4>' + q.category + '</h4><p>' + q.teaching + '</p>' +
                            '<div style="background:#1e2a3a; border-radius:16px; padding:12px;"><strong>✨ This Week\'s Practice:</strong><br/>' + practiceText + '</div></div>';
                    }
                }
                page2Html += '<div class="quote-block"><h4>💡 The Bruce Lee Principle</h4><p>"Empty your cup. Learning requires humility. The cup that is full cannot receive."</p></div></div>';
                page2.innerHTML = page2Html;
            }
            
            var deepTeaching = generateDeepTeaching(score, tier, lowIndices);
            var tab2 = document.getElementById('tab2');
            if (tab2) tab2.innerHTML = deepTeaching;
            
            if (contactScreen) contactScreen.classList.add('hidden');
            if (resultsScreen) resultsScreen.classList.remove('hidden');
        }
        
        function submitContact() {
            var name = document.getElementById('leadName') ? document.getElementById('leadName').value.trim() : '';
            var phone = document.getElementById('leadPhone') ? document.getElementById('leadPhone').value.trim() : '';
            var email = document.getElementById('leadEmail') ? document.getElementById('leadEmail').value.trim() : '';
            var country = document.getElementById('leadCountry') ? document.getElementById('leadCountry').value : '';
            if (!name || !phone || !email || !country) {
                alert("All fields required.");
                return;
            }
            var score = getAverage();
            var tier = getTier(score);
            sendToTelegram(name, phone, country, email, score, tier);
        }
        
        function retakeFull() {
            for (var i = 0; i < answers.length; i++) answers[i] = null;
            currentQ = 0;
            if (introScreen) introScreen.classList.remove('hidden');
            if (progressArea) progressArea.classList.add('hidden');
            if (questionScreen) questionScreen.classList.add('hidden');
            if (contactScreen) contactScreen.classList.add('hidden');
            if (resultsScreen) resultsScreen.classList.add('hidden');
        }
        
        renderApp();
    });
</script>
</body>
</html>
