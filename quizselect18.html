        function renderApp() {
            document.getElementById('app').innerHTML = `

                <div id="progressArea" class="hidden"><div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div><div id="progressText" style="text-align:center; font-size:0.85rem;"></div></div>
                <div id="questionScreen" class="hidden"><div class="question-card"><div id="qCat" class="gold"></div><div id="qText"></div><div class="scale-buttons" id="scaleBtns"></div><div style="display:flex; justify-content:space-between;"><button id="prevQBtn" class="btn-outline">← Previous</button><button id="nextQBtn" class="btn-primary">Next →</button></div></div></div>
                <div id="contactScreen" class="hidden"><div class="contact-card"><h2 class="gold">Your NLP Tools Assessment Report</h2><p>Get a personalized 1000+ word analysis with teaching insights from Joshua Roy's NLP training.</p><div class="form-group"><input type="text" id="leadName" placeholder="Full Name"></div><div class="form-group"><input type="tel" id="leadPhone" placeholder="Phone"></div><div class="form-group"><input type="email" id="leadEmail" placeholder="Email"></div><div class="form-group"><select id="leadCountry"><option value="">Select Country</option><option>Australia</option><option>Canada</option><option>Ireland</option><option>New Zealand</option><option>United Kingdom</option><option>United States</option></select></div><button id="submitLeadBtn" class="btn-primary">Generate Comprehensive Report →</button><div id="webhookStatus" class="status-message"></div></div></div>
                <div id="resultsScreen" class="hidden"><div class="card"><div style="display:flex; justify-content:space-between;"><img src="https://i.ibb.co/ynXdYpmL/worldjjpgsf.png" style="height:40px;"><span>NLP Tools Report</span></div><div style="text-align:center;"><div class="score-circle" id="scoreRing"><div class="score-text" id="finalScoreVal">0.0</div></div><div id="tierBadge" style="background:#C9A84C; display:inline-block; padding:6px 24px; border-radius:60px; color:#080d18; font-weight:800;"></div><p id="tierDesc"></p></div><div class="tab-nav"><button class="tab-btn active" data-tab="0">📄 Score & Overview</button><button class="tab-btn" data-tab="1">📄 Growth Areas</button><button class="tab-btn" data-tab="2">📄 Deep Teaching & Action Plan</button></div><div class="tab-content active" id="tab0"></div><div class="tab-content" id="tab1"></div><div class="tab-content" id="tab2"></div><div style="display:flex; gap:15px; justify-content:center;"><button id="printPdfBtn" class="action-btn primary">📄 Save PDF</button><button id="retakeAllBtn" class="action-btn">🔄 Retake Quiz</button></div></div></div>`;
            
            intro = document.getElementById('introScreen');
            progressArea = document.getElementById('progressArea');
            questionScreen = document.getElementById('questionScreen');
            contactScreen = document.getElementById('contactScreen');
            resultsScreen = document.getElementById('resultsScreen');
            
            // Attach event listeners
            document.getElementById('startQuizBtn')?.addEventListener('click', startQuiz);
            document.getElementById('nextQBtn')?.addEventListener('click', nextQuestion);
            document.getElementById('prevQBtn')?.addEventListener('click', prevQuestion);
            document.getElementById('submitLeadBtn')?.addEventListener('click', submitContact);
            document.getElementById('printPdfBtn')?.addEventListener('click', ()=>window.print());
            document.getElementById('retakeAllBtn')?.addEventListener('click', retakeFull);
            
            document.querySelectorAll('.tab-btn').forEach(btn=>btn.addEventListener('click',()=>{ let tab=btn.dataset.tab; document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); document.querySelectorAll('.tab-content').forEach((tc,i)=>tc.classList.toggle('active', i==tab)); }));
        }
        
        function renderQuestion() {
            let q = QUESTIONS[currentQ];
            document.getElementById('qCat').innerHTML = `⚡ ${q.category} · Question ${currentQ+1} of ${QUESTIONS.length}`;
            document.getElementById('qText').innerHTML = q.text;
            let container = document.getElementById('scaleBtns'); 
            if(!container) return;
            container.innerHTML = '';
            let labels = ['Not at all','Slightly','Somewhat','Mostly','Very much','Completely'];
            for(let i=0;i<=5;i++) { 
                let btn = document.createElement('div'); 
                btn.className = `scale-btn ${answers[currentQ]===i ? 'selected' : ''}`; 
                btn.innerHTML = `<span>${i}</span><span>${labels[i]}</span>`; 
                btn.onclick = (()=>{ let val=i; return function(){ answers[currentQ]=val; renderQuestion(); }; })(); 
                container.appendChild(btn); 
            }
            let fillEl = document.getElementById('progressFill');
            let textEl = document.getElementById('progressText');
            let prevBtn = document.getElementById('prevQBtn');
            let nextBtn = document.getElementById('nextQBtn');
            if(fillEl) fillEl.style.width = `${((currentQ+1)/QUESTIONS.length)*100}%`;
            if(textEl) textEl.innerHTML = `Question ${currentQ+1} of ${QUESTIONS.length}`;
            if(prevBtn) prevBtn.disabled = (currentQ===0);
            let hasAns = answers[currentQ]!==null;
            if(nextBtn) {
                nextBtn.style.opacity = hasAns ? "1" : "0.6";
                nextBtn.style.cursor = hasAns ? "pointer" : "not-allowed";
            }
        }
        
        function nextQuestion() { 
            if(answers[currentQ]===null) { alert("Please select an answer."); return; } 
            if(currentQ < QUESTIONS.length-1) { currentQ++; renderQuestion(); } 
            else { showContact(); } 
        }
        
        function prevQuestion() { if(currentQ>0) { currentQ--; renderQuestion(); } }
        
        function startQuiz() { 
            answers.fill(null); 
            currentQ = 0; 
            if(intro) intro.classList.add('hidden'); 
            if(progressArea) progressArea.classList.remove('hidden'); 
            if(questionScreen) questionScreen.classList.remove('hidden'); 
            if(contactScreen) contactScreen.classList.add('hidden'); 
            if(resultsScreen) resultsScreen.classList.add('hidden'); 
            renderQuestion(); 
        }
        
        function showContact() { 
            if(questionScreen) questionScreen.classList.add('hidden'); 
            if(progressArea) progressArea.classList.add('hidden'); 
            if(contactScreen) contactScreen.classList.remove('hidden'); 
        }
        
        async function sendToTelegram(name,phone,country,email,score,tier) {
            let payload={name,phone,country,email,score:score.toFixed(1),tier:tier.label,quiz:`NLP Ch${CHAPTER_NUM}: ${CHAPTER_TITLE}`,timestamp:new Date().toISOString()};
            let status=document.getElementById('webhookStatus'); 
            if(status) {
                status.style.display='block'; 
                status.innerHTML='⏳ Generating your comprehensive report...';
            }
            try{ await fetch(WEBHOOK_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}); 
                 if(status) status.innerHTML='✓ Report ready!'; 
            } catch(e){ if(status) status.innerHTML='⚠️ Showing results below.'; }
            setTimeout(()=>showResults(),500);
        }
        
        function generateDeepTeaching(score, tier, lowIndices, highIndices) {
            return `
                <div class="teaching-section">
                    <h4>🧠 The Science of Why NLP Tools Work</h4>
                    <p>NLP stands for Neuro-Linguistic Programming—and each word matters. <strong>Neuro</strong> refers to your nervous system and brain. <strong>Linguistic</strong> refers to the language patterns that shape your thoughts. <strong>Programming</strong> refers to the fact that your mind runs on patterns that can be changed, upgraded, and optimized—just like software.</p>
                    <p>When Richard Bandler and John Grinder studied master therapists Virginia Satir, Fritz Perls, and Milton Erickson, they discovered something revolutionary: these therapists weren't just "naturally gifted." They were following repeatable patterns. Patterns that could be taught, learned, and applied by anyone willing to practice.</p>

                <div class="teaching-section">
                    <h4>🔑 The Two Biggest Blocks to Transformation</h4>
                    <p><strong>Block #1: Smart Person Syndrome</strong><br>This is when your intellect becomes a prison. You've read all the books, done all the degrees, and you're "too smart" to be taught. Bruce Lee said, "I can teach you, but only if you empty your cup." A full cup cannot receive. The most intelligent people are often the hardest to help—not because they lack capacity, but because they lack humility. They want to understand before they experience. But NLP is experiential. You cannot think your way into a new way of feeling. You must feel your way into a new way of thinking.</p>
                    <p><strong>Block #2: Hypnotist Disease</strong><br>This is when you're in the room—but your mind is on someone else. "My partner should hear this." "I wish my son were here." You're listening, but you're not listening for yourself. The cure? Get the change for yourself first. Transform your own nervous system. Then, and only then, can you genuinely help others. You cannot give what you don't have.</p>
                </div>
                
                <div class="teaching-section">
                    <h4>⚙️ The State Elicitation Script (Your First Tool)</h4>
                    <p>This is one of the most powerful NLP techniques—and it takes less than 2 minutes. Here's exactly how to do it:</p>
                    <ol style="margin-left: 20px; margin-top: 10px;">
                        <li><strong>Recall:</strong> Think of a specific time when you felt a powerful positive emotion (confidence, excitement, peace).</li>
                        <li><strong>Re-enter:</strong> Close your eyes. Go back to that moment. See what you saw. Hear what you heard. Feel what you felt in your body.</li>
                        <li><strong>Amplify:</strong> Now double that feeling. Make the colors brighter, the sounds clearer, the sensation stronger. Double it again. And again.</li>
                        <li><strong>Anchor:</strong> As the emotion peaks, squeeze your thumb and middle finger together. Say "YES!" out loud.</li>
                        <li><strong>Repeat:</strong> Practice this daily for 7 days. By day 7, your anchor will trigger the state instantly.</li>
                    </ol>
                    <p>Why does this work? <strong>Neurons that fire together, wire together.</strong> Every time you rehearse this sequence, you strengthen the neural pathway between your anchor and the desired emotional state. Eventually, the anchor becomes a trigger—your personal "on switch" for confidence, calm, or joy.</p>
                </div>
                
                <div class="teaching-section">
                    <h4>🔄 The State Loop: How Change Ripples Through Your Life</h4>
                    <p>Every emotional state is part of a loop: <strong>Thought → Emotion → Physiology → Behavior → Result → Belief Reinforced</strong></p>
                    <p>When you change any part of the loop, the whole system begins to shift. Most people try to change their thoughts directly—but thoughts are the hardest part to control. The secret is to start with <strong>physiology</strong>. Change your posture, your breath, your movement. When you move differently, you feel differently. When you feel differently, you think differently. When you think differently, you act differently. And when you act differently, your results change—which reinforces a new, empowering belief.</p>
                    <p>This is why the Excitement Activation Drill works. You're not waiting to feel motivated. You're creating motivation through movement.</p>
                </div>
                
                <div class="teaching-section">
                    <h4>📊 Your Personalized Insights</h4>
                    <p><strong>Your Score:</strong> ${score.toFixed(1)}/5 — ${tier.label}</p>
                    <p>${tier.desc}</p>
                    ${lowIndices.length > 0 ? `<p><strong>Key growth areas identified:</strong> ${lowIndices.slice(0,3).map(i=>QUESTIONS[i].category).join(', ')}. Focus on practicing the State Elicitation Script daily for these specific patterns.</p>` : '<p>You're already demonstrating strong understanding of NLP tools. Your next level is mastering advanced techniques like anchoring and reframing.</p>'}
                </div>
                
                <div class="teaching-section">
                    <h4>📅 Your 7-Day NLP Integration Plan</h4>
                    <ol style="margin-left: 20px;">
                        <li><strong>Day 1:</strong> Practice the State Elicitation Script (2 minutes). Rate your state before and after.</li>
                        <li><strong>Day 2:</strong> Identify one "Smart Person Syndrome" thought. Replace it with "I'm willing to experience this first."</li>
                        <li><strong>Day 3:</strong> Practice the Excitement Activation Drill with full body movement. Say "YES!" out loud.</li>
                        <li><strong>Day 4:</strong> Create an anchor for calm. Recall a peaceful memory, amplify it, anchor to your breath.</li>
                        <li><strong>Day 5:</strong> Use your anchor before a challenging situation. Notice what changes.</li>
                        <li><strong>Day 6:</strong> Practice on someone else—guide a friend through the State Elicitation Script.</li>
                        <li><strong>Day 7:</strong> Journal: What shifted? What emotion can you now generate at will?</li>
                    </ol>
                </div>
                
                <div class="webinar-card">
                    <p><strong>📚 The tools work—but only if you use them.</strong> Join Joshua Roy's live NLP training to deepen your practice, get real-time coaching, and accelerate your transformation.</p>
                    <a href="https://accessworldseminars-ship-it.github.io/results/s" target="_blank">🎓 Click here for upcoming NLP Certification & Coaching Sessions →</a>
                </div>
                
                <footer style="margin-top: 20px;">“If you fail to prepare, you prepare to fail. Constant mental rehearsal is what sets aside those who succeed.” — Joshua Roy</footer>
            `;
        }

                lowIndices.slice(0,4).forEach(idx => {
                    let q = QUESTIONS[idx];
                    page2 += `<div style="margin-bottom:20px;"><h4>${q.category}</h4><p>${q.teaching}</p><div style="background:#1e2a3a; border-radius:16px; padding:12px;"><strong>✨ This Week's Practice:</strong><br/>${q.category==="Smart Person Syndrome"?"Identify one area where you've been 'too smart' to try. Commit to experiencing it once before judging.":q.category==="State Elicitation"?"Set a timer for 2 minutes daily. Practice the full script—recall, re-enter, amplify, anchor.":"Pick one NLP tool and use it 5 times this week. Track what changes."}</div></div>`;
                });
            }
            page2 += `<div class="quote-block"><h4>💡 The Bruce Lee Principle</h4><p>“Empty your cup. Learning requires humility. The cup that is full cannot receive.”</p></div></div>`;
            let tab1 = document.getElementById('tab1');
            if(tab1) tab1.innerHTML = page2;
            
            const deepTeaching = generateDeepTeaching(score, tier, lowIndices, highIndices);
            let tab2 = document.getElementById('tab2');
            if(tab2) tab2.innerHTML = deepTeaching;
            
            if(contactScreen) contactScreen.classList.add('hidden');
            if(resultsScreen) resultsScreen.classList.remove('hidden');
        }
        
        async function submitContact() {
            let n = document.getElementById('leadName')?.value.trim(), 
                p = document.getElementById('leadPhone')?.value.trim(), 
                e = document.getElementById('leadEmail')?.value.trim(), 
                c = document.getElementById('leadCountry')?.value;
            if(!n || !p || !e || !c) { alert("All fields required."); return; }
            let score = getAverage(), tier = getTier(score);
            await sendToTelegram(n, p, c, e, score, tier);
        }
        
        function retakeFull() { 
            answers.fill(null); 
            currentQ = 0; 
            if(intro) intro.classList.remove('hidden'); 
            if(progressArea) progressArea.classList.add('hidden'); 
            if(questionScreen) questionScreen.classList.add('hidden'); 
            if(contactScreen) contactScreen.classList.add('hidden'); 
            if(resultsScreen) resultsScreen.classList.add('hidden'); 
        }
        
        // Initialize on DOM load
        renderApp();
    })();
</script>
</body>
</html>
