<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AccessWorld · Cellular Vitality Quiz</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: radial-gradient(circle at 10% 20%, #0a0f1c, #03060c);
      font-family: 'Montserrat', sans-serif;
      color: #eef2ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
    }
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: url('https://i.ibb.co/ynXdYpmL/worldjjpgsf.png');
      background-repeat: no-repeat;
      background-position: center center;
      background-size: 50%;
      opacity: 0.07;
      pointer-events: none;
      z-index: 0;
    }
    .quiz-container { position: relative; z-index: 2; width: 100%; max-width: 850px; margin: 0 auto; }
    .card {
      background: rgba(10, 18, 28, 0.88);
      backdrop-filter: blur(12px);
      border-radius: 2.5rem;
      padding: 2rem;
      box-shadow: 0 25px 40px -18px rgba(0,0,0,0.5), 0 0 0 1px rgba(201, 168, 76, 0.2);
    }
    h1, h2, h3 { font-family: 'Cormorant Garamond', serif; font-weight: 600; letter-spacing: -0.2px; }
    .gold { color: #C9A84C; }
    .btn {
      background: transparent;
      border: 1.5px solid #C9A84C;
      color: #C9A84C;
      padding: 0.7rem 1.6rem;
      border-radius: 60px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Montserrat', sans-serif;
      font-size: 1rem;
      transition: all 0.2s ease;
    }
    .btn-primary { background: #C9A84C; color: #0a0f1c; border: none; }
    .btn-primary:hover { background: #b6902e; transform: translateY(-2px); }
    .btn:hover { background: #C9A84C; color: #0a0f1c; transform: translateY(-2px); }
    .scale-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin: 2rem 0 1rem;
      justify-content: center;
    }
    .scale-opt {
      background: rgba(255,255,245,0.05);
      border-radius: 9999px;
      width: 85px;
      height: 85px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 1px solid rgba(201, 168, 76, 0.4);
      font-weight: 600;
      transition: all 0.2s ease;
      text-align: center;
      flex-shrink: 0;
    }
    .scale-opt.selected {
      background: #C9A84C;
      color: #0a0f1c;
      border-color: #C9A84C;
      box-shadow: 0 0 12px rgba(201,168,76,0.5);
    }
    .scale-opt .number { font-size: 1.8rem; font-weight: 800; line-height: 1; }
    .scale-opt .label { font-size: 0.7rem; font-weight: 500; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .progress-steps { display: flex; justify-content: center; gap: 0.5rem; margin-bottom: 1rem; }
    .step-dot { width: 10px; height: 10px; background: #2a3a55; border-radius: 10px; transition: all 0.2s; }
    .step-dot.active { background: #C9A84C; width: 24px; }
    input {
      width: 100%;
      padding: 1rem;
      background: #0e1624;
      border: 1px solid #2c3b55;
      border-radius: 2rem;
      color: white;
      margin-bottom: 1rem;
      font-family: 'Montserrat', sans-serif;
    }
    input:focus { outline: none; border-color: #C9A84C; }
    .teaching-img {
      width: 100%;
      max-width: 550px;
      border-radius: 1.8rem;
      margin: 1rem auto;
      display: block;
      box-shadow: 0 12px 28px -8px black;
    }
    .report-section {
      background: rgba(8, 14, 22, 0.9);
      border-radius: 2rem;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      border-left: 4px solid #C9A84C;
    }
    .report-nav {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      margin-top: 1.5rem;
    }
    .option-card {
      background: rgba(255,255,245,0.05);
      border-radius: 1.5rem;
      padding: 1.2rem;
      text-align: center;
      cursor: pointer;
      border: 1px solid rgba(201, 168, 76, 0.3);
      transition: all 0.2s;
      margin-bottom: 0.8rem;
    }
    .option-card.selected {
      background: #C9A84C;
      color: #0a0f1c;
      border-color: #C9A84C;
    }
    footer { text-align: center; font-size: 0.75rem; margin-top: 2rem; opacity: 0.7; }
    @media (max-width: 600px) {
      .card { padding: 1.5rem; }
      .scale-opt { width: 70px; height: 70px; }
      .scale-opt .number { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
<div class="quiz-container" id="app"></div>

<script>
  const TELEGRAM_BOT_TOKEN = "8155100717:AAGhB1RGsuZTX14PzvbUAQhVmzhB3C5UtCc";
  const TELEGRAM_CHAT_ID = "5970521104";

  const QUESTIONS = [
    { id: 0, text: "I breathe using my belly (diaphragm) with shoulders relaxed, not shallow chest breathing.", category: "Breathwork" },
    { id: 1, text: "I can hold my breath after exhale for at least 30 seconds comfortably.", category: "Lung Capacity" },
    { id: 2, text: "I eat fresh fruits/vegetables daily and avoid hybridized wheat (white bread/pasta).", category: "Diet" },
    { id: 3, text: "I consume healing foods: coriander/cilantro, celery juice, zucchini/squash weekly.", category: "Food as Medicine" },
    { id: 4, text: "My energy is stable throughout the day (no afternoon crash or sugar cravings).", category: "Energy" },
    { id: 5, text: "I move my body daily to stimulate lymphatic flow (bouncing, walking, rebounder).", category: "Mobility & Lymph" },
    { id: 6, text: "I avoid processed sugar & excess dairy to reduce brain fog and metal toxicity.", category: "Mindset & Clarity" },
    { id: 7, text: "I feel I'm proactively alkalizing my body (reduce acid, increase alkaline foods).", category: "Alkaline Balance" },
    { id: 8, text: "I can get up from the floor without using my hands.", category: "Mobility" },
    { id: 9, text: "I incorporate posture exercises or stretching at least once each week.", category: "Posture & Flexibility" },
    { id: 10, text: "I prioritise my health even when life gets busy or I have a lot on my plate.", category: "Mindset" }
  ];

  const TEACHING_SCREENS = {
    3: { headline: "AccessWorld Seminars is a results-driven coaching company.", quote: "We help people transform their health and energy — and support those who want to become certified coaches themselves.", image: "https://i.ibb.co/4Zd4RVbR/Gemini-Generated-Image-o877d1o877d1o877.png" },
    6: { headline: "AccessWorld Seminars helps individuals feel good for no good reason.", quote: "Feelings are not fate. They are habits.", image: "https://i.ibb.co/r2T9kL99/Gemini-Generated-Image-tea7prtea7prtea7.png" },
    9: { headline: "AccessWorld Seminars Mindset Coaching works", quote: "Calm is the container that holds everything else together.", image: "https://i.ibb.co/97mZvc6/Screenshot-2026-01-29-105636.png" }
  };

  let step = "intro";
  let currentQuestionIdx = 0;
  let preStep = 0;
  let answers = new Array(QUESTIONS.length).fill(null);
  let userSegment = "", userGoal = "", userHealthFocus = "", userLearnPref = "";
  let userName = "", userEmail = "", userPhone = "";
  let finalScore = 0, categoryAvgs = {};
  let reportPage = 0;
  let nextAfterTeaching = null;

  function getTierData(avg) {
    if (avg < 1.8) return { label: "Acidic Overload", msg: "Your terrain is highly acidic. Immediate lifestyle shift needed." };
    if (avg < 2.6) return { label: "Compensation Mode", msg: "Cells lack oxygen & alkaline minerals." };
    if (avg < 3.5) return { label: "Transitioning Vitality", msg: "Your body is ready to heal with breath & whole foods." };
    if (avg < 4.3) return { label: "Alkaline Momentum", msg: "Keep expanding lung capacity & green juices." };
    return { label: "Cellular Mastery", msg: "Exceptional! Alkaline & oxygen-rich environment." };
  }

  async function sendTelegramNotification() {
    if (!TELEGRAM_BOT_TOKEN || TELEGRAM_BOT_TOKEN === "YOUR_BOT_TOKEN_HERE") return false;
    const total = answers.reduce((a,b)=>a+b,0);
    const avg = total / QUESTIONS.length;
    const tier = getTierData(avg).label;
    const message = `🔥 NEW COACHING LEAD (Quiz)\n\nName: ${userName}\nEmail: ${userEmail}\nPhone: ${userPhone}\nSegment: ${userSegment}\nGoal: ${userGoal}\nFocus: ${userHealthFocus}\nLearning: ${userLearnPref}\nScore: ${avg.toFixed(1)}/5 (${tier})`;
    try {
      const res = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: message })
      });
      return res.ok;
    } catch(e) { return false; }
  }

  function computeCategoryAverages() {
    const sums = {}, counts = {};
    QUESTIONS.forEach(q => {
      const val = answers[q.id] ?? 0;
      sums[q.category] = (sums[q.category] || 0) + val;
      counts[q.category] = (counts[q.category] || 0) + 1;
    });
    const avgs = {};
    for (let c in sums) avgs[c] = sums[c] / counts[c];
    return avgs;
  }

  const root = document.getElementById("app");

  function render() {
    if (step === "intro") renderIntro();
    else if (step === "preSegments") renderPreSegments();
    else if (step === "quiz") renderQuiz();
    else if (step === "teaching") renderTeaching();
    else if (step === "contact") renderContact();
    else if (step === "report") renderMultiPageReport();
  }

  function renderIntro() {
    root.innerHTML = `
      <div class="card" style="text-align:center;">
        <img src="https://i.ibb.co/ynXdYpmL/worldjjpgsf.png" style="height:80px; margin-bottom:1rem;" alt="AccessWorld">
        <h1 style="font-size:2.6rem;">Cellular Vitality<br><span class="gold">Assessment</span></h1>
        <p style="margin:1.5rem 0;">Discover where you stand and get clear, actionable steps to boost your energy and health.</p>
        <button class="btn btn-primary" id="startBtn" style="font-size:1.1rem; padding:1rem 2rem;">Begin Assessment →</button>
      </div>`;
    document.getElementById("startBtn").addEventListener("click", () => { step = "preSegments"; preStep = 0; render(); });
  }

  function renderPreSegments() {
    const preQuestions = [
      { title: "Which best describes you?", options: ["General Wellness Seeker", "Health Coach / Practitioner", "Struggling with Energy/Fatigue", "Looking for Coach Certification"], key: "segment" },
      { title: "What is your main goal right now?", options: ["Boost daily energy", "Improve mental clarity", "Reduce stress / anxiety", "Simply feel better"], key: "goal" },
      { title: "What is your current health focus?", options: ["Lymphatic health", "Breathwork & lungs", "Diet & alkaline foods", "Mindset & emotions"], key: "focus" },
      { title: "How do you prefer to learn?", options: ["Short videos", "Live webinars", "1-on-1 coaching", "Written guides"], key: "learn" }
    ];

    const current = preQuestions[preStep];
    let currentVal = "";
    if (current.key === "segment") currentVal = userSegment;
    else if (current.key === "goal") currentVal = userGoal;
    else if (current.key === "focus") currentVal = userHealthFocus;
    else if (current.key === "learn") currentVal = userLearnPref;

    let html = `
      <div class="card">
        <h2 style="margin-bottom:1.5rem;">Step ${preStep + 1} of 4</h2>
        <h3 class="gold">${current.title}</h3>
        <div style="margin:2rem 0;">`;

    current.options.forEach(opt => {
      html += `<div class="option-card ${currentVal === opt ? 'selected' : ''}" data-val="${opt}">${opt}</div>`;
    });

    html += `</div>`;

    if (preStep === 1) {
      html += `
        <div class="report-section" style="background:rgba(0,0,0,0.4); font-style:italic; text-align:center;">
          <p class="gold">"I didn't realise tiredness was about oxygen. After learning the breathwork method, my energy changed completely in just days."</p>
          <p style="margin-top:0.8rem; font-size:0.9rem;">— Sylvia, AccessWorld participant</p>
        </div>`;
    }

    html += `
        <div style="display:flex; justify-content:space-between; margin-top:2rem;">
          <button class="btn" id="prePrev" ${preStep===0 ? 'disabled' : ''}>← Previous</button>
          <button class="btn btn-primary" id="preNext">${preStep === 3 ? 'Continue to Quiz →' : 'Next'}</button>
        </div>
      </div>`;

    root.innerHTML = html;

    document.querySelectorAll('.option-card').forEach(el => {
      el.addEventListener('click', () => {
        document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        if (current.key === "segment") userSegment = el.dataset.val;
        if (current.key === "goal") userGoal = el.dataset.val;
        if (current.key === "focus") userHealthFocus = el.dataset.val;
        if (current.key === "learn") userLearnPref = el.dataset.val;
      });
    });

    document.getElementById("prePrev").addEventListener("click", () => {
      if (preStep > 0) { preStep--; render(); }
    });

    document.getElementById("preNext").addEventListener("click", () => {
      let hasValue = false;
      if (current.key === "segment") hasValue = userSegment !== "";
      else if (current.key === "goal") hasValue = userGoal !== "";
      else if (current.key === "focus") hasValue = userHealthFocus !== "";
      else if (current.key === "learn") hasValue = userLearnPref !== "";
      
      if (!hasValue) { alert("Please select an option"); return; }
      if (preStep < 3) { preStep++; render(); }
      else { 
        step = "quiz"; 
        currentQuestionIdx = 0; 
        render(); 
      }
    });
  }

  function renderQuiz() {
    const q = QUESTIONS[currentQuestionIdx];
    const selected = answers[q.id];
    const progress = (currentQuestionIdx / QUESTIONS.length) * 100;

    root.innerHTML = `
      <div class="card">
        <div class="progress-steps">${QUESTIONS.map((_,i)=>`<div class="step-dot ${i===currentQuestionIdx?'active':''}"></div>`).join('')}</div>
        <div style="background:#2a3650; height:4px; border-radius:10px; margin-top:8px;"><div style="width:${progress}%; background:#C9A84C; height:4px; border-radius:10px;"></div></div>
        <h2 style="margin:1.5rem 0 1rem; font-size:1.4rem;">${q.text}</h2>
        <div class="scale-group" id="scaleGroup"></div>
        <div style="display:flex; justify-content:space-between; margin-top:2rem;">
          <button class="btn" id="quizPrevBtn" ${currentQuestionIdx===0 ? 'disabled' : ""}>← Previous</button>
          <button class="btn btn-primary" id="quizNextBtn">${currentQuestionIdx===QUESTIONS.length-1 ? "Complete →" : "Next"}</button>
        </div>
      </div>`;

    const group = document.getElementById("scaleGroup");
    const labels = ["Never","Rarely","Sometimes","Often","Mostly","Always"];
    for(let i=0; i<=5; i++){
      let div = document.createElement("div");
      div.className = `scale-opt ${selected===i ? 'selected' : ''}`;
      div.innerHTML = `<div class="number">${i}</div><div class="label">${labels[i]}</div>`;
      div.addEventListener("click", () => { answers[q.id]=i; renderQuiz(); });
      group.appendChild(div);
    }

    document.getElementById("quizPrevBtn")?.addEventListener("click", () => { 
      if(currentQuestionIdx > 0){ 
        currentQuestionIdx--; 
        render(); 
      } 
    });
    
    document.getElementById("quizNextBtn")?.addEventListener("click", () => {
      if(answers[q.id] === null){ 
        alert("Please select a rating 0-5"); 
        return; 
      }
      if(currentQuestionIdx === QUESTIONS.length-1){
        finalScore = answers.reduce((a,b)=>a+b,0) / QUESTIONS.length;
        categoryAvgs = computeCategoryAverages();
        step = "contact";
        render();
      } else {
        let nextIdx = currentQuestionIdx + 1;
        if(TEACHING_SCREENS[nextIdx]){ 
          nextAfterTeaching = nextIdx; 
          step = "teaching"; 
          render(); 
        } else { 
          currentQuestionIdx = nextIdx; 
          render(); 
        }
      }
    });
  }

  function renderTeaching() {
    let next = nextAfterTeaching;
    let teach = TEACHING_SCREENS[next];
    if(!teach) { step="quiz"; render(); return; }
    root.innerHTML = `
      <div class="card" style="text-align:center;">
        <h2 class="gold">✨ ${teach.headline}</h2>
        <img src="${teach.image}" class="teaching-img" alt="wisdom" onerror="this.src='https://i.ibb.co/ynXdYpmL/worldjjpgsf.png'">
        <div class="report-section" style="background:rgba(0,0,0,0.3);">
          <p class="gold" style="font-size:1.3rem;">“${teach.quote}”</p>
        </div>
        <button class="btn btn-primary" id="contTeachBtn">Continue →</button>
      </div>`;
    document.getElementById("contTeachBtn")?.addEventListener("click", () => { 
      currentQuestionIdx = next; 
      step = "quiz"; 
      render(); 
    });
  }

  function renderContact() {
    root.innerHTML = `
      <div class="card">
        <h2>Your Comprehensive Report Awaits</h2>
        <p>Enter your details to unlock your detailed 3-page Cellular Vitality Report + invitation to our next free session.</p>
        <input type="text" id="contactName" placeholder="Full name">
        <input type="email" id="contactEmail" placeholder="Email address">
        <input type="tel" id="contactPhone" placeholder="Phone with area code">
        <div style="display:flex; gap:1rem; justify-content:center; margin-top:1rem;">
          <button class="btn" id="backToQuizBtn">← Back</button>
          <button class="btn btn-primary" id="genReportBtn">📊 Generate Full Report →</button>
        </div>
      </div>`;
    
    document.getElementById("backToQuizBtn")?.addEventListener("click", () => { 
      step = "quiz"; 
      render(); 
    });
    
    document.getElementById("genReportBtn")?.addEventListener("click", async () => {
      let name = document.getElementById("contactName").value.trim();
      let email = document.getElementById("contactEmail").value.trim();
      let phone = document.getElementById("contactPhone").value.trim();
      if(!name || !email) { alert("Name and email are required."); return; }
      userName = name; 
      userEmail = email; 
      userPhone = phone;
      await sendTelegramNotification();
      reportPage = 0;
      step = "report";
      render();
    });
  }

  function renderMultiPageReport() {
    const avg = finalScore.toFixed(1);
    const tier = getTierData(finalScore);
    const categoryList = Object.entries(categoryAvgs).sort((a,b) => a[1] - b[1]);
    const lowest = categoryList.slice(0,3);
    const highest = categoryList.slice(-3).reverse();

    const pages = [
      `<h1 style="text-align:center; margin-bottom:1rem;">Your Cellular Vitality Report</h1>
      <div style="text-align:center;">
        <div style="font-size:4.5rem; color:#C9A84C; font-weight:700;">${avg}<span style="font-size:1.4rem;">/5</span></div>
        <h2 class="gold">${tier.label}</h2>
        <p style="margin:1rem 0 2rem;">${tier.msg}</p>
      </div>
      <div class="report-section">
        <h3>Your Profile</h3>
        <p><strong>Segment:</strong> ${userSegment}<br>
           <strong>Goal:</strong> ${userGoal}<br>
           <strong>Focus:</strong> ${userHealthFocus}<br>
           <strong>Learning Preference:</strong> ${userLearnPref}</p>
      </div>`,

      `<div class="report-section">
        <h3>Priority Areas for Improvement</h3>
        ${lowest.map(([cat,sc]) => `
          <div style="margin-bottom:1.2rem;">
            <strong>${cat}</strong> — ${sc.toFixed(1)}/5<br>
            <small>Target this area first — small consistent changes here will create the biggest shift in your energy and clarity.</small>
          </div>`).join('')}
      </div>
      <div class="report-section">
        <h3>Your Strengths</h3>
        ${highest.map(([cat,sc]) => `<p><strong>${cat}</strong> — ${sc.toFixed(1)}/5</p>`).join('')}
      </div>
      <div class="report-section">
        <h3>Lymphatic System & Movement</h3>
        <p>Your calf muscles act as the pump for the lymphatic system — your body’s built-in waste elimination system. Without daily movement, toxins and acids build up, leading to fatigue and sluggishness.</p>
        <p><strong>Daily Action:</strong> 5–10 minutes of rebounding, jumping, running in place, or heel drops. This stimulates lymph flow and helps clear acid and toxin build-up.</p>
      </div>`,

      `<div class="report-section">
        <h3>Food as Medicine & Cellular Energy</h3>
        <p>Energy is created inside your cells. Glucose + water give 2 units of energy. Add oxygen and you get up to 32 units — an exponential boost. Most people lose significant lung capacity by age 50 simply because they don’t use it fully.</p>
        <p><strong>Healing Foods to Add Weekly:</strong> Coriander/cilantro (chelates heavy metals), celery juice (restores lymph flow), zucchini/squash (fuels the prefrontal cortex), papaya (aids peristalsis and cleansing).</p>
        <p>Reduce hybridized wheat and processed sugar — these spike blood sugar rapidly and contribute to brain fog and metal toxicity.</p>
      </div>
      <div class="report-section">
        <h3>Breathwork Protocol</h3>
        <p>Practice belly breathing daily (shoulders relaxed, belly expands). Try the 30 powerful breaths + full exhale hold (Wim Hof style) to alkalize cells and increase oxygen delivery.</p>
        <p><strong>Quick Start:</strong> 10 deep belly breaths → exhale and hold 30 seconds → inhale and hold 15 seconds. Do this daily and notice the natural euphoric feeling.</p>
      </div>
      <div class="report-section">
        <h3>Next Steps with AccessWorld Seminars</h3>
        <p>AccessWorld Seminars is a results-driven coaching company. We help people dramatically improve their health, energy, and mindset through breathwork, nervous system reprogramming, and practical cellular health strategies. We also guide aspiring coaches who want real certifications in coaching, NLP, and Nervous System Reprogramming (NSR).</p>
        <p>Ready for deeper transformation? Join our next free live session or book a discovery call.</p>
        <a href="https://accessworldseminars-ship-it.github.io/results/s" target="_blank" class="btn btn-primary" style="display:inline-block; margin-top:1rem; text-decoration:none;">Reserve My Free Session Seat →</a>
      </div>
      <footer style="margin-top:2rem;">Joshua Roy — Results & Happiness Coach<br>AccessWorld Seminars • Brisbane • Since 2015</footer>`
    ];

    root.innerHTML = `
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
          <span class="gold">Page ${reportPage+1} of 3 • Detailed Analysis</span>
          <img src="https://i.ibb.co/ynXdYpmL/worldjjpgsf.png" style="height:40px;">
        </div>
        <div id="reportContent">${pages[reportPage]}</div>
        <div class="report-nav">
          <button class="btn" id="prevPageBtn" ${reportPage===0 ? 'disabled' : ''}>← Previous</button>
          <button class="btn btn-primary" id="nextPageBtn">${reportPage===2 ? 'Finish' : 'Next Page →'}</button>
        </div>
      </div>`;

    document.getElementById("prevPageBtn")?.addEventListener("click", () => { 
      if(reportPage > 0){ 
        reportPage--; 
        renderMultiPageReport(); 
      } 
    });
    
    document.getElementById("nextPageBtn")?.addEventListener("click", () => {
      if(reportPage === 2) { 
        step = "intro"; 
        render(); 
      } else { 
        reportPage++; 
        renderMultiPageReport(); 
      }
    });
  }

  render();
</script>
</body>
</html>
