<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Cellular Vitality Quiz | AccessWorld Seminars</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: linear-gradient(135deg, #0a0f1c 0%, #141e2f 100%);
      font-family: 'Montserrat', sans-serif;
      color: #eef2ff;
      padding: 1rem;
      min-height: 100vh;
    }
    .quiz-wrapper {
      max-width: 860px;
      margin: 0 auto;
      background: rgba(12, 20, 30, 0.7);
      backdrop-filter: blur(4px);
      border-radius: 2rem;
      padding: 1.5rem;
      box-shadow: 0 25px 40px -12px rgba(0,0,0,0.6);
      border: 1px solid rgba(201, 168, 76, 0.2);
    }
    h1, h2, h3, .gold-font {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      letter-spacing: -0.2px;
    }
    .gold { color: #C9A84C; }
    .bg-gold { background: #C9A84C; }
    .logo-img {
      height: 50px;
      object-fit: contain;
      margin-bottom: 0.5rem;
    }
    .btn {
      background: transparent;
      border: 1.5px solid #C9A84C;
      color: #C9A84C;
      padding: 0.7rem 1.8rem;
      border-radius: 60px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      font-family: 'Montserrat', sans-serif;
      margin: 0.3rem;
    }
    .btn-primary {
      background: #C9A84C;
      color: #0a0f1c;
      border: none;
      font-weight: 700;
    }
    .btn-primary:hover { background: #b6902e; transform: translateY(-2px); }
    .btn:hover { background: #C9A84C; color: #0a0f1c; transform: translateY(-2px); }
    .scale-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      margin: 1.5rem 0;
      justify-content: space-between;
    }
    .scale-opt {
      flex: 1;
      min-width: 70px;
      text-align: center;
      background: rgba(255,255,240,0.05);
      border-radius: 60px;
      padding: 0.6rem 0.2rem;
      cursor: pointer;
      border: 1px solid transparent;
      transition: 0.1s;
    }
    .scale-opt.selected {
      background: #C9A84C;
      color: #0a0f1c;
      border-color: #C9A84C;
      font-weight: 700;
    }
    /* PROGRESS BAR - silent but powerful */
    .progress-container {
      margin: 0.8rem 0 1.8rem 0;
    }
    .progress-bar-bg {
      background: #2a3650;
      border-radius: 40px;
      height: 8px;
      width: 100%;
      transition: all 0.2s;
    }
    .progress-fill {
      background: #C9A84C;
      width: 0%;
      height: 8px;
      border-radius: 40px;
      transition: width 0.3s ease-out, box-shadow 0.2s, height 0.2s;
    }
    /* swell & glow for last 3 */
    .swell-glow {
      box-shadow: 0 0 12px #C9A84C;
      height: 12px !important;
    }
    .firework-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1000;
    }
    .teaching-card, .report-card, .segment-card {
      background: rgba(18, 25, 45, 0.9);
      border-radius: 1.5rem;
      padding: 1.4rem;
      margin: 1rem 0;
      border-left: 4px solid #C9A84C;
      backdrop-filter: blur(4px);
    }
    .inline-img {
      max-width: 100%;
      border-radius: 1rem;
      margin: 0.8rem 0;
    }
    .testimonial-img {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #C9A84C;
      margin-right: 1rem;
      float: left;
      shape-outside: circle();
    }
    .slider-container img {
      width: 100%;
      border-radius: 1.2rem;
      max-height: 220px;
      object-fit: cover;
    }
    .tag-3min {
      display: inline-block;
      background: rgba(201,168,76,0.2);
      padding: 0.2rem 1rem;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 1px;
      margin-bottom: 0.8rem;
    }
    input, select {
      width: 100%;
      padding: 0.9rem 1rem;
      background: #111c2a;
      border: 1px solid #2c3b55;
      border-radius: 2rem;
      color: white;
      margin-bottom: 1rem;
    }
    footer.final-footer {
      text-align: center;
      font-size: 0.8rem;
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid #2a3650;
    }
    .flex-btns { display: flex; gap: 0.8rem; justify-content: center; flex-wrap: wrap; }
    @media (max-width: 600px) { .quiz-wrapper { padding: 1rem; } }
  </style>
</head>
<body>
<div class="quiz-wrapper" id="app"></div>
<script>
  // ---------------------- TELEGRAM CONFIG (ONLY 2 lines to edit) ----------------------
  const TELEGRAM_BOT_TOKEN = "8155100717:AAHrhehNUzIY2ArY2FUtEvSbFzkzRDciWmk";   // 👈 REPLACE WITH YOUR TOKEN
  const TELEGRAM_CHAT_ID = "5970521104";       // 👈 REPLACE WITH YOUR CHAT ID
  // -----------------------------------------------------------------------------------

  // ---------- DATA : 11 core health questions ----------
  const HEALTH_QUESTIONS = [
    { id: 0, text: "I breathe using my belly (diaphragm) with shoulders relaxed, not shallow chest breathing.", category: "Breathwork" },
    { id: 1, text: "I can hold my breath after exhale for at least 30 seconds comfortably.", category: "Lung Capacity" },
    { id: 2, text: "I eat fresh fruits/vegetables daily and avoid hybridized wheat (white bread/pasta).", category: "Diet" },
    { id: 3, text: "I consume healing foods: coriander/cilantro, celery juice, zucchini/squash weekly.", category: "Food as Medicine" },
    { id: 4, text: "My energy is stable throughout the day (no afternoon crash or sugar cravings).", category: "Energy" },
    { id: 5, text: "I move my body daily to stimulate lymphatic flow (bouncing, walking, rebounder).", category: "Mobility & Lymph" },
    { id: 6, text: "I avoid processed sugar & excess dairy to reduce brain fog and metal toxicity.", category: "Mindset & Clarity" },
    { id: 7, text: "I feel I'm proactively alkalizing my body (reduce acid, increase alkaline foods).", category: "Alkaline Balance" },
    { id: 8, text: "I can get up from the floor without using my hands.", category: "Mobility" },
    { id: 9, text: "I incorporate posture exercises or stretching at least once each week.", category: "Posture & Flexibility" },
    { id: 10, text: "I prioritise my health even when life gets busy or I have a lot on my plate.", category: "Mindset" }
  ];

  // ---------- GLOBAL STATE ----------
  let screen = "intro";   // intro, prequiz (segments), quiz, report
  let currentQuizIndex = 0;
  let healthAnswers = new Array(HEALTH_QUESTIONS.length).fill(null);
  
  // pre-quiz data
  let userSegment = "";
  let userGoal = "";
  let userHealthFocus = "";
  let userLearnPref = "";
  let userName = "";
  
  let finalScore = 0;
  let categoryAvgs = {};
  let notificationSent = false;

  // helper
  function getTier(avg) {
    if (avg < 1.8) return "Acidic Overload";
    if (avg < 2.6) return "Compensation Mode";
    if (avg < 3.5) return "Transitioning Vitality";
    if (avg < 4.3) return "Alkaline Momentum";
    return "Cellular Mastery";
  }
  
  async function sendTelegramNotification() {
    if (!TELEGRAM_BOT_TOKEN || TELEGRAM_BOT_TOKEN === "YOUR_BOT_TOKEN_HERE") return false;
    if (!TELEGRAM_CHAT_ID || TELEGRAM_CHAT_ID === "YOUR_CHAT_ID_HERE") return false;
    const total = healthAnswers.reduce((a,b)=>a+b,0);
    const avgScore = total / HEALTH_QUESTIONS.length;
    const tierLabel = getTier(avgScore);
    let summary = `Score: ${avgScore.toFixed(1)}/5 (${tierLabel})\nSegment: ${userSegment}\nGoal: ${userGoal}\nFocus: ${userHealthFocus}\nLearn: ${userLearnPref}`;
    const message = `🔥 NEW COACHING LEAD (Quiz)\n\nName: ${userName || "Anonymous"}\n${summary}\n⏰ ${new Date().toLocaleString()}\n✅ wants free session follow-up.`;
    const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
    try {
      const res = await fetch(url, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: message, parse_mode: "Markdown" })
      });
      const data = await res.json();
      return data.ok;
    } catch(e) { return false; }
  }

  function computeCategoryAvgs() {
    const sums = {}, counts = {};
    HEALTH_QUESTIONS.forEach(q => {
      let val = healthAnswers[q.id] ?? 0;
      sums[q.category] = (sums[q.category] || 0) + val;
      counts[q.category] = (counts[q.category] || 0) + 1;
    });
    let avgs = {};
    for (let c in sums) avgs[c] = sums[c] / counts[c];
    return avgs;
  }

  // FIREWORKS (mini victory)
  function triggerFireworks() {
    const canvas = document.createElement('canvas');
    canvas.className = 'firework-canvas';
    document.body.appendChild(canvas);
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    let particles = [];
    for (let i=0; i<60; i++) {
      particles.push({
        x: canvas.width/2 + (Math.random() - 0.5)*150,
        y: canvas.height/2 + (Math.random() - 0.5)*100,
        vx: (Math.random() - 0.5)*6,
        vy: (Math.random() - 0.5)*6 - 3,
        life: 1,
        color: `hsl(${Math.random() * 40 + 40}, 80%, 60%)`
      });
    }
    let anim = true;
    function draw() {
      if (!anim) return;
      ctx.clearRect(0,0,canvas.width,canvas.height);
      let alive = false;
      particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.2;
        p.life -= 0.02;
        if(p.life > 0) { alive = true;
          ctx.globalAlpha = p.life;
          ctx.fillStyle = p.color;
          ctx.fillRect(p.x, p.y, 4,4);
        }
      });
      if(alive) requestAnimationFrame(draw);
      else { canvas.remove(); anim=false; }
    }
    draw();
    setTimeout(() => { if(canvas) canvas.remove(); }, 1500);
  }

  // swell effect on progress bar for last 3
  function applySwell(index) {
    const fillDiv = document.querySelector(".progress-fill");
    if(!fillDiv) return;
    if(index >= 8) { // Q9 (idx 8), Q10(9), Q11(10)
      fillDiv.classList.add("swell-glow");
      setTimeout(() => fillDiv.classList.remove("swell-glow"), 600);
    } else {
      fillDiv.classList.remove("swell-glow");
    }
  }

  // render root
  const root = document.getElementById("app");
  function render() {
    if (screen === "intro") renderIntro();
    else if (screen === "prequiz") renderPreQuiz();
    else if (screen === "quiz") renderQuizQuestion();
    else if (screen === "report") renderFinalReport();
  }

  function renderIntro() {
    root.innerHTML = `
      <div style="text-align:center;">
        <img src="https://i.ibb.co/ynXdYpmL/worldjjpgsf.png" class="logo-img" alt="Logo">
        <div class="tag-3min">⚡ 3 MINUTE QUIZ</div>
        <h1>Cellular Vitality Quiz</h1>
        <p style="margin-bottom:1rem;">Based on AccessWorld Seminars · Breathwork · Alkaline Principle</p>
        <div class="slider-container" style="margin:1rem 0;">
          <img src="https://i.ibb.co/5hRJT2gh/seminar.png" alt="people community" style="width:100%; border-radius:1.5rem;">
        </div>
        <div class="teaching-card">
          <p><span class="gold">“Your nervous system is your most powerful asset. It was programmed by experience, and it can be reprogrammed by experience.”</span></p>
        </div>
        <button class="btn btn-primary" id="startPreQuizBtn">🌿 Start 3-min Audit →</button>
        <p style="margin-top:1rem; font-size:0.8rem;">We have helped hundreds gain confidence, health & happiness</p>
      </div>
    `;
    document.getElementById("startPreQuizBtn")?.addEventListener("click", ()=>{
      screen = "prequiz";
      render();
    });
  }

  function renderPreQuiz() {
    root.innerHTML = `
      <div style="text-align:center;">
        <img src="https://i.ibb.co/ynXdYpmL/worldjjpgsf.png" class="logo-img" alt="Logo">
        <h2>Before we begin...</h2>
        <div class="segment-card">
          <h3>Which best describes you?</h3>
          <div id="segmentOptions" class="flex-btns" style="flex-direction:column; gap:0.6rem; margin:1rem 0;">
            ${["The Burned Out & Bottomed Out","The Yo-Yo Warrior","The Peak Performer","The Health Mystery Solver","The Life-Transition Seeker"].map(opt => `<button class="btn segment-btn" data-val="${opt}">${opt}</button>`).join('')}
          </div>
          <input type="text" id="userNameInput" placeholder="Your name (for your report)">
          <h3>What are you wanting to improve?</h3>
          <div class="flex-btns">
            ${["Improve energy","Improve sleep","Improve mental clarity"].map(g => `<button class="btn goal-btn" data-goal="${g}">${g}</button>`).join('')}
          </div>
          <div id="energyMsg" style="margin:0.5rem 0; font-style:italic;"></div>
          <h3>Select your main health focus</h3>
          <div class="flex-btns">
            ${["Eat better","Muscle tone","Breathing","Posture","Exercise"].map(f => `<button class="btn focus-btn" data-focus="${f}">${f}</button>`).join('')}
          </div>
          <h3>Preferred way to learn</h3>
          <div class="flex-btns">
            ${["Watch or attend Seminars","1 on 1 coaching","Group discussion","Reading"].map(l => `<button class="btn learn-btn" data-learn="${l}">${l}</button>`).join('')}
          </div>
          <button class="btn btn-primary" id="finishPreQuizBtn" style="margin-top:1.5rem;">Continue to Health Assessment →</button>
        </div>
        <div class="teaching-card">
          <img src="https://i.ibb.co/4Zd4RVbR/Gemini-Generated-Image-o877d1o877d1o877.png" style="max-width:100px; border-radius:1rem;">
          <p><span class="gold">"Motion creates emotion."</span> — Your body leads the mind.</p>
        </div>
      </div>
    `;
    document.querySelectorAll(".segment-btn").forEach(btn => btn.addEventListener("click", (e) => { userSegment = e.target.dataset.val; highlightSelected(".segment-btn", e.target); }));
    document.querySelectorAll(".goal-btn").forEach(btn => btn.addEventListener("click", (e) => { 
      userGoal = e.target.dataset.goal; 
      highlightSelected(".goal-btn", e.target);
      if(userGoal === "Improve energy") document.getElementById("energyMsg").innerHTML = "✨ Great choice! Energy is the most important benefit when you focus on health.";
      else document.getElementById("energyMsg").innerHTML = "";
    }));
    document.querySelectorAll(".focus-btn").forEach(btn => btn.addEventListener("click", (e) => { userHealthFocus = e.target.dataset.focus; highlightSelected(".focus-btn", e.target); }));
    document.querySelectorAll(".learn-btn").forEach(btn => btn.addEventListener("click", (e) => { userLearnPref = e.target.dataset.learn; highlightSelected(".learn-btn", e.target); }));
    document.getElementById("finishPreQuizBtn")?.addEventListener("click", () => {
      const nameInput = document.getElementById("userNameInput");
      if(!nameInput.value.trim()) { alert("Please enter your name to continue."); return; }
      if(!userSegment || !userGoal || !userHealthFocus || !userLearnPref) { alert("Please answer all the questions above: segment, goal, health focus & learning style."); return; }
      userName = nameInput.value.trim();
      screen = "quiz";
      currentQuizIndex = 0;
      render();
    });
    function highlightSelected(selector, activeBtn) {
      document.querySelectorAll(selector).forEach(btn => btn.classList.remove("btn-primary"));
      activeBtn.classList.add("btn-primary");
    }
  }

  // QUIZ PROGRESS (silent bar, swell on last 3, fireworks on last answer)
  function renderQuizQuestion() {
    const q = HEALTH_QUESTIONS[currentQuizIndex];
    const selectedVal = healthAnswers[q.id];
    const percent = ((currentQuizIndex) / HEALTH_QUESTIONS.length) * 100;
    const labels = ["0","1","2","3","4","5"];
    let scaleHtml = "";
    for(let i=0;i<=5;i++) {
      scaleHtml += `<div class="scale-opt ${selectedVal===i ? 'selected' : ''}" data-val="${i}"><div style="font-weight:800;">${i}</div><div style="font-size:0.7rem;">${labels[i]}</div></div>`;
    }
    let teachingHtml = "";
    if(currentQuizIndex === 2) teachingHtml = `<div class="teaching-card"><h3 class="gold">AccessWorld seminars has more impact thanks to AI integration.</h3><p>“Your brain is a pharmaceutical factory. You are not a passive victim of fleeting chemistry.”</p><img src="https://i.ibb.co/4Zd4RVbR/Gemini-Generated-Image-o877d1o877d1o877.png" style="max-width:80px;"></div>`;
    if(currentQuizIndex === 5) teachingHtml = `<div class="teaching-card"><h3 class="gold">AccessWorld seminars helps individuals feel good for no good reason.</h3><img src="https://i.ibb.co/r2T9kL99/Gemini-Generated-Image-tea7prtea7prtea7.png" class="inline-img" style="max-width:150px;"><p>“Feelings are not fate. They are habits.”</p></div>`;
    if(currentQuizIndex === 8) teachingHtml = `<div class="teaching-card"><h3 class="gold">AccessWorld seminars Mindset Coaching works – Make more money and improve your life</h3><img src="https://i.ibb.co/97mZvc6/Screenshot-2026-01-29-105636.png" style="max-width:130px;"></div>`;
    
    root.innerHTML = `
      <div>
        <img src="https://i.ibb.co/ynXdYpmL/worldjjpgsf.png" class="logo-img" alt="Logo" style="height:40px;">
        <div class="progress-container">
          <div class="progress-bar-bg"><div class="progress-fill" style="width: ${percent}%;"></div></div>
        </div>
        <div class="report-card">
          <h3>${q.text}</h3>
          <div class="scale-group" id="scaleGroupQuiz">${scaleHtml}</div>
        </div>
        ${teachingHtml}
        <div style="display:flex; justify-content:space-between; margin-top:1rem;">
          <button class="btn" id="prevQuizBtn" ${currentQuizIndex===0 ? 'disabled style="opacity:0.4;"' : ""}>← Back</button>
          <button class="btn btn-primary" id="nextQuizBtn">${currentQuizIndex === HEALTH_QUESTIONS.length-1 ? "Finish →" : "Next"}</button>
        </div>
      </div>
    `;
    // attach scale events
    document.querySelectorAll(".scale-opt").forEach(opt => {
      opt.addEventListener("click", (e) => {
        const val = parseInt(opt.dataset.val,10);
        healthAnswers[q.id] = val;
        renderQuizQuestion();
      });
    });
    const prevBtn = document.getElementById("prevQuizBtn");
    const nextBtn = document.getElementById("nextQuizBtn");
    if(prevBtn) prevBtn.onclick = () => { if(currentQuizIndex>0) { currentQuizIndex--; renderQuizQuestion(); } };
    if(nextBtn) nextBtn.onclick = async () => {
      if(healthAnswers[q.id] === null || healthAnswers[q.id] === undefined) { alert("Please select a rating 0-5"); return; }
      const isLast = (currentQuizIndex === HEALTH_QUESTIONS.length-1);
      if(isLast) {
        // trigger fireworks victory
        triggerFireworks();
        // final answers all good
        let sum = healthAnswers.reduce((a,b)=>a+b,0);
        finalScore = sum / HEALTH_QUESTIONS.length;
        categoryAvgs = computeCategoryAvgs();
        notificationSent = await sendTelegramNotification();
        screen = "report";
        render();
      } else {
        currentQuizIndex++;
        renderQuizQuestion();
        // apply swell & glow for last 3 questions after render
        setTimeout(() => { applySwell(currentQuizIndex); }, 50);
      }
    };
    // swell effect for current index if last 3
    setTimeout(() => { applySwell(currentQuizIndex); }, 80);
  }

  function renderFinalReport() {
    const avg = finalScore;
    const tier = getTier(avg);
    const lowCats = Object.entries(categoryAvgs).sort((a,b)=>a[1]-b[1]).slice(0,2);
    root.innerHTML = `
      <div>
        <img src="https://i.ibb.co/ynXdYpmL/worldjjpgsf.png" class="logo-img" alt="Logo">
        <h2>Your Cellular Vitality Report</h2>
        <div style="text-align:center; margin:1rem 0;">
          <div style="font-size:3rem; font-weight:bold; color:#C9A84C;">${avg.toFixed(1)}<span style="font-size:1.2rem;">/5</span></div>
          <div class="progress-bar-bg" style="width:70%; margin:0.5rem auto;"><div class="progress-fill" style="width: ${(avg/5)*100}%;"></div></div>
          <h3>${tier}</h3>
          <div class="report-card"><p><span class="gold">“The fastest way to change how you feel is to change your body — stand up, breathe deeply, lift your chest.”</span></p></div>
        </div>
        <div class="segment-card">
          <h3>🎯 Your personalized insights</h3>
          <p><strong>Segment:</strong> ${userSegment}</p>
          <p><strong>Main goal:</strong> ${userGoal}</p>
          <p><strong>Focus area:</strong> ${userHealthFocus}</p>
          <p><strong>Learning style:</strong> ${userLearnPref}</p>
          ${lowCats.length ? `<p><strong>Priority areas:</strong> ${lowCats.map(c=>c[0]).join(', ')} — small shifts create big momentum.</p>` : ""}
        </div>
        <div class="teaching-card">
          <img src="https://i.ibb.co/5hRJT2gh/seminar.png" class="testimonial-img" alt="testimonial face">
          <p><em>“I spent 12 years trying to 'think' my way out of old patterns with zero luck. After just 2 days with Joshua Roy and his NSR tools, my subconscious 'stuckness' finally broke.”</em><br>— Happy Client</p>
        </div>
        <div style="background: linear-gradient(135deg, #1e2a3a 0%, #0f1724 100%); border-radius: 2rem; padding: 1.5rem; margin: 1rem 0; text-align:center;">
          <h3 class="gold">🎁 Join the next free session</h3>
          <p>Experience deep lasting change. We have helped hundreds gain confidence, health and happiness.</p>
          <a href="https://accessworldseminars-ship-it.github.io/results/s" target="_blank" class="btn btn-primary" style="display:inline-block; text-decoration:none;">→ Claim your seat ←</a>
          <p style="margin-top:0.8rem;">AccessWorld Seminars creates deep lasting change.</p>
        </div>
        <footer class="final-footer">
          Joshua Roy - Life and Results Coach<br>
          AccessWorld Seminars · Cellular Wisdom
        </footer>
      </div>
    `;
  }
  render();
</script>
</body>
</html>
