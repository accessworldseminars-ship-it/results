<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AccessWorld · Cellular Vitality Quiz</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 10% 20%, #0a0f1c, #03060c);
      font-family: 'Montserrat', sans-serif;
      color: #eef2ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
    }

    /* GIANT WATERMARK LOGO */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('https://i.ibb.co/ynXdYpmL/worldjjpgsf.png');
      background-repeat: no-repeat;
      background-position: center center;
      background-size: 50%;
      opacity: 0.07;
      pointer-events: none;
      z-index: 0;
    }

    .quiz-container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 850px;
      margin: 0 auto;
    }

    .card {
      background: rgba(10, 18, 28, 0.88);
      backdrop-filter: blur(12px);
      border-radius: 2.5rem;
      padding: 2rem;
      box-shadow: 0 25px 40px -18px rgba(0,0,0,0.5), 0 0 0 1px rgba(201, 168, 76, 0.2);
      animation: fadeSlideUp 0.3s ease-out;
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(8px);}
      to { opacity: 1; transform: translateY(0);}
    }

    h1, h2, h3 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    .gold { color: #C9A84C; }

    /* BUTTONS - completely static, no transform, no blink */
    .btn {
      background: transparent;
      border: 1.5px solid #C9A84C;
      color: #C9A84C;
      padding: 0.7rem 1.6rem;
      border-radius: 60px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Montserrat', sans-serif;
      font-size: 1rem;
      display: inline-block;
      text-align: center;
      transition: none;
    }
    .btn-primary {
      background: #C9A84C;
      color: #0a0f1c;
      border: none;
    }
    .btn-primary:hover { background: #b6902e; }
    .btn:hover { background: #C9A84C; color: #0a0f1c; }
    .btn:active, .scale-opt:active { transform: none; }

    /* scale options - perfectly round, uniform size */
    .scale-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin: 2rem 0 1rem;
      justify-content: center;
    }
    .scale-opt {
      background: rgba(255,255,245,0.05);
      border-radius: 60px;
      padding: 0.7rem 1rem;
      min-width: 72px;
      text-align: center;
      cursor: pointer;
      border: 1px solid rgba(201, 168, 76, 0.3);
      font-weight: 500;
      font-size: 0.9rem;
      transition: none;
    }
    .scale-opt.selected {
      background: #C9A84C;
      color: #0a0f1c;
      border-color: #C9A84C;
    }

    .progress-steps {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .step-dot {
      width: 10px;
      height: 10px;
      background: #2a3a55;
      border-radius: 10px;
    }
    .step-dot.active { background: #C9A84C; width: 24px; }

    input {
      width: 100%;
      padding: 1rem;
      background: #0e1624;
      border: 1px solid #2c3b55;
      border-radius: 2rem;
      color: white;
      margin-bottom: 1rem;
    }

    /* LARGER IMAGES on both desktop & mobile */
    .teaching-img {
      width: 100%;
      max-width: 550px;
      border-radius: 1.8rem;
      margin: 1rem auto;
      display: block;
      box-shadow: 0 12px 28px -8px black;
    }
    @media (min-width: 768px) {
      .teaching-img { max-width: 85%; }
    }

    .report-section {
      background: rgba(8, 14, 22, 0.9);
      border-radius: 2rem;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      border-left: 4px solid #C9A84C;
    }

    .report-nav {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    footer {
      text-align: center;
      font-size: 0.75rem;
      margin-top: 2rem;
      opacity: 0.7;
    }

    .credentials {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .credentials img { height: 60px; }

    .option-btn {
      width: 100%;
      margin-bottom: 0.5rem;
    }

    @media (max-width: 600px) {
      .card { padding: 1.5rem; }
      .scale-opt { min-width: 58px; padding: 0.5rem; font-size: 0.8rem; }
      .teaching-img { max-width: 100%; }
    }
  </style>
</head>
<body>
<div class="quiz-container" id="app"></div>

<script>
  // ========== TELEGRAM CONFIG ==========
  const TELEGRAM_BOT_TOKEN = "8155100717:AAHrhehNUzIY2ArY2FUtEvSbFzkzRDciWmk";
  const TELEGRAM_CHAT_ID = "5970521104";
  // =====================================

  const QUESTIONS = [
    { id: 0, text: "I breathe using my belly (diaphragm) with shoulders relaxed, not shallow chest breathing.", category: "Breathwork" },
    { id: 1, text: "I can hold my breath after exhale for at least 30 seconds comfortably.", category: "Lung Capacity" },
    { id: 2, text: "I eat fresh fruits/vegetables daily and avoid hybridized wheat (white bread/pasta).", category: "Diet" },
    { id: 3, text: "I consume healing foods: coriander/cilantro, celery juice, zucchini/squash weekly.", category: "Food as Medicine" },
    { id: 4, text: "My energy is stable throughout the day (no afternoon crash or sugar cravings).", category: "Energy" },
    { id: 5, text: "I move my body daily to stimulate lymphatic flow (bouncing, walking, rebounder).", category: "Mobility & Lymph" },
    { id: 6, text: "I avoid processed sugar & excess dairy to reduce brain fog and metal toxicity.", category: "Mindset & Clarity" },
    { id: 7, text: "I feel I'm proactively alkalizing my body (reduce acid, increase alkaline foods).", category: "Alkaline Balance" },
    { id: 8, text: "I can get up from the floor without using my hands.", category: "Mobility" },
    { id: 9, text: "I incorporate posture exercises or stretching at least once each week.", category: "Posture & Flexibility" },
    { id: 10, text: "I prioritise my health even when life gets busy or I have a lot on my plate.", category: "Mindset" }
  ];

  const TEACHING_SCREENS = {
    3: { headline: "AccessWorld seminars has more impact thanks to AI integration.", quote: "Your brain is a pharmaceutical factory. You are not a passive victim of fleeting chemistry.", image: "https://i.ibb.co/4Zd4RVbR/Gemini-Generated-Image-o877d1o877d1o877.png" },
    6: { headline: "AccessWorld seminars helps individuals feel good for no good reason.", quote: "Feelings are not fate. They are habits.", image: "https://i.ibb.co/r2T9kL99/Gemini-Generated-Image-tea7prtea7prtea7.png" },
    9: { headline: "AccessWorld seminars Mindset Coaching works – Make more money and improve your life", quote: "Calm is the container that holds everything else together.", image: "https://i.ibb.co/97mZvc6/Screenshot-2026-01-29-105636.png" }
  };

  let step = "intro";
  let currentQuestionIdx = 0;
  let answers = new Array(QUESTIONS.length).fill(null);
  let userSegment = "", userGoal = "", userHealthFocus = "", userLearnPref = "";
  let userName = "", userEmail = "", userPhone = "";
  let finalScore = 0, categoryAvgs = {};
  let reportPage = 0; // for 3-page report navigation

  function getTierData(avg) {
    if (avg < 1.8) return { label: "Acidic Overload", msg: "Your terrain is highly acidic. Immediate lifestyle shift needed." };
    if (avg < 2.6) return { label: "Compensation Mode", msg: "Cells lack oxygen & alkaline minerals." };
    if (avg < 3.5) return { label: "Transitioning Vitality", msg: "Your body is ready to heal with breath & whole foods." };
    if (avg < 4.3) return { label: "Alkaline Momentum", msg: "Keep expanding lung capacity & green juices." };
    return { label: "Cellular Mastery", msg: "Exceptional! Alkaline & oxygen-rich environment." };
  }

  async function sendTelegramNotification() {
    if (!TELEGRAM_BOT_TOKEN || TELEGRAM_BOT_TOKEN === "YOUR_BOT_TOKEN_HERE") return false;
    if (!TELEGRAM_CHAT_ID || TELEGRAM_CHAT_ID === "YOUR_CHAT_ID_HERE") return false;
    const total = answers.reduce((a,b)=>a+b,0);
    const avg = total / QUESTIONS.length;
    const tier = getTierData(avg).label;
    const message = `🔥 NEW COACHING LEAD (Quiz)\n\nName: ${userName}\nEmail: ${userEmail}\nPhone: ${userPhone}\nSegment: ${userSegment}\nGoal: ${userGoal}\nFocus: ${userHealthFocus}\nLearning: ${userLearnPref}\nScore: ${avg.toFixed(1)}/5 (${tier})`;
    try {
      const res = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: message })
      });
      return res.ok;
    } catch(e) { return false; }
  }

  function computeCategoryAverages() {
    const sums = {}, counts = {};
    QUESTIONS.forEach(q => {
      const val = answers[q.id] ?? 0;
      sums[q.category] = (sums[q.category] || 0) + val;
      counts[q.category] = (counts[q.category] || 0) + 1;
    });
    const avgs = {};
    for (let c in sums) avgs[c] = sums[c] / counts[c];
    return avgs;
  }

  const root = document.getElementById("app");
  function render() {
    if (step === "intro") renderIntro();
    else if (step === "preSegments") renderPreSegments();
    else if (step === "quiz") renderQuiz();
    else if (step === "teaching") renderTeaching();
    else if (step === "contact") renderContact();
    else if (step === "report") renderMultiPageReport();
  }

  function renderIntro() {
    root.innerHTML = `
      <div class="card" style="text-align:center;">
        <div class="credentials"><img src="https://i.ibb.co/ynXdYpmL/worldjjpgsf.png"><h3>Joshua Roy</h3><p class="gold">AccessWorld Seminars — helping people since 2015</p></div>
        <div style="font-family:monospace;">⚡ 3 MINUTE QUIZ</div>
        <h1 style="font-size:2.8rem;">Cellular Vitality<br>Audit</h1>
        <p>Based on Breathwork · Alkaline Principle · Nervous System Reset</p>
        <div style="margin:1.5rem 0;"><p class="gold">“Your nervous system is your most powerful asset. It can be reprogrammed by experience.”</p></div>
        <button class="btn btn-primary" id="startBtn">🌿 Start My Health Audit →</button>
        <footer>We have helped hundreds gain confidence, health & happiness</footer>
      </div>`;
    document.getElementById("startBtn")?.addEventListener("click", () => { step = "preSegments"; render(); });
  }

  function renderPreSegments() {
    let preStep = 0;
    const steps = [
      { question: "Which best describes you?", options: ["The Burned Out & Bottomed Out","The Yo-Yo Warrior","The Peak Performer","The Health Mystery Solver","The Life-Transition Seeker"], key: "segment" },
      { question: "What are you wanting to improve?", options: ["Improve energy","Improve sleep","Improve mental clarity"], key: "goal" },
      { question: "Select your main health focus", options: ["Eat better","Muscle tone","Breathing","Posture","Exercise"], key: "focus" },
      { question: "Preferred way to learn", options: ["Watch or attend Seminars","1 on 1 coaching","Group discussion","Reading"], key: "learn" }
    ];
    const container = document.createElement('div'); container.className = "card";
    const renderStep = () => {
      const s = steps[preStep];
      let currentVal = s.key === "segment" ? userSegment : (s.key === "goal" ? userGoal : (s.key === "focus" ? userHealthFocus : userLearnPref));
      let extra = (s.key === "goal" && userGoal === "Improve energy") ? `<p class="gold" style="margin-top:0.8rem;">✨ Great choice! Energy is the most important benefit.</p>` : "";
      container.innerHTML = `
        <h2>Before we dive deep<span class="gold">.</span></h2>
        <h3>${s.question}</h3>
        <div style="display:flex; flex-direction:column; gap:0.6rem; margin:1.5rem 0;">
          ${s.options.map(opt => `<button class="btn option-btn ${currentVal === opt ? 'btn-primary' : ''}" data-val="${opt}">${opt}</button>`).join('')}
        </div>
        ${extra}
        <div style="display:flex; justify-content:space-between;">
          <button class="btn" id="prePrevBtn" ${preStep===0 ? 'disabled' : ""}>← Prev</button>
          <button class="btn btn-primary" id="preNextBtn">${preStep===steps.length-1 ? "Start Quiz →" : "Next"}</button>
        </div>
        <button class="btn" id="resetIntroBtn" style="margin-top:1rem;">Back to Intro</button>
      `;
      document.querySelectorAll(".option-btn").forEach(btn => btn.addEventListener("click", (e) => {
        let val = e.currentTarget.dataset.val;
        if (s.key === "segment") userSegment = val;
        if (s.key === "goal") userGoal = val;
        if (s.key === "focus") userHealthFocus = val;
        if (s.key === "learn") userLearnPref = val;
        renderStep();
      }));
      document.getElementById("prePrevBtn")?.addEventListener("click", () => { if(preStep>0){ preStep--; renderStep(); } });
      document.getElementById("preNextBtn")?.addEventListener("click", () => {
        let has = (s.key === "segment" && userSegment) || (s.key === "goal" && userGoal) || (s.key === "focus" && userHealthFocus) || (s.key === "learn" && userLearnPref);
        if(!has){ alert("Please select an option"); return; }
        if(preStep === steps.length-1){ step="quiz"; currentQuestionIdx=0; render(); }
        else { preStep++; renderStep(); }
      });
      document.getElementById("resetIntroBtn")?.addEventListener("click", () => { step="intro"; render(); });
    };
    root.innerHTML = ""; root.appendChild(container); renderStep();
  }

  function renderQuiz() {
    const q = QUESTIONS[currentQuestionIdx];
    const selected = answers[q.id];
    const progress = (currentQuestionIdx / QUESTIONS.length) * 100;
    root.innerHTML = `
      <div class="card">
        <div class="progress-steps">${QUESTIONS.map((_,i)=>`<div class="step-dot ${i===currentQuestionIdx?'active':''}"></div>`).join('')}</div>
        <div style="background:#2a3650; height:4px; border-radius:10px;"><div style="width:${progress}%; background:#C9A84C; height:4px; border-radius:10px;"></div></div>
        <h2 style="margin:1.5rem 0 1rem;">${q.text}</h2>
        <div class="scale-group" id="scaleGroup"></div>
        <div style="display:flex; justify-content:space-between; margin-top:2rem;">
          <button class="btn" id="quizPrevBtn" ${currentQuestionIdx===0 ? 'disabled' : ""}>← Previous</button>
          <button class="btn btn-primary" id="quizNextBtn">${currentQuestionIdx===QUESTIONS.length-1 ? "Complete →" : "Next"}</button>
        </div>
      </div>`;
    const group = document.getElementById("scaleGroup");
    for(let i=0;i<=5;i++){
      let div = document.createElement("div");
      div.className = `scale-opt ${selected===i ? 'selected' : ''}`;
      div.innerHTML = `<div style="font-weight:800;">${i}</div><div style="font-size:0.7rem;">${["Never","Rarely","Sometimes","Often","Mostly","Always"][i]}</div>`;
      div.addEventListener("click", () => { answers[q.id]=i; renderQuiz(); });
      group.appendChild(div);
    }
    document.getElementById("quizPrevBtn")?.addEventListener("click", () => { if(currentQuestionIdx>0){ currentQuestionIdx--; render(); } });
    document.getElementById("quizNextBtn")?.addEventListener("click", () => {
      if(answers[q.id]===null){ alert("Please select a rating 0-5"); return; }
      if(currentQuestionIdx === QUESTIONS.length-1){
        let sum = answers.reduce((a,b)=>a+b,0);
        finalScore = sum/QUESTIONS.length;
        categoryAvgs = computeCategoryAverages();
        step="contact";
        render();
      } else {
        let nextIdx = currentQuestionIdx+1;
        if(TEACHING_SCREENS[nextIdx]){ window.nextAfterTeaching = nextIdx; step="teaching"; render(); }
        else { currentQuestionIdx++; render(); }
      }
    });
  }

  function renderTeaching() {
    let next = window.nextAfterTeaching;
    let teach = TEACHING_SCREENS[next];
    if(!teach) { step="quiz"; render(); return; }
    root.innerHTML = `
      <div class="card" style="text-align:center;">
        <h2 class="gold">✨ ${teach.headline}</h2>
        <img src="${teach.image}" class="teaching-img" alt="wisdom">
        <div class="report-section" style="background:rgba(0,0,0,0.3);">
          <p class="gold" style="font-size:1.3rem;">“${teach.quote}”</p>
        </div>
        <button class="btn btn-primary" id="contTeachBtn">Continue →</button>
      </div>`;
    document.getElementById("contTeachBtn")?.addEventListener("click", () => { currentQuestionIdx = next; step="quiz"; render(); });
  }

  function renderContact() {
    root.innerHTML = `
      <div class="card">
        <h2>Your Comprehensive Report Awaits</h2>
        <p>Enter your details to unlock your 3‑page Cellular Vitality report + free session invite.</p>
        <input type="text" id="contactName" placeholder="Full name">
        <input type="email" id="contactEmail" placeholder="Email address">
        <input type="tel" id="contactPhone" placeholder="Phone with area code">
        <div style="display:flex; gap:1rem; justify-content:center;">
          <button class="btn" id="backToQuizBtn">← Back</button>
          <button class="btn btn-primary" id="genReportBtn">📊 Generate Full Report →</button>
        </div>
      </div>`;
    document.getElementById("backToQuizBtn")?.addEventListener("click", () => { step="quiz"; render(); });
    document.getElementById("genReportBtn")?.addEventListener("click", async () => {
      let name = document.getElementById("contactName").value.trim();
      let email = document.getElementById("contactEmail").value.trim();
      let phone = document.getElementById("contactPhone").value.trim();
      if(!name || !email) { alert("Name and email required."); return; }
      userName=name; userEmail=email; userPhone=phone;
      await sendTelegramNotification();
      reportPage = 0;
      step="report";
      render();
    });
  }

  // 3-PAGE COMPREHENSIVE REPORT with navigation
  function renderMultiPageReport() {
    const avg = finalScore;
    const tier = getTierData(avg);
    const categoryList = Object.entries(categoryAvgs).sort((a,b)=>a[1]-b[1]);
    const lowest = categoryList.slice(0,3);
    const highest = categoryList.slice(-3).reverse();
    const answersDetail = QUESTIONS.map((q,i)=>`<div><span>${q.text.substring(0,70)}</span> <strong class="gold">${answers[i]}/5</strong><div style="background:#2a3650; height:4px; margin:4px 0 12px;"><div style="width:${answers[i]*20}%; background:#C9A84C; height:4px;"></div></div></div>`).join('');

    const page1 = `
      <div style="text-align:center;">
        <h1>Your Cellular Vitality Report</h1>
        <div style="font-size:3rem; color:#C9A84C;">${avg.toFixed(1)}<span style="font-size:1rem;">/5</span></div>
        <div style="background:#2a3650; width:70%; margin:0.5rem auto; border-radius:20px; height:8px;"><div style="width:${(avg/5)*100}%; background:#C9A84C; height:8px; border-radius:20px;"></div></div>
        <h2 class="gold">${tier.label}</h2>
        <p>${tier.msg}</p>
      </div>
      <div class="report-section"><h3>📊 Score & Oxygen Blueprint</h3><p><strong>Oxygen:</strong> ${answers[0]>3?"Diaphragmatic active.":"Shallow breathing — start belly breaths."}</p><p><strong>Alkaline:</strong> ${answers[7]>3?"Alkaline fortress.":"Acidic — add greens + lemon."}</p><p><strong>Lymph flow:</strong> ${answers[5]>3?"Movement clears toxins.":"Sedentary lymph — start rebounding."}</p></div>
      <div class="report-section"><h3>🎯 Your Profile</h3><p><strong>Segment:</strong> ${userSegment}<br><strong>Goal:</strong> ${userGoal}<br><strong>Health focus:</strong> ${userHealthFocus}<br><strong>Learning style:</strong> ${userLearnPref}</p></div>
    `;

    const page2 = `
      <div class="report-section"><h3>🌱 Priority Healing Areas (lowest scores)</h3>${lowest.map(([cat,sc])=>`<div><strong>${cat}</strong> · ${sc.toFixed(1)}/5<br>✨ Daily micro-habit: ${cat.includes("Breath")?"2 min breath holds":cat.includes("Diet")?"celery juice + cilantro":cat.includes("Mobility")?"5 min bouncing or heel drops":"posture stretches"}</div><hr style="opacity:0.2;">`).join('')}</div>
      <div class="report-section"><h3>🏆 Your Strengths</h3>${highest.map(([cat,sc])=>`<div><strong>${cat}</strong> · ${sc.toFixed(1)}/5 — use as leverage.</div>`).join('')}</div>
      <div class="report-section"><h3>🧘 Breathwork Protocol</h3><p>${answers[0]<3?"Start belly breathing 4s inhale / 6s exhale, 10 min daily.":"Advanced: 30 power breaths + 60s retention. Add cold exposure."}</p><p class="gold">"Ten minutes a day of state management changes your life."</p></div>
    `;

    const page3 = `
      <div class="report-section"><h3>🥗 Healing Foods (AccessWorld Protocols)</h3><p>✔ Coriander/Cilantro – heavy metal chelation<br>✔ Celery juice – restores lymph flow<br>✔ Zucchini – prefrontal cortex fuel<br>✔ Papaya – peristaltic cleansing<br>✔ Limit hybrid wheat, processed sugar.</p></div>
      <div class="report-section"><h3>📋 Your Detailed Answers</h3><div style="max-height:260px; overflow-y:auto;">${answersDetail}</div></div>
      <div style="background: linear-gradient(135deg, #1e2a3a, #0a0f1c); border-radius: 2rem; padding: 1.5rem; text-align:center; margin:1rem 0;">
        <h3 class="gold">🎁 Join the next Free Session</h3>
        <p>We have helped hundreds gain confidence, health & happiness. AccessWorld creates deep lasting change.</p>
        <a href="https://accessworldseminars-ship-it.github.io/results/s" target="_blank" class="btn btn-primary" style="display:inline-block; text-decoration:none;">→ Reserve my seat ←</a>
      </div>
      <footer style="margin-top:2rem;">Joshua Roy - Life and Results Coach<br>AccessWorld Seminars · Cellular Vitality Systems</footer>
    `;

    const pages = [page1, page2, page3];
    root.innerHTML = `
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
          <span class="gold">Page ${reportPage+1} of 3</span>
          <img src="https://i.ibb.co/ynXdYpmL/worldjjpgsf.png" style="height:35px;">
        </div>
        <div id="reportContent">${pages[reportPage]}</div>
        <div class="report-nav">
          <button class="btn" id="prevPageBtn" ${reportPage===0 ? 'disabled' : ''}>← Previous</button>
          <button class="btn btn-primary" id="nextPageBtn">${reportPage===2 ? 'Finish' : 'Next →'}</button>
        </div>
      </div>`;
    document.getElementById("prevPageBtn")?.addEventListener("click", () => { if(reportPage>0){ reportPage--; renderMultiPageReport(); } });
    document.getElementById("nextPageBtn")?.addEventListener("click", () => {
      if(reportPage === 2) { step="intro"; render(); }
      else { reportPage++; renderMultiPageReport(); }
    });
  }

  render();
</script>
</body>
</html>
```
