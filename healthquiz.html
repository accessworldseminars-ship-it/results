function renderPreScreen({ stepNum, total, title, subtitle, options, back, next, field }) {
  root.innerHTML = `<div class="card">${brandHeader()}${progressBar(stepNum - 1, total)}
    <div class="q-category">Your Profile · Step ${stepNum} of ${total}</div>
    <h2 class="gold">${title}</h2>${subtitle ? `<p style="margin:0.5rem 0 0;">${subtitle}</p>` : ''}

    <div class="btn-row"><button class="btn btn-outline" id="backBtn">← Back</button><button class="btn btn-primary" id="nextBtn" disabled>Continue →</button></div>
  </div>`;
  let sel = "";
  document.querySelectorAll(".opt-card").forEach(el => { el.onclick = () => { document.querySelectorAll(".opt-card").forEach(c => c.classList.remove("selected")); el.classList.add("selected"); sel = el.dataset.val; document.getElementById("nextBtn").disabled = false; }; });
  document.getElementById("nextBtn").onclick = () => { if (sel) { preData[field] = sel; step = next; render(); } };
  document.getElementById("backBtn").onclick = () => { step = back; render(); };
}

function renderQuiz() {
  if (currentQuestion >= QUESTIONS.length) {
    finalScore = calculateFinalScore();
    categoryAverages = calculateCategoryAverages();
    step = "leadCapture";
    render();
    return;
  }
  const q = QUESTIONS[currentQuestion];
  const words = ["Rarely", "", "Sometimes", "", "Always"];
  const teachingHtml = q.teachId ? getTeachingHtml(q.teachId) : '';
  root.innerHTML = `<div class="card">${brandHeader(false)}${progressBar(currentQuestion, QUESTIONS.length)}
    <div class="q-counter">Question ${currentQuestion + 1} of ${QUESTIONS.length}</div>
    <div class="q-category">${q.category}</div>
    <div class="q-text">${q.text}</div>
    <div class="scale-container"><div class="scale-labels"><span>Rarely</span><span>Sometimes</span><span>Always</span></div>
    <div class="scale-btns" id="scaleBtns"></div></div>${teachingHtml}
    <div class="btn-row"><button class="btn btn-outline" id="prevBtn" ${currentQuestion === 0 ? 'disabled' : ''}>← Back</button>
    <button class="btn btn-primary" id="nextBtn" ${answers[currentQuestion] === null ? 'disabled' : ''}>${currentQuestion === QUESTIONS.length - 1 ? 'Continue →' : 'Next →'}</button></div>
  </div>`;
  const sb = document.getElementById("scaleBtns");
  for (let i = 1; i <= 5; i++) {
    const btn = document.createElement("div");
    btn.className = `scale-btn${answers[currentQuestion] === i ? ' selected' : ''}`;
    btn.innerHTML = `<div class="scale-num">${i}</div><div class="scale-word">${words[i - 1]}</div>`;
    btn.onclick = () => { answers[currentQuestion] = i; renderQuiz(); };
    sb.appendChild(btn);
  }
  document.getElementById("prevBtn").onclick = () => { if (currentQuestion > 0) { currentQuestion--; renderQuiz(); } };
  document.getElementById("nextBtn").onclick = () => {
    if (answers[currentQuestion] !== null) {
      if (currentQuestion < QUESTIONS.length - 1) { currentQuestion++; renderQuiz(); }
      else { finalScore = calculateFinalScore(); categoryAverages = calculateCategoryAverages(); step = "leadCapture"; render(); }
    }
  };
}
