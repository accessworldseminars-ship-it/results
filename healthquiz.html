<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AccessWorld Health Audit | Cellular Vitality Report</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: linear-gradient(135deg, #0a0f1c 0%, #141e2f 100%);
      font-family: 'Montserrat', sans-serif;
      color: #eef2ff;
      padding: 1.5rem;
      min-height: 100vh;
    }
    .quiz-wrapper {
      max-width: 860px;
      margin: 0 auto;
      background: rgba(12, 20, 30, 0.75);
      backdrop-filter: blur(3px);
      border-radius: 2rem;
      padding: 1.8rem;
      box-shadow: 0 25px 40px -12px rgba(0,0,0,0.6);
    }
    h1, h2, h3 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      letter-spacing: -0.2px;
    }
    h1 { font-size: 2.4rem; color: #C9A84C; margin-bottom: 0.5rem; }
    .gold { color: #C9A84C; }
    .btn {
      background: transparent;
      border: 1.5px solid #C9A84C;
      color: #C9A84C;
      padding: 0.7rem 1.8rem;
      border-radius: 60px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      font-family: 'Montserrat', sans-serif;
      margin: 0.3rem;
    }
    .btn-primary {
      background: #C9A84C;
      color: #0a0f1c;
      border: none;
      font-weight: 700;
    }
    .btn-primary:hover { background: #b6902e; transform: translateY(-2px); }
    .btn:hover { background: #C9A84C; color: #0a0f1c; }
    .scale-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      margin: 1.5rem 0;
      justify-content: space-between;
    }
    .scale-opt {
      flex: 1;
      min-width: 70px;
      text-align: center;
      background: rgba(255,255,240,0.05);
      border-radius: 60px;
      padding: 0.6rem 0.2rem;
      cursor: pointer;
      border: 1px solid transparent;
      transition: 0.1s;
    }
    .scale-opt.selected {
      background: #C9A84C;
      color: #0a0f1c;
      border-color: #C9A84C;
      font-weight: 700;
    }
    .progress-bar {
      background: #2a3650;
      border-radius: 40px;
      height: 8px;
      width: 100%;
      margin: 1rem 0;
    }
    .progress-fill {
      background: #C9A84C;
      width: 0%;
      height: 8px;
      border-radius: 40px;
    }
    input, textarea {
      width: 100%;
      padding: 0.9rem 1rem;
      background: #111c2a;
      border: 1px solid #2c3b55;
      border-radius: 2rem;
      color: white;
      font-family: 'Montserrat', sans-serif;
      margin-bottom: 1rem;
    }
    .report-card {
      background: #0e1624;
      border-radius: 1.8rem;
      padding: 1.5rem;
      margin-bottom: 1.2rem;
      border-left: 5px solid #C9A84C;
    }
    .coaching-request {
      background: linear-gradient(135deg, #1e2a3a 0%, #0f1724 100%);
      border: 2px solid #C9A84C;
      border-radius: 1.8rem;
      padding: 1.2rem;
      margin: 1rem 0;
      text-align: center;
    }
    @media print {
      body { background: white; padding: 0; margin: 0; }
      .quiz-wrapper { background: white; box-shadow: none; padding: 0.5rem; color: black; }
      .btn, .no-print, .coaching-request, .tab-bar { display: none; }
      .gold, h1 { color: #b8860b; }
      .report-card { background: #f8f9fa; border-left: 4px solid #b8860b; color: black; }
    }
    .tab-bar { display: flex; gap: 0.5rem; margin: 1.5rem 0 1rem; flex-wrap: wrap; border-bottom: 1px solid #2f3b5c; padding-bottom: 0.5rem; }
    .tab-btn { background: none; border: none; color: #b9c7dd; font-weight: 600; padding: 0.4rem 1.2rem; border-radius: 40px; cursor: pointer; }
    .tab-btn.active { background: #C9A84C; color: #0a0f1c; }
    .tab-pane { display: none; animation: fade 0.2s; }
    .tab-pane.active-pane { display: block; }
    @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
    footer { font-size: 0.7rem; text-align: center; margin-top: 2rem; opacity: 0.7; }
    .notification-success {
      background: #2e7d64;
      color: white;
      padding: 0.8rem;
      border-radius: 1rem;
      margin-top: 1rem;
      display: none;
    }
  </style>
</head>
<body>
<div class="quiz-wrapper" id="app"></div>

<script>
  // ========== TELEGRAM CONFIGURATION ==========
  // REPLACE THESE WITH YOUR ACTUAL BOT TOKEN AND CHAT ID
  const TELEGRAM_BOT_TOKEN = "8155100717:AAEXk-tK_Lh-WcBKyrW6Z1kQQXs0U-xFs38";  // e.g., "1234567890:ABCdefGHIJKLMNopqRsTUVwxyz"
  const TELEGRAM_CHAT_ID = "5970521104";      // e.g., "123456789"
  // ============================================
  
  // Function to send notification to Telegram
  async function sendTelegramNotification(contact, score, tierLabel, answersSummary) {
    if (!TELEGRAM_BOT_TOKEN || TELEGRAM_BOT_TOKEN === "YOUR_BOT_TOKEN_HERE") {
      console.warn("Telegram bot token not configured");
      return false;
    }
    if (!TELEGRAM_CHAT_ID || TELEGRAM_CHAT_ID === "YOUR_CHAT_ID_HERE") {
      console.warn("Telegram chat ID not configured");
      return false;
    }
    
    const message = `🔥 *NEW COACHING LEAD from Health Audit!* 🔥
    
👤 *Name:* ${contact.name}
📧 *Email:* ${contact.email}
📞 *Phone:* ${contact.phone || "Not provided"}
📊 *Score:* ${score.toFixed(1)}/5
🏷️ *Tier:* ${tierLabel}
📝 *Summary:* ${answersSummary}
⏰ *Time:* ${new Date().toLocaleString()}
🎯 *Action:* This person wants coaching follow-up!`;
    
    const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
    try {
      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          chat_id: TELEGRAM_CHAT_ID,
          text: message,
          parse_mode: "Markdown"
        })
      });
      const result = await response.json();
      if (result.ok) {
        console.log("Telegram notification sent successfully");
        return true;
      } else {
        console.error("Telegram error:", result);
        return false;
      }
    } catch (error) {
      console.error("Failed to send Telegram notification:", error);
      return false;
    }
  }

  // ------------------- DATA -------------------
  const QUESTIONS = [
    { id: 0, text: "I breathe using my belly (diaphragm) with shoulders relaxed, not shallow chest breathing.", category: "Breathwork", pillar: "Oxygen & Energy" },
    { id: 1, text: "I can hold my breath after exhale for at least 30 seconds comfortably.", category: "Lung Capacity", pillar: "Oxygen & Energy" },
    { id: 2, text: "I eat fresh fruits/vegetables daily and avoid hybridized wheat (white bread/pasta).", category: "Diet", pillar: "Alkaline Nutrition" },
    { id: 3, text: "I consume healing foods: coriander/cilantro, celery juice, zucchini/squash weekly.", category: "Food as Medicine", pillar: "Cellular Detox" },
    { id: 4, text: "My energy is stable throughout the day (no afternoon crash or sugar cravings).", category: "Energy", pillar: "Mitochondrial Health" },
    { id: 5, text: "I move my body daily to stimulate lymphatic flow (bouncing, walking, rebounder).", category: "Mobility & Lymph", pillar: "Lymphatic System" },
    { id: 6, text: "I avoid processed sugar & excess dairy to reduce brain fog and metal toxicity.", category: "Mindset & Clarity", pillar: "Neuro Health" },
    { id: 7, text: "I feel I'm proactively alkalizing my body (reduce acid, increase alkaline foods).", category: "Alkaline Balance", pillar: "Disease Prevention" },
    { id: 8, text: "I can get up from the floor without using my hands.", category: "Mobility", pillar: "Longevity" },
    { id: 9, text: "I incorporate posture exercises or stretching at least once each week.", category: "Posture & Flexibility", pillar: "Stress Resilience" },
    { id: 10, text: "I prioritise my health even when life gets busy or I have a lot on my plate.", category: "Mindset", pillar: "Decide · Commit · Resolve" }
  ];

  // helper: get tier based on average (0-5)
  const getTierData = (avg) => {
    if (avg < 1.8) return { label: "Acidic Overload", color: "#C9A84C", message: "Your terrain is highly acidic. Disease thrives here. Immediate lifestyle shift needed." };
    if (avg < 2.6) return { label: "Compensation Mode", color: "#C9A84C", message: "You're surviving, not thriving. Cells lack oxygen & alkaline minerals." };
    if (avg < 3.5) return { label: "Transitioning Vitality", color: "#C9A84C", message: "Good awareness! Your body is ready to heal if you commit to breath & whole foods." };
    if (avg < 4.3) return { label: "Alkaline Momentum", color: "#C9A84C", message: "You're building a fortress. Keep expanding lung capacity & green juices." };
    return { label: "Cellular Mastery", color: "#C9A84C", message: "Exceptional! You embody the Warburg principle — alkaline & oxygen-rich environment." };
  };

  // compute average per category (string -> float)
  function computeCategoryAverages(answers) {
    const sums = {}, counts = {};
    QUESTIONS.forEach(q => {
      const cat = q.category;
      const val = answers[q.id];
      const numeric = (typeof val === 'number' && !isNaN(val)) ? val : 0;
      sums[cat] = (sums[cat] || 0) + numeric;
      counts[cat] = (counts[cat] || 0) + 1;
    });
    const avgs = {};
    for (let c in sums) avgs[c] = sums[c] / counts[c];
    return avgs;
  }

  // Get quick summary for Telegram
  function getAnswersSummary(answers) {
    const total = answers.reduce((a,b) => a + b, 0);
    const avg = total / answers.length;
    let summary = "";
    if (avg < 2) summary = "⚠️ Critical: Poor breathing + acidic diet, needs immediate intervention.";
    else if (avg < 3) summary = "⚠️ Moderate: Some healthy habits but inconsistent.";
    else if (avg < 4) summary = "✅ Good: On right track, needs optimisation in breathwork & diet.";
    else summary = "🌟 Excellent: Strong foundation, fine-tuning for mastery.";
    return summary;
  }

  // ---------- STATE ----------
  let screen = "intro";     // intro, quiz, contact, report
  let currentQ = 0;
  let answers = new Array(QUESTIONS.length).fill(null);
  let contact = { name: "", email: "", phone: "" };
  let finalScore = 0;
  let finalTier = null;
  let categoryAvgs = {};
  let notificationSent = false;

  const root = document.getElementById("app");

  function render() {
    if (screen === "intro") renderIntro();
    else if (screen === "quiz") renderQuiz();
    else if (screen === "contact") renderContact();
    else if (screen === "report") renderReport();
  }

  // ------------------- INTRO -------------------
  function renderIntro() {
    root.innerHTML = `
      <div style="text-align:center;">
        <h1>⚡ Cellular Vitality Audit</h1>
        <p style="font-size:1rem; margin:0.5rem 0;">Based on AccessWorld Seminars · Breathwork · Alkaline Principle</p>
        <div style="background: rgba(0,0,0,0.4); border-radius: 2rem; padding: 1.5rem; margin: 1rem 0;">
          <p style="margin-bottom: 1rem;"><span class="gold">"No disease, including cancer, can live in an alkaline environment."</span> — Dr. Otto Warburg</p>
          <p>This 11-question quiz reveals your <strong>Oxygen + Alkaline + Lymph + Mindset</strong> score. Get a personalised report with healing foods, breath protocols, and lifestyle roadmap.</p>
          <p style="margin-top: 1rem;">🔥 After the quiz, you can request coaching — I'll be notified immediately on Telegram.</p>
        </div>
        <button class="btn btn-primary" id="startBtn">🌿 Start My Health Audit →</button>
      </div>
    `;
    const startBtn = document.getElementById("startBtn");
    if (startBtn) {
      startBtn.addEventListener("click", () => {
        screen = "quiz";
        currentQ = 0;
        answers = new Array(QUESTIONS.length).fill(null);
        render();
      });
    }
  }

  // ------------------- QUIZ -------------------
  function renderQuiz() {
    const q = QUESTIONS[currentQ];
    const selected = answers[q.id];
    const progress = ((currentQ) / QUESTIONS.length) * 100;
    const labels = ["0 - Never", "1 - Rarely", "2 - Sometimes", "3 - Often", "4 - Mostly", "5 - Always"];
    
    let scaleHtml = "";
    for (let i = 0; i <= 5; i++) {
      const isSelected = (selected === i);
      scaleHtml += `<div class="scale-opt ${isSelected ? 'selected' : ''}" data-val="${i}"><div style="font-weight:800;">${i}</div><div style="font-size:0.7rem;">${labels[i]}</div></div>`;
    }
    
    root.innerHTML = `
      <div>
        <div class="progress-bar"><div class="progress-fill" style="width: ${progress}%;"></div></div>
        <p>Question ${currentQ+1} of ${QUESTIONS.length}</p>
        <div class="report-card" style="margin-top:0.5rem;">
          <h3>${q.text}</h3>
          <div class="scale-group" id="scaleGroup">${scaleHtml}</div>
        </div>
        <div style="display:flex; justify-content:space-between;">
          <button class="btn" id="prevBtn" ${currentQ === 0 ? 'disabled style="opacity:0.4;"' : ""}>← Back</button>
          <button class="btn btn-primary" id="nextBtn">${currentQ === QUESTIONS.length-1 ? "Complete →" : "Next"}</button>
        </div>
      </div>
    `;
    
    const scaleOptions = document.querySelectorAll(".scale-opt");
    scaleOptions.forEach(opt => {
      opt.addEventListener("click", (e) => {
        const val = parseInt(opt.dataset.val, 10);
        answers[q.id] = val;
        renderQuiz();
      });
    });
    
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    if (prevBtn) {
      prevBtn.addEventListener("click", () => {
        if (currentQ > 0) {
          currentQ--;
          renderQuiz();
        }
      });
    }
    if (nextBtn) {
      nextBtn.addEventListener("click", () => {
        if (answers[q.id] === null || answers[q.id] === undefined) {
          alert("Please select a rating (0-5). This helps your personalised report.");
          return;
        }
        if (currentQ === QUESTIONS.length - 1) {
          screen = "contact";
          render();
        } else {
          currentQ++;
          renderQuiz();
        }
      });
    }
  }

  // ------------------- CONTACT -------------------
  function renderContact() {
    root.innerHTML = `
      <div style="text-align:center;">
        <h2>✨ Your Health Report Awaits ✨</h2>
        <p>Enter your details to unlock your <strong>Cellular Vitality Report</strong>.</p>
        <p style="margin-top: 0.5rem; font-size:0.9rem;">🔔 <strong>Plus: Request coaching follow-up</strong> — I'll be notified instantly on Telegram.</p>
        <div style="max-width:450px; margin:1rem auto;">
          <input type="text" id="contactName" placeholder="Full name *" value="${escapeHtml(contact.name)}">
          <input type="email" id="contactEmail" placeholder="Email address *" value="${escapeHtml(contact.email)}">
          <input type="tel" id="contactPhone" placeholder="Phone (recommended for coaching)" value="${escapeHtml(contact.phone)}">
          <div style="display:flex; gap:1rem; justify-content:center;">
            <button class="btn" id="backQuizBtn">← Back</button>
            <button class="btn btn-primary" id="genReportBtn">📋 Generate My Report & Request Coaching →</button>
          </div>
        </div>
      </div>
    `;
    const backBtn = document.getElementById("backQuizBtn");
    const genBtn = document.getElementById("genReportBtn");
    if (backBtn) {
      backBtn.addEventListener("click", () => {
        screen = "quiz";
        render();
      });
    }
    if (genBtn) {
      genBtn.addEventListener("click", async () => {
        const nameInput = document.getElementById("contactName");
        const emailInput = document.getElementById("contactEmail");
        const phoneInput = document.getElementById("contactPhone");
        const name = nameInput ? nameInput.value.trim() : "";
        const email = emailInput ? emailInput.value.trim() : "";
        const phone = phoneInput ? phoneInput.value.trim() : "";
        if (!name || !email) {
          alert("Please provide name and email to receive your health blueprint.");
          return;
        }
        contact = { name, email, phone };
        
        // compute final results
        let sum = 0;
        let allValid = true;
        for (let i = 0; i < QUESTIONS.length; i++) {
          const val = answers[i];
          if (val === null || val === undefined) {
            allValid = false;
            break;
          }
          sum += val;
        }
        if (!allValid) {
          alert("Something went wrong: some answers missing. Please retake the quiz.");
          screen = "intro";
          render();
          return;
        }
        const avg = sum / QUESTIONS.length;
        finalScore = avg;
        finalTier = getTierData(avg);
        categoryAvgs = computeCategoryAverages(answers);
        
        // ----- SEND TELEGRAM NOTIFICATION -----
        const summary = getAnswersSummary(answers);
        const telegramSent = await sendTelegramNotification(contact, finalScore, finalTier.label, summary);
        notificationSent = telegramSent;
        
        screen = "report";
        render();
      });
    }
  }
  
  function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // ------------------- REPORT with Telegram status -------------------
  function renderReport() {
    const avgScore = finalScore;
    const tier = finalTier;
    const catEntries = Object.entries(categoryAvgs);
    const sorted = [...catEntries].sort((a, b) => a[1] - b[1]);
    const lowest3 = sorted.slice(0, 3);
    const highest2 = sorted.slice(-2).reverse();
    
    const healingFoodSuggestion = (answers[3] < 2)
      ? "🥬 Start eating cilantro/coriander on salads & celery juice in the morning. These bind to heavy metals and support the liver."
      : "🌿 Keep using healing herbs — add zucchini for prefrontal cortex fuel. Consider increasing cilantro intake if metal toxicity symptoms persist.";
    
    const breathProtocol = (answers[0] < 3)
      ? "Practice belly breathing (5 min morning): inhale 4s, exhale 6s. Expand diaphragm. Also practice 'exhale hold' - after normal exhale, hold for 5-10 sec, build up gradually."
      : "Maintain with 30 power breaths + 60sec hold (Wim Hof style). Try cold exposure after breathwork to amplify alkaline response.";
    
    let detailsHtml = "";
    QUESTIONS.forEach((q, idx) => {
      const val = (answers[idx] !== null && answers[idx] !== undefined) ? answers[idx] : 0;
      const percent = (val / 5) * 100;
      const shortText = q.text.length > 70 ? q.text.substring(0, 67) + '...' : q.text;
      detailsHtml += `<div style="margin-bottom:0.8rem;">
        <div style="display:flex; justify-content:space-between;">
          <span style="font-size:0.85rem;">${escapeHtml(shortText)}</span>
          <span class="gold">${val}/5</span>
        </div>
        <div class="progress-bar" style="height:6px;"><div class="progress-fill" style="width:${percent}%; height:6px;"></div></div>
      </div>`;
    });
    
    let lowHtml = "";
    if (lowest3.length) {
      for (let [cat, scoreAvg] of lowest3) {
        let advice = "";
        if (cat.includes("Breathwork") || cat.includes("Lung Capacity")) {
          advice = "🔥 Your lung capacity is the #1 energy lever. Start 2-min daily breath holds after exhale — like the karate pre-oxygenation technique.";
        } else if (cat.includes("Diet") || cat.includes("Alkaline") || cat.includes("Food as Medicine")) {
          advice = "🥑 Your terrain is acidic. Remember Dr. Warburg: cancer can't thrive in alkaline. Add green juice, lemon water, and reduce hybrid wheat.";
        } else if (cat.includes("Energy")) {
          advice = "⚡ You're stuck in the 2-unit energy pathway (glycolysis). Oxygen is missing! Implement belly breathing before meals.";
        } else if (cat.includes("Mobility") || cat.includes("Lymph")) {
          advice = "🦵 Lymphatic system relies on calf pump and movement. Start rebounding or heel bouncing while brushing teeth.";
        } else if (cat.includes("Posture") || cat.includes("Flexibility")) {
          advice = "🧍 Posture and flexibility are the scaffolding of your body. Start with 10 minutes of gentle stretching daily.";
        } else if (cat.includes("Mindset") || cat.includes("Clarity")) {
          advice = "🧠 Mindset is the master switch. Decide. Commit. Resolve. Write it down: 'I prioritise my health because I am worth it.'";
        } else {
          advice = "🌱 Small daily habits: 10min morning sunlight, one raw veggie per meal, and gratitude journaling reduce inflammation.";
        }
        lowHtml += `<div class="report-card"><h3>⚠️ ${cat} · Score: ${scoreAvg.toFixed(1)}/5</h3><p>${advice}</p></div>`;
      }
    } else {
      lowHtml = '<div class="report-card">✨ Impressive balance! Focus on breath retention and seasonal detox to reach elite vitality.</div>';
    }
    
    let highHtml = "";
    if (highest2.length) {
      for (let [cat, scoreAvg] of highest2) {
        highHtml += `<div class="report-card"><h3>🌟 ${cat} · Score: ${scoreAvg.toFixed(1)}/5</h3><p>You've built resilience here. Use this strength to inspire other areas.</p></div>`;
      }
    } else {
      highHtml = '<div class="report-card">✨ Build on your awareness — start with breathwork to unlock energy.</div>';
    }
    
    const notificationStatusHtml = notificationSent 
      ? `<div class="notification-success" style="display:block; background:#2e7d64; margin-bottom:1rem;">✅ Coaching request sent to me via Telegram! I'll be in touch within 24 hours.</div>`
      : `<div class="notification-success" style="display:block; background:#8b5e3c;">⚠️ Telegram notification not sent. Please contact me directly at [your email].</div>`;
    
    root.innerHTML = `
      <div>
        <div style="text-align:center; margin-bottom:0.5rem;">
          <h2 style="font-size:1.1rem; color:#b9c7dd;">Cellular Vitality Report · ${escapeHtml(contact.name)}</h2>
        </div>
        ${notificationStatusHtml}
        <div class="coaching-request">
          <span style="font-size:1.5rem;">🎯</span>
          <h3 style="margin:0.5rem 0;">You've requested coaching follow-up!</h3>
          <p>I've been notified on Telegram. I'll reach out to you at <strong>${escapeHtml(contact.email)}</strong> within 24 hours.</p>
          <p style="font-size:0.85rem; margin-top:0.5rem;">Meanwhile, review your personalised report below.</p>
        </div>
        <div class="tab-bar" id="tabBar">
          <button class="tab-btn active" data-tab="tab1">📊 Score & Oxygen</button>
          <button class="tab-btn" data-tab="tab2">🌱 Low 3 Areas</button>
          <button class="tab-btn" data-tab="tab3">🏆 High Assets & Foods</button>
        </div>
        <div id="tab1" class="tab-pane active-pane">
          <div style="text-align:center;">
            <div style="font-size:3rem; font-weight:bold; color:#C9A84C;">${avgScore.toFixed(1)}<span style="font-size:1.2rem; color:#eef2ff;">/5</span></div>
            <div class="progress-bar" style="width:70%; margin:0.5rem auto;"><div class="progress-fill" style="width: ${(avgScore / 5) * 100}%;"></div></div>
            <h2 style="margin:0.5rem 0;">${tier.label}</h2>
            <p><em>${tier.message}</em></p>
            <div class="report-card" style="text-align:left; margin-top:1.2rem;">
              <h3>🧬 Your Cellular Blueprint</h3>
              <p style="margin-top:0.5rem;">🔹 <strong>Oxygen status:</strong> ${answers[0] > 3 ? "Good diaphragmatic breathing detected." : "Shallow chest breathing = fatigue."}</p>
              <p style="margin-top:0.4rem;">🔹 <strong>Alkaline terrain:</strong> ${answers[7] > 3 ? "You're creating a cancer-resistant environment." : "Acidic overload — immediate shift needed."}</p>
              <p style="margin-top:0.4rem;">🔹 <strong>Lymphatic flow:</strong> ${answers[5] > 3 ? "Moving body = clearing toxins." : "Sedentary lymph = toxin buildup."}</p>
            </div>
          </div>
          <hr style="margin:1rem 0; border-color:#2a3650;">
          <h3>📋 Detailed Answers</h3>

        </div>
        <div id="tab2" class="tab-pane">
          <h3 style="margin-bottom:1rem;">Priority healing zones (lowest scores)</h3>
          ${lowHtml}
          <div class="report-card" style="margin-top:1rem;">
            <h3>🥗 Specific Healing Foods (From AccessWorld Seminars)</h3>
            <p style="margin-top:0.5rem; line-height:1.8;">
              ✔ <strong>Coriander/Cilantro:</strong> Chelates heavy metals from brain.<br>
              ✔ <strong>Celery juice:</strong> Restores gut & lymphatic flow.<br>
              ✔ <strong>Zucchini/Squash:</strong> Feeds prefrontal cortex, lifts brain fog.<br>
              ✔ <strong>Papaya:</strong> Peristaltic food pusher — prevents toxic fecal compaction.

            <p style="margin-top:0.8rem;"><strong>${healingFoodSuggestion}</strong></p>

        </div>
        <div id="tab3" class="tab-pane">
          <h3 style="margin-bottom:1rem;">Your strengths to leverage</h3>
          ${highHtml}
          <div class="report-card">
            <h3>🧘 Breathwork Protocol</h3>
            <p style="margin-top:0.5rem;">${breathProtocol}</p>
          </div>
          <div class="report-card">
            <h3>📅 7-Day Alkaline Jumpstart</h3>
            <p style="margin-top:0.5rem; line-height:1.8;">
              🌞 <strong>Day 1–2:</strong> Replace breakfast with fruit + 20min belly breathing.<br>
              🚰 <strong>Day 3–4:</strong> Celery juice upon waking + rebounding 5min.<br>

        <div style="display:flex; justify-content:space-between; margin-top:2rem; gap:1rem; flex-wrap:wrap;">
          <button class="btn" id="printPDFBtn">🖨️ Save as PDF / Print Report</button>
          <button class="btn btn-primary" id="retakeBtn">⟳ Retake Health Audit</button>

        <footer>AccessWorld Seminars · Based on Dr. Warburg Alkaline Principle. Healing is possible.</footer>

    `;
    
    const tabBtns = document.querySelectorAll(".tab-btn");
    const paneTab1 = document.getElementById("tab1");
    const paneTab2 = document.getElementById("tab2");
    const paneTab3 = document.getElementById("tab3");
    
    const activateTab = (tabId) => {
      if (paneTab1) paneTab1.classList.remove("active-pane");
      if (paneTab2) paneTab2.classList.remove("active-pane");
      if (paneTab3) paneTab3.classList.remove("active-pane");
      if (tabId === "tab1" && paneTab1) paneTab1.classList.add("active-pane");
      if (tabId === "tab2" && paneTab2) paneTab2.classList.add("active-pane");
      if (tabId === "tab3" && paneTab3) paneTab3.classList.add("active-pane");
      tabBtns.forEach(btn => btn.classList.remove("active"));
      const activeBtn = Array.from(tabBtns).find(btn => btn.dataset.tab === tabId);
      if (activeBtn) activeBtn.classList.add("active");
    };
    
    tabBtns.forEach(btn => {
      btn.addEventListener("click", () => {
        const tabId = btn.dataset.tab;
        if (tabId) activateTab(tabId);
      });
    });
    
    const printBtn = document.getElementById("printPDFBtn");
    if (printBtn) printBtn.addEventListener("click", () => window.print());
    
    const retakeBtn = document.getElementById("retakeBtn");
    if (retakeBtn) {
      retakeBtn.addEventListener("click", () => {
        screen = "intro";
        answers = new Array(QUESTIONS.length).fill(null);
        contact = { name: "", email: "", phone: "" };
        finalScore = 0;
        finalTier = null;
        categoryAvgs = {};
        notificationSent = false;
        render();
      });
    }
  }
  
  render();
</script>
