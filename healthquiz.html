function getTier(s) { 
  return TIERS.find(t => s >= t.min && s <= t.max) || TIERS[1]; 
}

function calcScore() {
  const valid = answers.filter(a => a !== null);
  return valid.length === 0 ? 0 : valid.reduce((a,b) => a+b, 0) / valid.length;
}

function calcCatAvgs() {
  const cats = {};
  QUESTIONS.forEach((q,i) => {
    if (!cats[q.category]) cats[q.category] = { sum:0, n:0 };
    if (answers[i] !== null) { 
      cats[q.category].sum += answers[i]; 
      cats[q.category].n++; 
    }
  });
  Object.keys(cats).forEach(c => { 
    cats[c] = cats[c].n ? cats[c].sum / cats[c].n : 0; 
  });
  return cats;
}

function progressBar(current, total) {
  return `<div class="progress-bar">${Array.from({length:total},(_,i) => {
    let cls = i < current ? 'done' : i === current ? 'active' : '';
    return `<div class="prog-dot ${cls}"></div>`;
  }).join('')}</div>`;
}

function render() {
  if (step==='intro') renderIntro();
  else if (step==='pre1') renderPre1();
  else if (step==='pre2') renderPre2();
  else if (step==='pre3') renderPre3();
  else if (step==='pre4') renderPre4();
  else if (step==='quiz') renderQuiz();
  else if (step==='leadCapture') renderLeadCapture();

function renderPreScreen({ stepNum, total, title, subtitle, options, back, next, field }) {

        <span class="opt-icon">${o.icon}</span>
        <span>${o.label}</span>
      </div>`).join('')}
    </div>
    <div class="btn-row">
      <button class="btn btn-outline" id="backBtn">← Back</button>
      <button class="btn btn-primary" id="nextBtn" disabled>Continue →</button>
    </div>
  </div>`;
  let sel = "";
  document.querySelectorAll(".opt-card").forEach(el => {
    el.onclick = () => {
      document.querySelectorAll(".opt-card").forEach(c => c.classList.remove("selected"));
      el.classList.add("selected");
      sel = el.dataset.val;
      document.getElementById("nextBtn").disabled = false;
    };
  });
  document.getElementById("nextBtn").onclick = () => { if(sel){ pre[field]=sel; step=next; render(); } };
  document.getElementById("backBtn").onclick = () => { step=back; render(); };
}

/* ─── QUIZ ─── */
function renderQuiz() {
  if (curQ >= QUESTIONS.length) {
    finalScore = calcScore();
    catAvgs = calcCatAvgs();
    step = "leadCapture";
    render();
    return;
  }
  const q = QUESTIONS[curQ];
  const words = ["Rarely","","Sometimes","","Always"];
  root.innerHTML = `<div class="card">
    ${brandHeader(false)}
    ${progressBar(curQ, QUESTIONS.length)}
    <div class="q-counter">Question ${curQ+1} of ${QUESTIONS.length}</div>
    <div class="q-category" style="margin-top:0.6rem;">${q.category}</div>
    <div class="q-text">${q.text}</div>
    <div class="scale-container">
      <div class="scale-labels"><span>Rarely</span><span>Sometimes</span><span>Always</span></div>
      <div class="scale-btns" id="scaleBtns"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-outline" id="prevBtn" ${curQ===0?'disabled':''}>← Back</button>
      <button class="btn btn-primary" id="nextBtn" ${answers[curQ]===null?'disabled':''}>${curQ===QUESTIONS.length-1?'Continue →':'Next →'}</button>
    </div>
  </div>`;
  const sb = document.getElementById("scaleBtns");
  for (let i=1; i<=5; i++) {
    const btn = document.createElement("div");
    btn.className = `scale-btn${answers[curQ]===i?' selected':''}`;
    btn.innerHTML = `<div class="scale-num">${i}</div><div class="scale-word">${words[i-1]}</div>`;
    btn.onclick = () => { answers[curQ]=i; renderQuiz(); };
    sb.appendChild(btn);
  }
  document.getElementById("prevBtn").onclick = () => { if(curQ>0){curQ--;renderQuiz();} };
  document.getElementById("nextBtn").onclick = () => {
    if (answers[curQ]===null) return;
    if (curQ < QUESTIONS.length-1) { curQ++; renderQuiz(); }
    else { finalScore=calcScore(); catAvgs=calcCatAvgs(); step="leadCapture"; render(); }
  };
}
