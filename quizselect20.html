            { text: "I track my integration progress using a checklist or tracker.", category: "Progress Tracking", teaching: "What gets measured gets managed. A simple checklist creates accountability and momentum." },
            { text: "I understand that change sticks best when it's felt, not just thought.", category: "Embodied Learning", teaching: "Use your body, emotions, and voice to reinforce transformation. Thinking alone is not enough." },
            { text: "I have completed a 7-day integration challenge for a personal development goal.", category: "Integration Experience", teaching: "Seven days of focused practice creates the neural repetition needed for lasting change." },
            { text: "I use evening reflection to review my emotional state and progress.", category: "Evening Reflection", teaching: "What you review, you can improve. Evening reflection closes the loop on your daily practice." },

        let answers = Array(QUESTIONS.length).fill(null);

        function getAverage() { 
            let s = 0, c = 0; 
            for (let i = 0; i < answers.length; i++) { 
                if (answers[i] !== null) { 
                    s += answers[i]; 
                    c++; 
                } 
            } 
            return c === 0 ? 0 : s / c; 
        }
        
        function getTier(score) {
            if (score <= 1.2) return { label: "Integration Beginner", desc: "You're starting to understand the importance of daily practice. Start small—5 minutes of morning breathwork is enough to begin." };
            if (score <= 2.3) return { label: "Emerging Practitioner", desc: "You have some integration habits but lack consistency. The 7-Day Challenge will build your momentum." };
            if (score <= 3.4) return { label: "Active Integrator", desc: "You're practicing daily but inconsistently. A structured tracker will double your results." };
            if (score <= 4.2) return { label: "Skilled Integrator", desc: "Strong daily habits! Your next level is deepening embodiment and teaching others." };
            return { label: "Integration Mastery", desc: "Exceptional! You embody the principle that consistency creates transformation. Now expand your impact." };
        }

        function buildResultsScreen() {
            const div = document.createElement('div');
            div.id = 'resultsScreen';
            div.className = 'hidden';
            div.innerHTML = `
                <div class="card">
                    <div style="display:flex; justify-content:space-between;"><img src="https://i.ibb.co/ynXdYpmL/worldjjpgsf.png" style="height:40px;"><span>Integration Report</span></div>

        }

        function renderApp() {
            const app = document.getElementById('app');
            app.innerHTML = '';
            app.appendChild(buildIntroScreen());
            app.appendChild(buildProgressArea());
            app.appendChild(buildQuestionScreen());
            app.appendChild(buildContactScreen());
            app.appendChild(buildResultsScreen());
            
            introScreen = document.getElementById('introScreen');
            progressArea = document.getElementById('progressArea');
            questionScreen = document.getElementById('questionScreen');
            contactScreen = document.getElementById('contactScreen');
            resultsScreen = document.getElementById('resultsScreen');
            
            document.getElementById('startQuizBtn')?.addEventListener('click', startQuiz);
            document.getElementById('nextQBtn')?.addEventListener('click', nextQuestion);
            document.getElementById('prevQBtn')?.addEventListener('click', prevQuestion);
            document.getElementById('submitLeadBtn')?.addEventListener('click', submitContact);
            document.getElementById('printPdfBtn')?.addEventListener('click', () => window.print());
            document.getElementById('retakeAllBtn')?.addEventListener('click', retakeFull);
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const tab = this.getAttribute('data-tab');
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    document.querySelectorAll('.tab-content').forEach((tc, i) => {
                        tc.classList.toggle('active', i == tab);
                    });
                });
            });
        }
        
        function renderQuestion() {
            const q = QUESTIONS[currentQ];
            const qCat = document.getElementById('qCat');
            const qText = document.getElementById('qText');
            const scaleContainer = document.getElementById('scaleBtns');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            const prevBtn = document.getElementById('prevQBtn');
            const nextBtn = document.getElementById('nextQBtn');
            
            if (qCat) qCat.innerHTML = `⚡ ${q.category} · Question ${currentQ+1} of ${QUESTIONS.length}`;
            if (qText) qText.innerHTML = q.text;
            
            if (scaleContainer) {
                scaleContainer.innerHTML = '';
                const labels = ['Not at all', 'Slightly', 'Somewhat', 'Mostly', 'Very much', 'Completely'];
                for (let i = 0; i <= 5; i++) {
                    const btn = document.createElement('div');
                    btn.className = 'scale-btn' + (answers[currentQ] === i ? ' selected' : '');
                    btn.innerHTML = `<span>${i}</span><span>${labels[i]}</span>`;
                    btn.addEventListener('click', (function(score) {
                        return function() { answers[currentQ] = score; renderQuestion(); };
                    })(i));
                    scaleContainer.appendChild(btn);
                }
            }
            
            if (progressFill) progressFill.style.width = ((currentQ + 1) / QUESTIONS.length) * 100 + '%';
            if (progressText) progressText.innerHTML = 'Question ' + (currentQ + 1) + ' of ' + QUESTIONS.length;
            if (prevBtn) prevBtn.disabled = (currentQ === 0);
            
            const hasAns = answers[currentQ] !== null;
            if (nextBtn) {
                nextBtn.style.opacity = hasAns ? '1' : '0.6';
                nextBtn.style.cursor = hasAns ? 'pointer' : 'not-allowed';
            }
        }
        
        function nextQuestion() {
            if (answers[currentQ] === null) {
                alert('Please select an answer before continuing.');
                return;
            }
            if (currentQ < QUESTIONS.length - 1) {
                currentQ++;
                renderQuestion();
            } else {
                showContact();
            }
        }
        
        function prevQuestion() {
            if (currentQ > 0) {
                currentQ--;
                renderQuestion();
            }
        }
        
        function startQuiz() {
            answers.fill(null);
            currentQ = 0;
            if (introScreen) introScreen.classList.add('hidden');
            if (progressArea) progressArea.classList.remove('hidden');
            if (questionScreen) questionScreen.classList.remove('hidden');
            if (contactScreen) contactScreen.classList.add('hidden');
            if (resultsScreen) resultsScreen.classList.add('hidden');
            renderQuestion();
        }
        
        function showContact() {
            if (questionScreen) questionScreen.classList.add('hidden');
            if (progressArea) progressArea.classList.add('hidden');
            if (contactScreen) contactScreen.classList.remove('hidden');
        }
        
        async function sendToTelegram(name, phone, country, email, score, tier) {
            const payload = {
                name: name, phone: phone, country: country, email: email,

                quiz: 'NLP Ch' + CHAPTER_NUM + ': ' + CHAPTER_TITLE,
                timestamp: new Date().toISOString()
            };
            const statusDiv = document.getElementById('webhookStatus');
            if (statusDiv) {
                statusDiv.style.display = 'block';
                statusDiv.innerHTML = '⏳ Generating your integration report...';
            }
            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)

            } catch (e) {
                if (statusDiv) statusDiv.innerHTML = '⚠️ Showing results below.';
            }
            setTimeout(function() { showResults(); }, 500);
        }

            } else {
                lowText = '<p>You\'re already demonstrating strong integration habits. Your next level is deepening embodiment and expanding to teach others.</p>';

            return `

                        <li><strong>Emotional Anchoring:</strong> Fire your anchor 3-5 times to reinforce positive states.</li>
                        <li><strong>NLP Visualization:</strong> 5 minutes of mental rehearsal for your desired outcomes.</li>
                        <li><strong>Journaling (2-5 minutes):</strong> Track emotions, insights, and patterns.</li>
                        <li><strong>Evening Reflection:</strong> Review your day and set intention for tomorrow.</li>
                    </ul>
                </div>
                <div class="teaching-section">
                    <h4>📖 The 7-Day Guided Integration Plan</h4>

                    <strong>Day 2:</strong> Learn & Feel — Practice the State Elicitation Script.<br>

                    '<p>This assessment measured your daily integration habits, understanding of neuroplasticity, and consistency with NLP practices.</p></div>';
            }

                let page2Html = '<div><h3 class="gold">🔻 Your Integration Growth Areas</h3>';
                if (lowIndices.length === 0) {
                    page2Html += '<p>✨ Excellent integration habits! Your next level is deepening embodiment and teaching these practices to others.</p>';
                } else {
                    lowIndices.slice(0, 4).forEach(function(idx) {
                        const q = QUESTIONS[idx];
                        page2Html += '<div style="margin-bottom:20px;"><h4>' + q.category + '</h4><p>' + q.teaching + '</p>' +
                            '<div style="background:#1e2a3a; border-radius:16px; padding:12px;"><strong>✨ This Week\'s Integration Practice:</strong><br/>' +
                            (q.category === "Daily Practice" ? "Start with 3 minutes of morning breathwork tomorrow. That's it. Build from there." :
                             q.category === "Journaling" ? "Write for 2 minutes each night: 'What emotion did I feel most today?'" :
                             "Choose 3 affirmations. Say them aloud while looking in the mirror each morning.") +
                            '</div></div>';
                    });
                }
                page2Html += '<div class="quote-block"><h4>💡 The Integration Promise</h4><p>"Consistency and presence are the keys to lasting change. Show up every day. Be present. Trust the process."</p></div></div>';
                page2.innerHTML = page2Html;
            }
            
            const deepTeaching = generateDeepTeaching(score, tier, lowIndices, highIndices);
            const tab2 = document.getElementById('tab2');
            if (tab2) tab2.innerHTML = deepTeaching;
            
            if (contactScreen) contactScreen.classList.add('hidden');
            if (resultsScreen) resultsScreen.classList.remove('hidden');
        }
        
        async function submitContact() {
            const name = document.getElementById('leadName')?.value.trim();
            const phone = document.getElementById('leadPhone')?.value.trim();
            const email = document.getElementById('leadEmail')?.value.trim();
            const country = document.getElementById('leadCountry')?.value;
            if (!name || !phone || !email || !country) {
                alert("All fields required.");
                return;
            }
            const score = getAverage();
            const tier = getTier(score);
            await sendToTelegram(name, phone, country, email, score, tier);
        }
        
        function retakeFull() {
            answers.fill(null);
            currentQ = 0;
            if (introScreen) introScreen.classList.remove('hidden');
            if (progressArea) progressArea.classList.add('hidden');
            if (questionScreen) questionScreen.classList.add('hidden');
            if (contactScreen) contactScreen.classList.add('hidden');
            if (resultsScreen) resultsScreen.classList.add('hidden');
        }
        
        renderApp();
    })();
</script>
</body>
</html>
