<!DOCTYPE html>
<html>
<head>
    <title>Test Form for Telegram</title>
    <meta charset="UTF-8">
</head>
<body>
    <h2>Send to Telegram via Activepieces</h2>
    
    <form id="contactForm">
        <label>Name:</label><br>
        <input type="text" id="name" placeholder="John Doe" style="width: 100%; padding: 8px;" required><br><br>
        
        <label>Phone:</label><br>
        <input type="tel" id="phone" placeholder="555-123-4567" style="width: 100%; padding: 8px;" required><br><br>
        
        <label>Email:</label><br>
        <input type="email" id="email" placeholder="john@example.com" style="width: 100%; padding: 8px;" required><br><br>
        
        <button type="submit" style="padding: 10px 20px; background: #0088cc; color: white; border: none; cursor: pointer;">Send to Telegram</button>
    </form>

    <div id="status" style="margin-top: 20px; padding: 10px; display: none;"></div>

    <script>
        const WEBHOOK_URL = 'https://cloud.activepieces.com/api/v1/webhooks/52NbZ98JuauiBQh5movJ1';
        
        document.getElementById('contactForm').onsubmit = async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const email = document.getElementById('email').value;
            
            const formData = { name, phone, email };
            
            const statusDiv = document.getElementById('status');
            statusDiv.style.display = 'block';
            statusDiv.innerHTML = 'Sending...';
            statusDiv.style.background = '#fff3cd';
            
            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(formData)
                });
                
                if (response.ok) {
                    statusDiv.innerHTML = '✓ Message sent to Telegram!';
                    statusDiv.style.background = '#d4edda';
                    statusDiv.style.color = '#155724';
                    document.getElementById('contactForm').reset();
                    
                    // Clear success message after 3 seconds
                    setTimeout(() => {
                        statusDiv.style.display = 'none';
                    }, 3000);
                } else {
                    statusDiv.innerHTML = 'Error: ' + response.status;
                    statusDiv.style.background = '#f8d7da';
                    statusDiv.style.color = '#721c24';
                }
            } catch (error) {
                statusDiv.innerHTML = 'Error: ' + error.message;
                statusDiv.style.background = '#f8d7da';
                statusDiv.style.color = '#721c24';
            }
        };
    </script>
</body>
</html>
