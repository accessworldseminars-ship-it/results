      font-weight: 300;
      color: #5A5A6A;
      margin-left: auto;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.04);
      overflow: hidden;
      transition: transform 0.15s ease, box-shadow 0.2s;
      cursor: pointer;
      border: 1px solid rgba(0,0,0,0.03);
      display: flex;
      flex-direction: column;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 32px rgba(0,0,0,0.08);
      border-color: #C9A84C40;
    }
    .card-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      background: #f0ede8;
      display: block;
      font-size: 0;
    }
    .card-label {
      padding: 10px 12px 12px;
      font-size: 0.75rem;
      font-weight: 500;
      color: #1A2744;
      background: white;
      border-top: 1px solid #f0ede8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.3px;
    }
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1A2744;
      color: #E8C96A;
      padding: 14px 28px;
      border-radius: 60px;
      font-weight: 500;
      font-size: 0.95rem;
      box-shadow: 0 12px 40px rgba(0,0,0,0.3);
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
      backdrop-filter: blur(4px);
      border: 1px solid #C9A84C40;
      max-width: 90%;
      text-align: center;
      word-break: break-all;
      z-index: 999;
    }
    .toast.show {
      opacity: 1;
    }
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      margin-bottom: 1.8rem;
      align-items: center;
    }
    .filter-bar input {
      flex: 1;
      min-width: 200px;
      padding: 10px 16px;
      border-radius: 40px;
      border: 1px solid #ddd;
      font-size: 0.95rem;
      background: white;
    }
    .filter-bar input:focus {
      outline: 2px solid #C9A84C;
      border-color: transparent;
    }
    .badge-count {
      background: #eae7e0;
      padding: 4px 14px;
      border-radius: 40px;
      font-size: 0.8rem;
      color: #1A2744;
    }
    @media (max-width: 600px) {
      .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    }

  // --------------------------------------------------------------
  //  RENDER
  // --------------------------------------------------------------
  const grid = document.getElementById('galleryGrid');
  const searchInput = document.getElementById('searchInput');
  const countDisplay = document.getElementById('countDisplay');
  const toast = document.getElementById('toast');

  let filteredData = [...imageData];

  function renderGallery(items) {
    if (items.length === 0) {
      grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:3rem 1rem; color:#5A5A6A;">🤷 no images match your filter</div>`;
      countDisplay.textContent = '0 images';
      return;
    }
    let html = '';
    items.forEach((item, index) => {
      const label = item.label || 'image';
      const url = item.url;
      // if youtube link, we show as video icon but still copy link
      const isVideo = url.includes('youtu') || url.includes('youtube');
      html += `
        <div class="card" data-url="${url}" data-label="${label}" data-index="${index}">
          <img class="card-img" src="${url}" alt="${label}" loading="lazy" 
               onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22%3E%3Crect fill=%22%23eee%22 width=%22200%22 height=%22200%22/%3E%3Ctext x=%2250%22 y=%22110%22 font-family=%22sans-serif%22 font-size=%2216%22 fill=%22%23999%22%3E⚠️ image%3C/text%3E%3C/svg%3E'">
          <div class="card-label">${label} ${isVideo ? '🎬' : ''}</div>
        </div>
      `;
    });
    grid.innerHTML = html;
    countDisplay.textContent = `${items.length} images`;

    // attach click listeners to cards
    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('click', function(e) {
        const url = this.dataset.url;
        copyToClipboard(url);
      });
    });
  }

  // filter logic
  function filterGallery() {
    const q = searchInput.value.toLowerCase().trim();
    if (!q) {
      filteredData = [...imageData];
    } else {
      filteredData = imageData.filter(item => 
        item.label.toLowerCase().includes(q) || 
        item.url.toLowerCase().includes(q)
      );
    }
    renderGallery(filteredData);
  }

  searchInput.addEventListener('input', filterGallery);

  // copy to clipboard + toast
  function copyToClipboard(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(() => {
        showToast('📋 URL copied: ' + text.slice(0, 60) + (text.length > 60 ? '…' : ''));
      }).catch(() => {
        fallbackCopy(text);
      });
    } else {
      fallbackCopy(text);
    }
  }

  function fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try {
      document.execCommand('copy');
      showToast('📋 URL copied: ' + text.slice(0, 60) + (text.length > 60 ? '…' : ''));
    } catch (e) {
      showToast('⚠️ could not copy, select manually');
    }
    document.body.removeChild(ta);
  }

  let toastTimeout;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => {
      toast.classList.remove('show');
    }, 3000);
  }

  // initial render
  renderGallery(imageData);
</script>
