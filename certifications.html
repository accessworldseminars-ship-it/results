<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Certification Request — AccessWorld Seminars</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy:   #1A2744;
  --navy2:  #243560;
  --gold:   #C9A84C;
  --gold2:  #E8C96A;
  --pale:   #F7EDD5;
  --green:  #1A5C2A;
  --lgreen: #EAF5EC;
  --red:    #7A1A1A;
  --lred:   #FBE8E8;
  --mid:    #5A5565;
  --light:  #9090A0;
  --cream:  #FDFAF4;
  --white:  #FFFFFF;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}

body {
  background: var(--navy);
  min-height: 100vh;
  font-family: 'DM Sans', sans-serif;
  display: flex;
  flex-direction: column;
}

.topbar {
  background: rgba(0,0,0,0.25);
  border-bottom: 1px solid rgba(201,168,76,0.25);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 50;
}
.topbar-brand { font-size: 12px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); }
.topbar-right { font-size: 11px; color: rgba(255,255,255,0.35); letter-spacing: 1px; }

.prog-track { height: 3px; background: rgba(255,255,255,0.08); }
.prog-fill  { height: 100%; background: linear-gradient(90deg,var(--gold),var(--gold2)); transition: width .5s cubic-bezier(.4,0,.2,1); width: 0%; }

.stage {
  flex: 1;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 24px 16px 48px;
}

.card {
  background: var(--white);
  width: 100%;
  max-width: 520px;
  overflow: hidden;
  box-shadow: 0 24px 64px rgba(0,0,0,0.45);
  animation: cardIn .35s cubic-bezier(.4,0,.2,1) both;
}
@keyframes cardIn {
  from{opacity:0;transform:translateY(20px) scale(.98)}
  to  {opacity:1;transform:none}
}
.card-top { height: 5px; background: linear-gradient(90deg,var(--navy),var(--gold)); }
.card-body { padding: 28px 24px 24px; }
.card-foot { padding: 0 24px 28px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }

.q-step  { font-size: 10px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 14px; }
.q-text  { font-family: 'Playfair Display', serif; font-size: clamp(18px, 5vw, 22px); font-weight: 600; color: var(--navy); line-height: 1.35; margin-bottom: 8px; }
.q-sub   { font-size: 13px; color: var(--mid); line-height: 1.6; margin-bottom: 24px; }

.yn { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.yn-btn {
  padding: 18px 12px;
  border: 2px solid rgba(26,39,68,.14);
  background: var(--cream);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--navy);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  transition: all .18s ease;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.yn-btn .icon { font-size: 26px; }
.yn-btn.yes:active, .yn-btn.yes.sel { background:#EAF5EC; border-color:var(--green); color:var(--green); }
.yn-btn.no:active,  .yn-btn.no.sel  { background:var(--lred);  border-color:var(--red);   color:var(--red);   }

.num-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.num-btn {
  min-width: 52px; padding: 0 12px; height: 52px;
  border: 2px solid rgba(26,39,68,.14);
  background: var(--cream);
  cursor: pointer;
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 600;
  color: var(--navy);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: all .18s ease;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.num-btn:active, .num-btn.sel { background:var(--pale); border-color:var(--gold); transform:scale(1.08); }

.txt-inp {
  width: 100%;
  border: 2px solid rgba(26,39,68,.15);
  padding: 14px 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  color: var(--navy);
  background: var(--cream);
  outline: none;
  border-radius: 0;
  -webkit-appearance: none;
  margin-bottom: 0;
}
.txt-inp:focus { border-color: var(--gold); }

.cert-list { display: flex; flex-direction: column; gap: 8px; }
.cert-btn {
  padding: 14px 16px;
  border: 2px solid rgba(26,39,68,.12);
  background: var(--cream);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  display: flex;
  align-items: center;
  gap: 14px;
  transition: all .18s ease;
  touch-action: manipulation;
}
.cert-btn:active, .cert-btn.sel { background:var(--pale); border-color:var(--gold); }
.cert-btn .ci { font-size: 22px; flex-shrink: 0; }
.cert-btn .cn { font-size: 14px; font-weight: 700; color: var(--navy); }
.cert-btn .cs { font-size: 11px; color: var(--mid); }

.btn-next {
  background: linear-gradient(135deg,var(--navy),var(--navy2));
  color: var(--gold);
  border: none;
  padding: 15px 28px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all .2s ease;
  box-shadow: 0 4px 16px rgba(26,39,68,.3);
  touch-action: manipulation;
  white-space: nowrap;
  flex-shrink: 0;
}
.btn-next:disabled { opacity: .3; cursor: not-allowed; }
.btn-next:not(:disabled):active { transform: scale(.97); }

.btn-back {
  background: none;
  border: none;
  font-size: 13px;
  color: var(--mid);
  cursor: pointer;
  padding: 8px 0;
  font-family: 'DM Sans', sans-serif;
}

.summary { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
.sum-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 9px 12px; gap: 12px; }
.sum-row:nth-child(odd)  { background: var(--cream); }
.sum-row:nth-child(even) { background: #F0EDE4; }
.sum-lbl { font-size: 11px; font-weight: 700; color: var(--light); text-transform: uppercase; letter-spacing: .5px; flex-shrink: 0; max-width: 44%; }
.sum-val { font-size: 13px; font-weight: 600; color: var(--navy); text-align: right; }
.sum-val.y { color: var(--green); }
.sum-val.n { color: var(--red); }

.decl {
  background: var(--navy);
  padding: 18px 20px;
  margin-bottom: 20px;
}
.decl-title { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--gold2); margin-bottom: 8px; }
.decl-body  { font-size: 13px; color: rgba(255,255,255,.72); line-height: 1.65; }

.btn-telegram {

  color: white;
  border: none;
  padding: 18px 20px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  transition: all .2s ease;
  box-shadow: 0 6px 24px rgba(38,165,228,0.3);
  border-radius: 0;
  margin-top: 6px;

.btn-telegram:active { transform: scale(.98); }

.success-card {

  padding: 52px 28px;

.suc-icon { font-size: 56px; display: block; margin-bottom: 20px; }
.suc-h2   { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 600; color: var(--navy); margin-bottom: 12px; }
.suc-h2 em { font-style: italic; color: var(--gold); }
.suc-p  { font-size: 15px; color: var(--mid); line-height: 1.7; }
</style>

let answers = {};
let flow = [];
let idx = 0;

function buildFlow() {
  flow = [
    { type:"name"  },
    { type:"email" },
    { type:"phone" },
    { type:"cert"  },
  ];
}

function render() {
  const total = flow.length;
  const pct   = idx < total ? Math.round((idx / Math.max(total - 1, 1)) * 100) : 100;
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('topRight').textContent = idx < total ? `Step ${idx + 1} of ${total}` : 'Review & Send';
  const stage = document.getElementById('stage');
  if (idx >= total) { renderTelegramSummary(stage); return; }
  const item = flow[idx];
  if (item.type === 'name')     { renderText(stage, 'name',  'Your full name', 'e.g. Sarah Mitchell', 'Personal Info', 'This will appear on your certificate.'); }
  else if (item.type === 'email')    { renderText(stage, 'email', 'Your email address', 'hello@example.com', `Step 2 of ${total}`, 'For Joshua Roy to confirm your certification.'); }
  else if (item.type === 'phone')    { renderPhone(stage, total); }
  else if (item.type === 'cert')     { renderCert(stage, total); }
  else if (item.type === 'req')      { renderReq(stage, item.req, item.certName, total); }
}

function renderText(stage, id, placeholder, hint, stepLabel, sub) {
  stage.innerHTML = `
    <div class="card">
      <div class="card-top"></div>
      <div class="card-body">
        <div class="q-step">${stepLabel}</div>
        <div class="q-text">${id === 'name' ? 'What is your full name?' : 'What is your email address?'}</div>
        <div class="q-sub">${sub}</div>
        <input class="txt-inp" id="inp" type="${id==='email'?'email':'text'}" placeholder="${placeholder}" value="${answers[id]||''}">
      </div>
      <div class="card-foot">
        ${idx > 0 ? '<button class="btn-back" onclick="back()">← Back</button>' : '<span></span>'}
        <button class="btn-next" id="btnN" onclick="advance()" disabled>Next →</button>
      </div>
    </div>`;
  const inp = document.getElementById('inp');
  inp.focus();
  inp.addEventListener('input', () => {
    const v = inp.value.trim();
    const ok = id === 'email' ? /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v) : v.length >= 2;
    document.getElementById('btnN').disabled = !ok;
  });
  if (answers[id]) document.getElementById('btnN').disabled = false;
}

function renderPhone(stage, total) {
  stage.innerHTML = `
    <div class="card">
      <div class="card-top"></div>
      <div class="card-body">
        <div class="q-step">Step 3 of ${total}</div>
        <div class="q-text">Your phone number</div>
        <div class="q-sub">Optional — for contact purposes.</div>
        <input class="txt-inp" id="inp" type="tel" placeholder="e.g. +61 400 000 000" value="${answers.phone||''}">
      </div>
      <div class="card-foot">
        <button class="btn-back" onclick="back()">← Back</button>
        <button class="btn-next" onclick="advance()">Next →</button>
      </div>
    </div>`;
  document.getElementById('inp').focus();
}

function renderCert(stage, total) {
  const items = Object.keys(CERTS).map(c => `<div class="cert-btn ${answers.cert===c?'sel':''}" onclick="pickCert('${c}')"><span class="ci">${CERTS[c].icon}</span><div><div class="cn">${c}</div><div class="cs">Tap to select</div></div></div>`).join('');
  stage.innerHTML = `<div class="card"><div class="card-top"></div><div class="card-body"><div class="q-step">Step 4 of ${total}</div><div class="q-text">Which certification are you requesting?</div><div class="q-sub">Select the coaching certification you have completed requirements for.</div><div class="cert-list">${items}</div></div><div class="card-foot"><button class="btn-back" onclick="back()">← Back</button><button class="btn-next" id="btnN" onclick="advance()" ${answers.cert?'':'disabled'}>Next →</button></div></div>`;
}

function pickCert(c) {
  answers.cert = c;
  const certData = CERTS[c];
  flow = [ { type:'name' }, { type:'email' }, { type:'phone' }, { type:'cert' }, ...certData.reqs.map(r => ({ type:'req', req:r, certName:c })) ];
  document.querySelectorAll('.cert-btn').forEach(b => b.classList.remove('sel'));
  event.currentTarget.classList.add('sel');
  document.getElementById('btnN').disabled = false;
}

function renderReq(stage, req, certName, total) {
  const cert = CERTS[certName];
  const qNum = idx - 3;
  const qTotal = cert.reqs.length;
  const prev = answers[req.id];
  let inputHTML = '';
  if (req.type === 'yn') {
    inputHTML = `<div class="yn"><button class="yn-btn yes ${prev==='Yes'?'sel':''}" onclick="answerYN('${req.id}','Yes')"><span class="icon">✅</span>Yes</button><button class="yn-btn no ${prev==='No'?'sel':''}" onclick="answerYN('${req.id}','No')"><span class="icon">❌</span>No / Not yet</button></div>`;
  } else if (req.type === 'num') {
    inputHTML = `<div class="num-grid">${req.nums.map(n=>`<button class="num-btn ${prev==n?'sel':''}" onclick="answerNum('${req.id}','${n}')">${n}</button>`).join('')}</div>`;
  } else if (req.type === 'coaching') {
    const isTrauma = certName === 'Trauma Coaching Certificate';
    const opts = isTrauma ? [{ val:'1-on-1: 24 sessions completed', label:'1-on-1 Coaching', sub:'24 sessions completed' },{ val:'1-on-1: In progress', label:'1-on-1 Coaching', sub:'In progress' },{ val:'Group Mentoring: 48 sessions completed', label:'Group Mentoring', sub:'48 sessions completed' },{ val:'Group Mentoring: In progress', label:'Group Mentoring', sub:'In progress' }] : [{ val:'1-on-1: 12 sessions completed', label:'1-on-1 Coaching', sub:'12 sessions completed' },{ val:'1-on-1: In progress', label:'1-on-1 Coaching', sub:'In progress' },{ val:'Group Mentoring: 24 sessions completed', label:'Group Mentoring', sub:'24 sessions completed' },{ val:'Group Mentoring: In progress', label:'Group Mentoring', sub:'In progress' }];
    inputHTML = `<div class="cert-list">${opts.map(o=>`<div class="cert-btn ${prev===o.val?'sel':''}" onclick="answerCoach('${req.id}','${o.val}')"><div><div class="cn">${o.label}</div><div class="cs">${o.sub}</div></div></div>`).join('')}</div>`;
  }
  stage.innerHTML = `<div class="card"><div class="card-top" style="background:linear-gradient(90deg,${cert.color},var(--gold))"></div><div class="card-body"><div class="q-step">${cert.icon} ${certName}  ·  ${qNum} of ${qTotal}</div><div class="q-text">${req.q}</div><div class="q-sub">${req.sub}</div>${inputHTML}</div><div class="card-foot"><button class="btn-back" onclick="back()">← Back</button><button class="btn-next" id="btnN" onclick="advance()" ${prev!==undefined?'':'disabled'}>Next →</button></div></div>`;
}

function answerYN(id, val) { answers[id] = val; document.getElementById('btnN').disabled = false; setTimeout(advance, 350); }
function answerNum(id, val) { answers[id] = val; document.getElementById('btnN').disabled = false; setTimeout(advance, 350); }
function answerCoach(id, val) { answers[id] = val; document.getElementById('btnN').disabled = false; setTimeout(advance, 350); }

function renderTelegramSummary(stage) {
  document.getElementById('progFill').style.width = '100%';
  document.getElementById('topRight').textContent = 'Review & Send';
  const cert = answers.cert;
  const reqs = CERTS[cert].reqs;
  const date = new Date().toLocaleDateString('en-AU');
  const rows = [ ['Name', answers.name], ['Email', answers.email], ['Phone', answers.phone||'Not provided'], ['Certification', cert], ['Date', date], ...reqs.map(r => [r.label, answers[r.id] || '—']) ].map(([l,v]) => `<div class="sum-row"><span class="sum-lbl">${l}</span><span class="sum-val">${v}</span></div>`).join('');
  stage.innerHTML = `
    <div class="card">
      <div class="card-top"></div>
      <div class="card-body">
        <div class="q-step">Final Step</div>
        <div class="q-text">Review your certification request</div>
        <div class="q-sub">Check your responses below, then send your request via Telegram.</div>
        <div class="decl"><div class="decl-title">Declaration</div><div class="decl-body">I, <strong>${answers.name}</strong>, confirm that all information provided is true and accurate for the <strong>${cert}</strong> from AccessWorld Seminars.</div></div>
        <div class="summary">${rows}</div>
        <button class="btn-telegram" id="telegramSendBtn">📨 Submit Certification Request via Telegram</button>
        <button class="btn-back" style="margin-top:12px; text-align:center;" onclick="back()">← Go back and edit</button>
      </div>
    </div>`;
  document.getElementById('telegramSendBtn').addEventListener('click', () => sendTelegram());
}

async function sendTelegram() {
  // HARDCODED credentials — not visible on page, only in HTML source
  const botToken = TELEGRAM_BOT_TOKEN;
  const chatId = TELEGRAM_CHAT_ID;
  
  if (!botToken || botToken === "7234567890:AAGk3xYzAbCdEfGhIjKlMnO" || !chatId || chatId === "987654321") {
    alert("❌ Telegram bot token or chat ID not configured.\n\nPlease edit the HTML file and replace TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID with your actual credentials.");
    return;
  }
  
  const cert = answers.cert;
  const reqs = CERTS[cert].reqs;
  const date = new Date().toLocaleDateString('en-AU');
  let message = `🎓 ACCESSWORLD SEMINARS — CERTIFICATION REQUEST\n\n`;
  message += `Name: ${answers.name}\nEmail: ${answers.email}\nPhone: ${answers.phone || '—'}\nCertificate: ${cert}\nDate: ${date}\n\n─── REQUIREMENTS ───\n`;
  reqs.forEach(r => { const v = answers[r.id] || '—'; message += `${r.label}: ${v}\n`; });
  message += `\n─── DECLARATION ───\nI, ${answers.name}, confirm that all information provided is true and accurate. I am formally requesting certification for the ${cert} from AccessWorld Seminars.`;
  
  const url = `https://api.telegram.org/bot${botToken}/sendMessage`;
  try {
    const response = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: chatId, text: message, parse_mode: 'HTML' })
    });
    const result = await response.json();
    if (result.ok) {
      document.getElementById('stage').innerHTML = `<div class="success-card"><span class="suc-icon">✅</span><h2 class="suc-h2">Request <em>submitted!</em></h2><p class="suc-p">Your certification request has been sent to Joshua Roy via Telegram. You will be contacted once your request has been reviewed.</p></div>`;
      document.getElementById('progFill').style.width = '100%';
    } else {
      alert(`Telegram error: ${result.description}. Check your Bot Token and Chat ID.`);
    }
  } catch (err) {
    alert("Network error: Could not reach Telegram API. Please check your internet connection.");
  }
}

function advance() {
  const item = flow[idx];
  if (item.type === 'name') { const v = document.getElementById('inp')?.value.trim(); if (!v || v.length < 2) return; answers.name = v; }
  else if (item.type === 'email') { const v = document.getElementById('inp')?.value.trim(); if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) return; answers.email = v; }
  else if (item.type === 'phone') { answers.phone = document.getElementById('inp')?.value.trim() || ''; }
  idx++; window.scrollTo(0,0); render();
}
function back() { if (idx > 0) { idx--; window.scrollTo(0,0); render(); } }

buildFlow();
render();
</script>
