<style>
:root {
  --navy:   #1A2744;
  --navy2:  #243560;
  --gold:   #C9A84C;
  --gold2:  #E8C96A;
  --pale:   #F7EDD5;
  --green:  #1A5C2A;
  --lgreen: #EAF5EC;
  --red:    #7A1A1A;
  --lred:   #FBE8E8;
  --mid:    #5A5565;
  --light:  #9090A0;
  --cream:  #FDFAF4;
  --white:  #FFFFFF;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}

body {
  background: var(--navy);
  min-height: 100vh;
  font-family: 'DM Sans', sans-serif;
  display: flex;
  flex-direction: column;
}

/* ── TOPBAR ────────────────────────────────────────────────────── */
.topbar {
  background: rgba(0,0,0,0.25);
  border-bottom: 1px solid rgba(201,168,76,0.25);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 50;
}
.topbar-brand { font-size: 12px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); }
.topbar-right { font-size: 11px; color: rgba(255,255,255,0.35); letter-spacing: 1px; }

/* ── PROGRESS ──────────────────────────────────────────────────── */
.prog-track { height: 3px; background: rgba(255,255,255,0.08); }
.prog-fill  { height: 100%; background: linear-gradient(90deg,var(--gold),var(--gold2)); transition: width .5s cubic-bezier(.4,0,.2,1); width: 0%; }

/* ── STAGE ─────────────────────────────────────────────────────── */
.stage {
  flex: 1;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 24px 16px 48px;
}

/* ── CARD ──────────────────────────────────────────────────────── */
.card {
  background: var(--white);
  width: 100%;
  max-width: 520px;
  overflow: hidden;
  box-shadow: 0 24px 64px rgba(0,0,0,0.45);
  animation: cardIn .35s cubic-bezier(.4,0,.2,1) both;
}
@keyframes cardIn {
  from{opacity:0;transform:translateY(20px) scale(.98)}
  to  {opacity:1;transform:none}
}
.card-top { height: 5px; background: linear-gradient(90deg,var(--navy),var(--gold)); }
.card-body { padding: 28px 24px 24px; }
.card-foot { padding: 0 24px 28px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }

/* ── TYPOGRAPHY ────────────────────────────────────────────────── */
.q-step  { font-size: 10px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 14px; }
.q-text  { font-family: 'Playfair Display', serif; font-size: clamp(18px, 5vw, 22px); font-weight: 600; color: var(--navy); line-height: 1.35; margin-bottom: 8px; }
.q-sub   { font-size: 13px; color: var(--mid); line-height: 1.6; margin-bottom: 24px; }

/* ── YES / NO ──────────────────────────────────────────────────── */
.yn { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.yn-btn {
  padding: 18px 12px;
  border: 2px solid rgba(26,39,68,.14);
  background: var(--cream);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--navy);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  transition: all .18s ease;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.yn-btn .icon { font-size: 26px; }
.yn-btn.yes:active, .yn-btn.yes.sel { background:#EAF5EC; border-color:var(--green); color:var(--green); }
.yn-btn.no:active,  .yn-btn.no.sel  { background:var(--lred);  border-color:var(--red);   color:var(--red);   }

/* ── NUMBER TILES ──────────────────────────────────────────────── */
.num-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.num-btn {
  width: 52px; height: 52px;
  border: 2px solid rgba(26,39,68,.14);
  background: var(--cream);
  cursor: pointer;
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 600;
  color: var(--navy);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .18s ease;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.num-btn:active, .num-btn.sel { background:var(--pale); border-color:var(--gold); transform:scale(1.08); }

/* ── TEXT INPUT ─────────────────────────────────────────────────── */
.txt-inp {
  width: 100%;
  border: 2px solid rgba(26,39,68,.15);
  padding: 14px 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  color: var(--navy);
  background: var(--cream);
  outline: none;
  border-radius: 0;
  -webkit-appearance: none;
  margin-bottom: 0;
}
.txt-inp:focus { border-color: var(--gold); }

/* ── CERT SELECTOR ──────────────────────────────────────────────── */
.cert-list { display: flex; flex-direction: column; gap: 8px; }
.cert-btn {
  padding: 14px 16px;
  border: 2px solid rgba(26,39,68,.12);
  background: var(--cream);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  display: flex;
  align-items: center;
  gap: 14px;
  transition: all .18s ease;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.cert-btn:active, .cert-btn.sel { background:var(--pale); border-color:var(--gold); }
.cert-btn .ci { font-size: 22px; flex-shrink: 0; }
.cert-btn .cn { font-size: 14px; font-weight: 700; color: var(--navy); }
.cert-btn .cs { font-size: 11px; color: var(--mid); }

/* ── NAV BUTTONS ─────────────────────────────────────────────────── */
.btn-next {
  background: linear-gradient(135deg,var(--navy),var(--navy2));
  color: var(--gold);
  border: none;
  padding: 15px 28px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all .2s ease;
  box-shadow: 0 4px 16px rgba(26,39,68,.3);
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  white-space: nowrap;
  flex-shrink: 0;
}
.btn-next:disabled { opacity: .3; cursor: not-allowed; }
.btn-next:not(:disabled):active { transform: scale(.97); }

.btn-back {
  background: none;
  border: none;
  font-size: 13px;
  color: var(--mid);
  cursor: pointer;
  padding: 8px 0;
  font-family: 'DM Sans', sans-serif;
  -webkit-tap-highlight-color: transparent;
}

/* ── SUMMARY ──────────────────────────────────────────────────────── */
.summary { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
.sum-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 9px 12px; gap: 12px; }
.sum-row:nth-child(odd)  { background: var(--cream); }
.sum-row:nth-child(even) { background: #F0EDE4; }
.sum-lbl { font-size: 11px; font-weight: 700; color: var(--light); text-transform: uppercase; letter-spacing: .5px; flex-shrink: 0; max-width: 44%; }
.sum-val { font-size: 13px; font-weight: 600; color: var(--navy); text-align: right; }
.sum-val.y { color: var(--green); }
.sum-val.n { color: var(--red); }

/* ── DECLARATION BOX ─────────────────────────────────────────────── */
.decl {
  background: var(--navy);
  padding: 18px 20px;
  margin-bottom: 20px;
}
.decl-title { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--gold2); margin-bottom: 8px; }
.decl-body  { font-size: 13px; color: rgba(255,255,255,.72); line-height: 1.65; }

/* ── WA BUTTON ──────────────────────────────────────────────────── */

  width: 100%;
  background: linear-gradient(135deg,#25D366,#128C7E);

  border: none;
  padding: 18px 20px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  transition: all .2s ease;
  box-shadow: 0 6px 24px rgba(37,211,102,.3);
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.btn-wa:active { transform: scale(.98); }
.wa-svg { width: 22px; height: 22px; flex-shrink: 0; }

/* ── SUCCESS ─────────────────────────────────────────────────────── */
.success-card {
  background: var(--white);
  max-width: 520px;
  width: 100%;
  padding: 52px 28px;
  text-align: center;
  box-shadow: 0 24px 64px rgba(0,0,0,.45);

.suc-icon { font-size: 56px; display: block; margin-bottom: 20px; }
.suc-h2   { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 600; color: var(--navy); margin-bottom: 12px; }
.suc-h2 em { font-style: italic; color: var(--gold); }
.suc-p  { font-size: 15px; color: var(--mid); line-height: 1.7; }
</style>

// ── STATE ─────────────────────────────────────────────────────────────────────
const answers = {};
let flow = [];
let idx  = 0;

function buildFlow() {
  flow = [
    { type:"name"  },
    { type:"email" },
    { type:"phone" },
    { type:"cert"  },
  ];
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const total = flow.length;
  const pct   = Math.round((idx / Math.max(total - 1, 1)) * 100);
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('topRight').textContent =
    idx < total ? `Step ${idx + 1} of ${total}` : 'Review';

  const stage = document.getElementById('stage');
  if (idx >= total) { renderSummary(stage); return; }
  const item = flow[idx];

  if (item.type === 'name')     { renderText(stage, 'name',  'Your full name', 'e.g. Ellie Lorenz', 'Let\'s get started', 'This will appear on your certification request.'); }
  else if (item.type === 'email')    { renderText(stage, 'email', 'Your email address', 'your@email.com', `Step 2 of ${total}`, 'For Joshua Roy to confirm your certification and send your certificate.'); }
  else if (item.type === 'phone')    { renderPhone(stage, total); }
  else if (item.type === 'cert')     { renderCert(stage, total); }
  else if (item.type === 'req')      { renderReq(stage, item.req, item.certName, total); }
}

// ── TEXT FIELD ────────────────────────────────────────────────────────────────
function renderText(stage, id, placeholder, hint, stepLabel, sub) {
  stage.innerHTML = `
    <div class="card">
      <div class="card-top"></div>
      <div class="card-body">
        <div class="q-step">${stepLabel}</div>
        <div class="q-text">${id === 'name' ? 'What is your full name?' : 'What is your email address?'}</div>
        <div class="q-sub">${sub}</div>
        <input class="txt-inp" id="inp" type="${id==='email'?'email':'text'}"
          placeholder="${placeholder}" value="${answers[id]||''}"
          autocomplete="${id==='email'?'email':'name'}"
          onkeydown="if(event.key==='Enter'&&!document.getElementById('btnN').disabled)advance()">
      </div>
      <div class="card-foot">
        ${idx > 0 ? '<button class="btn-back" onclick="back()">← Back</button>' : '<span></span>'}
        <button class="btn-next" id="btnN" onclick="advance()" disabled>Next →</button>
      </div>
    </div>`;
  const inp = document.getElementById('inp');
  inp.focus();
  inp.addEventListener('input', () => {
    const v = inp.value.trim();
    const ok = id === 'email' ? /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v) : v.length >= 2;
    document.getElementById('btnN').disabled = !ok;
  });
  if (answers[id]) document.getElementById('btnN').disabled = false;
}

// ── PHONE ─────────────────────────────────────────────────────────────────────
function renderPhone(stage, total) {
  stage.innerHTML = `
    <div class="card">
      <div class="card-top"></div>
      <div class="card-body">
        <div class="q-step">Step 3 of ${total}</div>
        <div class="q-text">Your phone number</div>
        <div class="q-sub">Optional — so Joshua Roy can contact you directly if needed.</div>
        <input class="txt-inp" id="inp" type="tel" placeholder="e.g. 0400 000 000"
          value="${answers.phone||''}"
          onkeydown="if(event.key==='Enter')advance()">
      </div>
      <div class="card-foot">
        <button class="btn-back" onclick="back()">← Back</button>
        <button class="btn-next" onclick="advance()">Next →</button>
      </div>
    </div>`;
  document.getElementById('inp').focus();
}

// ── CERT SELECTOR ─────────────────────────────────────────────────────────────
function renderCert(stage, total) {
  const items = Object.keys(CERTS).map(c => `
    <div class="cert-btn ${answers.cert===c?'sel':''}" onclick="pickCert('${c}')">
      <span class="ci">${CERTS[c].icon}</span>
      <div><div class="cn">${c}</div><div class="cs">Tap to select</div></div>
    </div>`).join('');
  stage.innerHTML = `
    <div class="card">
      <div class="card-top"></div>
      <div class="card-body">
        <div class="q-step">Step 4 of ${total}</div>
        <div class="q-text">Which certification are you requesting?</div>
        <div class="q-sub">Select the coaching certification you have completed the requirements for.</div>
        <div class="cert-list">${items}</div>
      </div>
      <div class="card-foot">
        <button class="btn-back" onclick="back()">← Back</button>
        <button class="btn-next" id="btnN" onclick="advance()" ${answers.cert?'':'disabled'}>Next →</button>
      </div>
    </div>`;
}

function pickCert(c) {
  answers.cert = c;
  const certData = CERTS[c];
  // Rebuild flow with this cert's requirements
  flow = [
    { type:'name' }, { type:'email' }, { type:'phone' }, { type:'cert' },
    ...certData.reqs.map(r => ({ type:'req', req:r, certName:c }))
  ];
  document.querySelectorAll('.cert-btn').forEach(b => b.classList.remove('sel'));
  event.currentTarget.classList.add('sel');
  document.getElementById('btnN').disabled = false;
}

// ── REQUIREMENT QUESTION ──────────────────────────────────────────────────────
function renderReq(stage, req, certName, total) {
  const cert   = CERTS[certName];
  const qNum   = idx - 3;
  const qTotal = cert.reqs.length;
  const prev   = answers[req.id];

  let inputHTML = '';

  if (req.type === 'yn') {
    inputHTML = `
      <div class="yn">
        <button class="yn-btn yes ${prev==='Yes'?'sel':''}" onclick="answerYN('${req.id}','Yes')">
          <span class="icon">✅</span>Yes
        </button>
        <button class="yn-btn no ${prev==='No'?'sel':''}" onclick="answerYN('${req.id}','No')">
          <span class="icon">❌</span>No / Not yet
        </button>
      </div>`;
  } else if (req.type === 'num') {
    inputHTML = `
      <div class="num-grid">
        ${req.nums.map(n=>`
          <button class="num-btn ${prev==n?'sel':''}" onclick="answerNum('${req.id}','${n}')">
            ${n}
          </button>`).join('')}
      </div>`;
  } else if (req.type === 'coaching') {
    const isTrauma = certName === 'Trauma Coaching Certificate';
    const opts = isTrauma
      ? [
          { val:'1-on-1: 24 sessions completed',          label:'1-on-1 Coaching', sub:'24 sessions completed' },
          { val:'1-on-1: In progress',                    label:'1-on-1 Coaching', sub:'Currently in progress' },
          { val:'Group Mentoring: 48 sessions completed', label:'Group Mentoring',  sub:'48 sessions completed' },
          { val:'Group Mentoring: In progress',           label:'Group Mentoring',  sub:'Currently in progress' },
        ]
      : [
          { val:'1-on-1: 12 sessions completed',          label:'1-on-1 Coaching', sub:'12 sessions completed' },
          { val:'1-on-1: In progress',                    label:'1-on-1 Coaching', sub:'Currently in progress' },
          { val:'Group Mentoring: 24 sessions completed', label:'Group Mentoring',  sub:'24 sessions completed' },
          { val:'Group Mentoring: In progress',           label:'Group Mentoring',  sub:'Currently in progress' },
        ];
    inputHTML = `
      <div class="cert-list">
        ${opts.map(o=>`
          <div class="cert-btn ${prev===o.val?'sel':''}" onclick="answerCoach('${req.id}','${o.val}')">
            <div><div class="cn">${o.label}</div><div class="cs">${o.sub}</div></div>
          </div>`).join('')}
      </div>`;
  }

  stage.innerHTML = `
    <div class="card">
      <div class="card-top" style="background:linear-gradient(90deg,${cert.color},var(--gold))"></div>
      <div class="card-body">
        <div class="q-step">${cert.icon} ${certName}  ·  Requirement ${qNum} of ${qTotal}</div>
        <div class="q-text">${req.q}</div>
        <div class="q-sub">${req.sub}</div>
        ${inputHTML}
      </div>
      <div class="card-foot">
        <button class="btn-back" onclick="back()">← Back</button>
        <button class="btn-next" id="btnN" onclick="advance()" ${prev!==undefined?'':'disabled'}>Next →</button>
      </div>
    </div>`;
}

// ── ANSWER HANDLERS ───────────────────────────────────────────────────────────
function answerYN(id, val) {
  answers[id] = val;
  document.querySelectorAll('.yn-btn').forEach(b => b.classList.remove('sel'));
  document.querySelector(`.yn-btn.${val==='Yes'?'yes':'no'}`).classList.add('sel');
  document.getElementById('btnN').disabled = false;
  setTimeout(advance, 380);
}

function answerNum(id, val) {
  answers[id] = val;
  document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('sel'));
  event.currentTarget.classList.add('sel');
  document.getElementById('btnN').disabled = false;
  setTimeout(advance, 380);
}

function answerCoach(id, val) {
  answers[id] = val;
  document.querySelectorAll('.cert-btn').forEach(b => b.classList.remove('sel'));
  event.currentTarget.classList.add('sel');
  document.getElementById('btnN').disabled = false;
  setTimeout(advance, 380);
}

// ── SUMMARY ───────────────────────────────────────────────────────────────────
function renderSummary(stage) {
  document.getElementById('progFill').style.width = '100%';
  document.getElementById('topRight').textContent = 'Review & Send';

  const cert  = answers.cert;
  const reqs  = CERTS[cert].reqs;
  const date  = new Date().toLocaleDateString('en-AU',{day:'2-digit',month:'2-digit',year:'numeric'});

  const rows = [
    ['Name',          answers.name,  ''],
    ['Email',         answers.email, ''],
    ['Phone',         answers.phone||'Not provided', ''],
    ['Certification', cert,          ''],
    ['Date',          date,          ''],
    ...reqs.map(r => {
      const v = answers[r.id] || '—';
      const cls = v === 'Yes' ? 'y' : v === 'No / Not yet' ? 'n' : '';
      const disp = v === 'Yes' ? '✅ Yes' : v === 'No / Not yet' ? '❌ Not yet' : v;
      return [r.label, disp, cls];
    })
  ].map(([l,v,c]) => `
    <div class="sum-row">
      <span class="sum-lbl">${l}</span>
      <span class="sum-val ${c}">${v}</span>
    </div>`).join('');

  stage.innerHTML = `
    <div class="card">
      <div class="card-top"></div>
      <div class="card-body">
        <div class="q-step">Final Step</div>
        <div class="q-text">Review your certification request</div>
        <div class="q-sub">Check your responses below, then send your request to Joshua Roy via WhatsApp for review and certification.</div>
        <div class="decl">
          <div class="decl-title">Declaration</div>
          <div class="decl-body">I, <strong>${answers.name}</strong>, confirm that all information provided in this form is true and accurate, and that I am requesting certification for the <strong>${cert}</strong> from AccessWorld Seminars.</div>
        </div>
        <div class="summary">${rows}</div>
      </div>
      <div class="card-foot" style="flex-direction:column; align-items:stretch; gap:10px;">
        <button class="btn-wa" onclick="sendWA()">
          <svg class="wa-svg" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          Submit Certification Request via WhatsApp
        </button>
        <button class="btn-back" style="text-align:center;" onclick="back()">← Go back and edit</button>
      </div>
    </div>`;
}

// ── WHATSAPP SEND ─────────────────────────────────────────────────────────────
function sendWA() {
  const cert  = answers.cert;
  const reqs  = CERTS[cert].reqs;
  const date  = new Date().toLocaleDateString('en-AU',{day:'2-digit',month:'2-digit',year:'numeric'});

  let lines = [
    `🎓 *ACCESSWORLD SEMINARS — CERTIFICATION REQUEST*`,
    ``,
    `*Name:* ${answers.name}`,
    `*Email:* ${answers.email}`,
    `*Phone:* ${answers.phone || 'Not provided'}`,
    `*Certificate Requested:* ${cert}`,
    `*Date Submitted:* ${date}`,
    ``,
    `*─── REQUIREMENTS VERIFICATION ───*`,
  ];

  reqs.forEach(r => {
    const v = answers[r.id] || '—';
    const icon = v === 'Yes' ? '✅' : v === 'No / Not yet' ? '❌' : '📌';
    lines.push(`${icon} ${r.label}: ${v}`);
  });

  lines.push(``, `*─── DECLARATION ───*`);
  lines.push(`I, ${answers.name}, confirm that all information provided is true and accurate. I am formally requesting certification for the ${cert} from AccessWorld Seminars.`);
  lines.push(``, `_Submitted via AccessWorld Certification Request Form_`);

  const url = `https://wa.me/61432119091?text=${encodeURIComponent(lines.join('\n'))}`;
  window.open(url, '_blank');

  document.getElementById('stage').innerHTML = `
    <div class="success-card">
      <span class="suc-icon">🎉</span>
      <h2 class="suc-h2">Request <em>submitted!</em></h2>
      <p class="suc-p">Your certification request has been sent to Joshua Roy via WhatsApp. You will be contacted once your request has been reviewed and your certificate is ready.</p>
    </div>`;
  document.getElementById('progFill').style.width = '100%';
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function advance() {
  const item = flow[idx];
  if (item.type === 'name') {
    const v = document.getElementById('inp')?.value.trim();
    if (!v || v.length < 2) return;
    answers.name = v;
  } else if (item.type === 'email') {
    const v = document.getElementById('inp')?.value.trim();
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) return;
    answers.email = v;
  } else if (item.type === 'phone') {
    answers.phone = document.getElementById('inp')?.value.trim() || '';
  }
  idx++;
  window.scrollTo(0, 0);
  render();
}

function back() {
  if (idx > 0) { idx--; window.scrollTo(0,0); render(); }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
buildFlow();
render();
</script>
